/* ============================ COMBAT / DANGER ============================= */
let shake = 0;
let graceT = 5;   // seconds of no-spawn / no-enemy-fire (after start, undock, respawn)
function addShake(n){ if (!OPTS.shake) return; shake = Math.min(16, shake + n); }
function screenToWorld(sx, sy){
  return { x: cam.x + (sx/PIXEL - BW/2)/VIEW, y: cam.y + (sy/PIXEL - BH/2)/(VIEW*ISO_Y) };
}

/* projectiles */
const shots = [];
const cannon = { reload: 0, cd: 1.1 };
function ammoCount(id){ return id==='round' ? Infinity : (player.ammo[id]||0); }
function consumeAmmo(id){
  if (id==='round') return;
  player.ammo[id] = (player.ammo[id]||0) - 1;
  if (player.ammo[id] <= 0){ delete player.ammo[id]; player.ammoSel = 'round'; setToast('Out of '+AMMO[id].name+' — round shot loaded'); }
}
function fireCannon(){
  if (cannon.reload > 0 || ship.sinking) return;
  if (player.ammoSel !== 'round' && ammoCount(player.ammoSel) <= 0) player.ammoSel = 'round';
  const kind = player.ammoSel;
  const aim = currentAim();
  let dx = aim.x - ship.x, dy = aim.y - ship.y; const d = Math.hypot(dx,dy)||1; dx/=d; dy/=d;
  const base = Math.atan2(dy, dx);
  if (kind==='grape'){                       // short cone of scrap — brutal up close, gone at range
    for (let i=0;i<7;i++){ const a = base + (Math.random()-0.5)*0.62, sp = 320+Math.random()*70;
      shots.push({ x:ship.x, y:ship.y, z:8, vx:Math.cos(a)*sp + ship.vx*0.3, vy:Math.sin(a)*sp + ship.vy*0.3, vz:50, t:0.5, dmg:Math.max(3, Math.round(UP.dmg()*0.38)), friendly:true, kind }); }
  } else if (kind==='oil' || kind==='chum'){ // utility lob — splashes a patch onto the water where it lands
    shots.push({ x:ship.x, y:ship.y, z:8, vx:dx*300 + ship.vx*0.3, vy:dy*300 + ship.vy*0.3, vz:92, t:clamp(d/300, 0.5, 1.7), dmg:0, friendly:true, kind, util:true });
  } else if (kind==='grapple'){              // one hook — snags a ship and hauls you together
    shots.push({ x:ship.x, y:ship.y, z:8, vx:dx*400 + ship.vx*0.3, vy:dy*400 + ship.vy*0.3, vz:60, t:1.3, dmg:4, friendly:true, kind });
  } else {                                   // round / chain / fire ride the full battery
    const n = UP.cannons();
    for (let i=0;i<n;i++){
      const a = base + (n>1 ? (i-(n-1)/2)*0.12 : 0);
      shots.push({ x:ship.x, y:ship.y, z:8, vx:Math.cos(a)*360 + ship.vx*0.3, vy:Math.sin(a)*360 + ship.vy*0.3, vz:72, t:1.6,
        dmg:Math.max(2, Math.round(UP.dmg() * (kind==='chain'?0.55:kind==='fire'?0.8:1))), friendly:true, kind });
    }
  }
  consumeAmmo(kind);
  cannon.reload = cannon.cd * (kind==='grape'?1.3:1); addShake(2.2);
  if (kind==='chain') SFX.chainShot(); else SFX.fire();        // chain rounds carry their own whirl
}
function enemyFire(e, tx, ty){
  let dx = tx-e.x, dy = ty-e.y; const d = Math.hypot(dx,dy)||1; dx/=d; dy/=d;
  shots.push({ x:e.x, y:e.y, z:8, vx:dx*300, vy:dy*300, vz:66, t:1.9, dmg:11, friendly:false });
}
function applyShotFx(t, kind, src='player'){    // special-ammo payloads, shared by enemies & npcs
  if (t.dead) return;
  // chain sets slowT on anything, but only ship movement reads it — monsters have no rigging to shred
  if (kind==='chain'){ t.slowT = Math.max(t.slowT||0, 6); }
  else if (kind==='fire'){ t.burnT = Math.max(t.burnT||0, 5); t.burnSrc = src;   // remember the arsonist — burn deaths blame THEM
    sfxWorld(t.x, t.y, v => SFX.fireIgnite(v), 0.55); }
  else if (kind==='grapple'){ grap = { t, timer: 3.2 }; SFX.grapple(); setToast('Grapple holds — haul her alongside!'); }
}
function stepShots(dt){
  if (cannon.reload > 0) cannon.reload -= dt;
  for (const s of shots){
    s.t -= dt; s.x += s.vx*dt; s.y += s.vy*dt; s.z += s.vz*dt; s.vz -= 150*dt;
    if (s.util){                                             // oil / chum lobs ignore hulls, splash a patch
      if (s.z <= 0 || s.t <= 0) splashUtility(s);
      continue;
    }

function stepFx(dt){

  else if ((e.type==='dread'||e.type==='galleon'||e.type==='corsair') && Math.random()<0.16) kind='fire';
  const base = e.miniboss ? 24 : (e.type==='warship'||e.type==='galleon'||e.type==='manowar'||e.type==='dread'?20:15);   // enemy iron bites now (difficulty pass v0.16; terror spew v0.18.7)

  if (lanternActive() && roll < 0.13) return 'angler';          // the lure is drawn to lantern-light in the dark
  if (region.danger >= 0.8 && roll < 0.035) return 'dread';   // rare pirate flagship in rough open water
  if (region.danger >= 0.8 && roll < 0.11)  return 'galleon'; // heavy pirate galleon in rough seas
  if (region.danger > 1.05 && roll < 0.15)  return 'kraken';  // deep-water grappler in the roughest water

  if (stormy && roll<0.5) return 'serpent';

      const sl = slickAt(e.x, e.y); if (sl && !sl.lit){ sl.lit = true; sl.burnT = 8;
        sfxWorld(sl.x, sl.y, v => SFX.fireIgnite(v), 0.55); }
      if (e.hp <= 0){ e.dead = true; killEnemy(e, e.burnSrc || 'player'); continue; }   // credit goes to whoever lit it
    }
    const dx = ship.x-e.x, dy = ship.y-e.y, dist = Math.hypot(dx,dy)||1, ang = Math.atan2(dy,dx);
    // V12: pick a quarry — the player, or a rival-faction npc close by (pirates raid
    // merchants, monsters take whoever's nearest; kraken/angler/jelly stay player-focused)
    if (e.ship || e.ranged || e.type==='serpent'){
      e.retgtT = (e.retgtT||0) - dt;
      if (e.retgtT <= 0 || (e.quarry && e.quarry.dead)){
        e.retgtT = 1.5; e.quarry = null;
        let bd = e.war ? 1e9 : dist*0.85;                 // war ships stay on their fleet fight; raiders take the closer prize
        for (const n of npcs){
          if (n.dead || facOfNpc(n) === e.fac) continue;
          const d2 = Math.hypot(n.x-e.x, n.y-e.y);
          if (d2 < 800 && d2 < bd){ bd = d2; e.quarry = n; }
        }
      }
    }
    const q = e.quarry && !e.quarry.dead ? e.quarry : null;
    const tdist = q ? Math.hypot(q.x-e.x, q.y-e.y)||1 : dist;
    const tang  = q ? Math.atan2(q.y-e.y, q.x-e.x) : ang;
    const standoff = !q && e.fac === 'redsails' && !e.war && truceActive();   // tribute paid — they let you pass
    if (e.ship){
      let mvx, mvy;
      if (standoff){
        if (tdist < 380){ mvx = -Math.cos(tang); mvy = -Math.sin(tang); }
        else { mvx = Math.cos(tang+Math.PI/2)*0.5; mvy = Math.sin(tang+Math.PI/2)*0.5; }
      } else if (e.ram){
        mvx = Math.cos(tang); mvy = Math.sin(tang);
        if (tdist < 34){
          if (q){ hitNpc(q, 12, e.fac, e); q.vx += Math.cos(tang)*90; q.vy += Math.sin(tang)*90; }
          else if (!ship.sinking){ damagePlayer(12); ship.vx += Math.cos(tang)*90; ship.vy += Math.sin(tang)*90; }
          e.hp -= 20; e.hitT = 0.2; addFx(e.x,e.y,'hit'); if (e.hp<=0 && !e.dead){ e.dead=true; killEnemy(e); continue; }
        }
      } else {
        if (tdist > e.keepDist+30){ mvx = Math.cos(tang); mvy = Math.sin(tang); }
        else { mvx = Math.cos(tang+Math.PI/2); mvy = Math.sin(tang+Math.PI/2); if (tdist < e.keepDist-50){ mvx -= Math.cos(tang)*0.7; mvy -= Math.sin(tang)*0.7; } }
      }
      const eSpd = e.speed * (e.slowT>0 ? 0.45 : 1);          // chain-shredded rigging limps
      [mvx, mvy] = steerClear(e, mvx, mvy);
      e.vx = lerp(e.vx, mvx*eSpd, dt*1.5); e.vy = lerp(e.vy, mvy*eSpd, dt*1.5);
      e.heading = Math.atan2(e.vy, e.vx);
      if (e.volley > 0 && !standoff){ e.fireT -= dt; if (e.fireT <= 0 && tdist < e.fireRange && (q || !ship.sinking)){ e.fireT = e.reload;
        const lead = tdist/300;                              // lead a moving quarry by its drift over the shot's flight
        const la = q ? Math.atan2(q.y + q.vy*lead - e.y, q.x + q.vx*lead - e.x) : tang;
        for (let i=0;i<e.volley;i++) enemyFireA(e, la + (i-(e.volley-1)/2)*0.12, !q, tdist); } }
    } else if (e.ranged){
      e.trail.unshift({ x:e.x, y:e.y }); if (e.trail.length > 24) e.trail.pop();
      let mvx, mvy;
      if (tdist > 240){ mvx = Math.cos(tang); mvy = Math.sin(tang); }
      else if (tdist < 160){ mvx = -Math.cos(tang); mvy = -Math.sin(tang); }
      else { mvx = Math.cos(tang+Math.PI/2); mvy = Math.sin(tang+Math.PI/2); }
      [mvx, mvy] = steerClear(e, mvx, mvy);
      e.vx = lerp(e.vx, mvx*72, dt*1.2); e.vy = lerp(e.vy, mvy*72, dt*1.2); e.surf = lerp(e.surf, 1, dt*2); e.heading = tang;
      e.fireT -= dt; if (e.fireT <= 0 && tdist < 380 && (q || !ship.sinking)){ e.fireT = e.miniboss ? 1.3 : 1.9; enemyFireA(e, tang, !q, tdist);
        if (world.elapsed - (e.roarT||0) > 5 && Math.hypot(e.x-ship.x, e.y-ship.y) < 600){ e.roarT = world.elapsed; SFX.roar('deepmaw', 0.6); } }   // a telegraph is only useful if the beast is close enough to matter
    } else if (e.kraken){
      e.timer -= dt;
      // slow menacing orbit at mid-range (barely moves while gripping)
      let mvx, mvy;
      if (dist > 240){ mvx = Math.cos(ang); mvy = Math.sin(ang); }
      else if (dist < 150){ mvx = -Math.cos(ang)*0.6; mvy = -Math.sin(ang)*0.6; }
      else { mvx = Math.cos(ang+Math.PI/2)*0.8; mvy = Math.sin(ang+Math.PI/2)*0.8; }
      const spd = e.state==='grab' ? 6 : 34;
      [mvx, mvy] = steerClear(e, mvx, mvy, 90);
      e.vx = lerp(e.vx, mvx*spd, dt*1.2); e.vy = lerp(e.vy, mvy*spd, dt*1.2); e.heading = ang;
      if (e.state==='lurk'){
        e.surf = lerp(e.surf, 0.7, dt*2); e.reach = lerp(e.reach, 0, dt*4);
        if (e.timer <= 0 && dist < 330 && !ship.sinking){ e.state='reach'; e.timer=1.4; e.grabArm=(Math.random()*e.arms.length)|0; SFX.roar('kraken', 0.7); }
      } else if (e.state==='reach'){
        e.surf = lerp(e.surf, 1.25, dt*3); e.reach = lerp(e.reach, 1, dt*2.4);
        if (dist < (e.miniboss ? 260 : 185) && e.reach > 0.7 && !ship.sinking){ e.state='grab'; e.timer=2.2; e.grabbed=true; e.dmgAcc=0; SFX.tentacle(0.85); addShake(4); }
        else if (e.timer <= 0){ e.state='lurk'; e.timer=2.6+Math.random()*2.6; e.grabArm=-1; }
      } else { // grab: haul the ship in, slow it, and rake it for damage
        e.surf = lerp(e.surf, 1.35, dt*3); e.reach = 1;
        if (!ship.sinking){
          const gx=e.x-ship.x, gy=e.y-ship.y, gd=Math.hypot(gx,gy)||1;
          ship.vx = lerp(ship.vx, gx/gd*42, dt*2.2); ship.vy = lerp(ship.vy, gy/gd*42, dt*2.2);
          e.dmgAcc += dt; if (e.dmgAcc >= 0.5){ e.dmgAcc=0; damagePlayer(e.miniboss ? 9 : 5); ship.dmgFlash=Math.max(ship.dmgFlash,0.3); }
        }
        if (e.timer <= 0 || ship.sinking){ e.state='lurk'; e.timer=3+Math.random()*2.5; e.grabbed=false; e.grabArm=-1; ship.vx*=0.5; ship.vy*=0.5; }
      }
    } else if (e.angler){
      // ambush predator: drifts submerged behind a glowing lure, then surges for a bite
      e.timer -= dt; e.lureBob += dt*2.4;
      if (e.state==='lure'){
        const draw = lanternActive() ? 1.4 : 1;                       // the lure is drawn to your lantern-light
        e.vx = lerp(e.vx, Math.cos(ang)*22*draw, dt*0.8); e.vy = lerp(e.vy, Math.sin(ang)*22*draw, dt*0.8);
        e.surf = lerp(e.surf, 0.35, dt*2);
        if (dist < 150 && e.timer <= 0 && !ship.sinking){ e.state='chomp'; e.timer=1.2; }
      } else if (e.state==='chomp'){
        e.vx = lerp(e.vx, Math.cos(ang)*215, dt*3); e.vy = lerp(e.vy, Math.sin(ang)*215, dt*3);
        e.surf = lerp(e.surf, 1.3, dt*4);
        if (dist < 46 && !ship.sinking){ damagePlayer(e.miniboss ? 30 : 18); ship.vx += Math.cos(ang)*120; ship.vy += Math.sin(ang)*120; e.state='dive'; e.timer=2.6; SFX.hit(); addShake(5); }
        else if (e.timer <= 0){ e.state='dive'; e.timer=2.2; }
      } else { // dive: submerge, coast off, then re-arm the lure
        e.vx *= Math.exp(-1.4*dt); e.vy *= Math.exp(-1.4*dt); e.surf = lerp(e.surf, 0.12, dt*2);
        if (e.timer <= 0){ e.state='lure'; e.timer=2+Math.random()*2; }
      }
      e.heading = ang;
    } else if (e.jelly){
      // slow drifting bloom — a lingering hazard that shock-pulses ships caught inside it
      e.timer -= dt; if (e.pulse>0) e.pulse -= dt;
      e.wanderA += (Math.random()-0.5)*dt*1.4;
      e.vx = lerp(e.vx, Math.cos(e.wanderA)*14, dt*0.6); e.vy = lerp(e.vy, Math.sin(e.wanderA)*14, dt*0.6);
      e.surf = 1;
      if (dist < 74 && !ship.sinking){
        if (e.timer <= 0){ e.pulse=0.6; e.timer=1.3; damagePlayer(e.miniboss ? 12 : 6); ship.dmgFlash = Math.max(ship.dmgFlash, 0.3); ship.vx*=0.9; ship.vy*=0.9; SFX.jellyZap();
          for (const n of npcs) if (!n.dead && Math.hypot(n.x-e.x, n.y-e.y) < 74) hitNpc(n, 6, 'tide', e); }   // the bloom stings every hull inside
      } else e.timer = Math.max(e.timer, 0.8);                          // brief grace after entering the bloom
      e.heading = e.wanderA;
    } else {
      e.trail.unshift({ x:e.x, y:e.y }); if (e.trail.length > 24) e.trail.pop();
      e.timer -= dt;
      if (e.state==='hunt'){
        const [smx, smy] = steerClear(e, Math.cos(tang), Math.sin(tang), 100);
        e.vx = lerp(e.vx, smx*64, dt*1.2); e.vy = lerp(e.vy, smy*64, dt*1.2);
        e.surf = lerp(e.surf, 1, dt*2);
        if (tdist < 130){ e.state='wind'; e.timer=0.8;
          if (Math.hypot(e.x-ship.x, e.y-ship.y) < 600) SFX.roar('serpent', 0.65); }
      } else if (e.state==='wind'){
        e.vx *= Math.exp(-3*dt); e.vy *= Math.exp(-3*dt); e.surf = lerp(e.surf, 1.5, dt*4);
        if (e.timer <= 0){ e.state='strike'; e.timer=0.5; e.vx=Math.cos(tang)*260; e.vy=Math.sin(tang)*260; }
      } else if (e.state==='strike'){
        if (tdist < 46 && (q || !ship.sinking)){
          if (q){ hitNpc(q, 16, e.fac, e); q.vx += Math.cos(tang)*140; q.vy += Math.sin(tang)*140; }
          else { damagePlayer(16); ship.vx += Math.cos(tang)*140; ship.vy += Math.sin(tang)*140; }
          e.state='cool'; e.timer=1.6;
        }
        else if (e.timer <= 0){ e.state='cool'; e.timer=1.4; }
      } else {
        e.vx *= Math.exp(-1.5*dt); e.vy *= Math.exp(-1.5*dt); e.surf = lerp(e.surf, 0.6, dt*2);
        if (e.timer <= 0) e.state='hunt';
      }
      e.heading = tang;
    }
    if (e.ship) applyHazards(e, dt);                           // monsters swim beneath the hazards
    e.x += e.vx*dt; e.y += e.vy*dt; keepOffLand(e);
    e.farT = (dist > (BH)/(VIEW*ISO_Y)*1.6 + 420) ? e.farT + dt : 0;
    if (e.farT > (e.war ? 60 : 6)) e.dead = true;              // war fleets fight on beyond the horizon
  }
  for (let i=enemies.length-1;i>=0;i--) if (enemies[i].dead) enemies.splice(i,1);
}

/* player damage / sinking / respawn */
function damagePlayer(n){
  if (ship.sinking) return;
  ship.hp -= n; ship.dmgFlash = 1; addShake(n*0.45);
  if (ship.hp <= 0){ ship.hp = 0; startSink(); }
}
// World-anchored one-shots from OTHER entities: full volume close aboard,
// fading to silence by `range` (~the visible sea at standard zoom, 480 span
// ≈ 250u half-width). Far events are invisible — they should be inaudible
// too; phantom crashes/scrapes from off-screen boats read as bugs.
function sfxWorld(x, y, fn, v=1, range=460){
  const d = Math.hypot(x-ship.x, y-ship.y);
  if (d > range) return;
  fn(v * (d < range*0.35 ? 1 : 1 - (d - range*0.35)/(range*0.65)));
}
function startSink(){ ship.sinking = true; ship.sinkT = 0; fishing.active = false; SFX.sinkPlayer(); SFX.stingDeath(); }
function stepDanger(dt){
  // low-hull warning creak — she groans while she's in danger of going under
  if (!ship.sinking && !ui.port && ship.hp < ship.maxhp*0.25 && world.elapsed - (AUDIO.alarmT||0) > 7){
    AUDIO.alarmT = world.elapsed; SFX.hullAlarm();
  }
  if (waypoint && Math.hypot(ship.x-waypoint.x, ship.y-waypoint.y) < 200){ waypoint = null; setToast('Waypoint reached'); }
  if (weather.state==='storm' && !ship.sinking && !ui.port){
    ship.hp -= (3 + 7*ship.sail) * dt * 0.55 * (1 - UP.stormResist());  // reef sail + rigging upgrade help
    if (ship.hp <= 0){ ship.hp = 0; startSink(); }
  }
  const threat = enemies.some(e => !e.dead && Math.hypot(e.x-ship.x, e.y-ship.y) < 460);
  if (!threat && weather.state!=='storm' && !ship.sinking && ship.hp < ship.maxhp) ship.hp = Math.min(ship.maxhp, ship.hp + UP.repair()*dt);
  if (ship.dmgFlash > 0) ship.dmgFlash -= dt*2.5;
  if (shake > 0) shake = Math.max(0, shake - dt*30);
  if (graceT > 0) graceT -= dt;
  // relations drift (V16) — grudges fade and gratitude cools: standing eases
  // toward the ±15 band by 1.5 per game day; allegiances persist, extremes don't
  if (world.elapsed - (player.repDriftT||0) > 840){
    player.repDriftT = world.elapsed;
    for (const fk of FACTION_ORDER){
      const r = repOf(fk);
      if (r > 15) player.rep[fk] = r - Math.min(1.5, r - 15);
      else if (r < -15) player.rep[fk] = r + Math.min(1.5, -15 - r);
    }
  }
  if (ship.slowT > 0) ship.slowT -= dt;
  if (ship.burnT > 0 && !ship.sinking){                     // fire aboard — rain and storms douse it fast
    ship.burnT -= dt * (weather.state==='rain'||weather.state==='storm' ? 3 : 1);
    ship.hp -= 4*dt; ship.dmgFlash = Math.max(ship.dmgFlash, 0.25);
    if (Math.random() < dt*8) addFx(ship.x+(Math.random()-0.5)*16, ship.y+(Math.random()-0.5)*10, 'flame');
    if (ship.hp <= 0){ ship.hp = 0; startSink(); }
  }
  const wg = waterGate();
  if (wg && !ship.sinking && !ui.port){ ship.hp -= 5*dt; ship.dmgFlash = Math.max(ship.dmgFlash, 0.25); if (ship.hp <= 0){ ship.hp = 0; startSink(); } }
  // shoal scrape — shallow water TEARS a hull open at speed now (ease in to dock; charge a reef and you'll founder)
  if (ship.shoal && !ship.sinking && !ui.port && ship.speed > 30){
    const sandbar = ship.shoal.kind==='sandbar';
    const mult = sandbar ? 0.28 : 0.19;                                        // reefs & island shelves both bite hard
    ship.hp -= (ship.speed - 30) * mult * dt; ship.dmgFlash = Math.max(ship.dmgFlash, 0.25);
    if (!ship.wasShoal && ship.speed > 60){                                    // the first crunch when you strike shallows fast
      ship.hp -= clamp((ship.speed - 60) * mult * 1.3, 6, sandbar ? 42 : 30);
      addShake(sandbar ? 5.5 : 4); SFX.collision();
    }
    if (world.elapsed - (ship.scrapeT||0) > 1.2){ ship.scrapeT = world.elapsed; SFX.scrape(); }   // grinding hull, throttled
    if (Math.random() < dt*11){ addFx(ship.x + (Math.random()-0.5)*20, ship.y + 12 + Math.random()*8, 'debris'); addShake(1.0); }
    if (ship.hp <= 0){ ship.hp = 0; startSink(); }
  }
  ship.wasShoal = !!ship.shoal;
  // whirlpool core — grinding damage at the eye; escape by sailing across the spiral
  if (ship.flow && ship.flow.kind==='whirl' && !ship.sinking && !ui.port){
    const d = Math.hypot(ship.x-ship.flow.x, ship.y-ship.flow.y);
    if (d < ship.flow.r*0.3){ ship.hp -= 6*dt; ship.dmgFlash = Math.max(ship.dmgFlash, 0.3); addShake(1.2); if (ship.hp <= 0){ ship.hp = 0; startSink(); } }
  }
  if (curRegion === 'cursed') questEvent('cursed');
  if (touch.aimT > 0) touch.aimT -= dt;
  if (ship.sinking){ ship.sinkT += dt; if (ship.sinkT > 2.6) respawn(); }
}
function respawn(){
  ship.sinking = false; ship.sinkT = 0; ship.hp = ship.maxhp; ship.vx = ship.vy = 0; ship.sail = 0.4;
  for (const k in player.cargo){ player.cargo[k] = Math.floor(player.cargo[k]*0.75); if (player.cargo[k] <= 0) delete player.cargo[k]; }
  player.coin = Math.floor(player.coin * 0.9);
  graceT = 8;   // safe grace period after a sinking
  enemies.length = 0; shots.length = 0;
  const lp = player.lastPort;
  const lpGate = lp && REGIONS[regionAt(lp.x, lp.y)].gate;
  if (lp && !(lpGate && !(player.up[lpGate.comp] > 0))){
    const sp = findOpenWater(lp.x, lp.y); ship.x = sp.x; ship.y = sp.y; setToast('The '+player.boatName+' was lost — you wash ashore at ' + lp.name); }
  else if (lp){                                                // last port sits in a gated sea you can't survive — no death loops (v0.19.2)
    const sp = findOpenWater(START.x, START.y); ship.x = sp.x; ship.y = sp.y;
    setToast('The '+player.boatName+' was lost — survivors carry you to gentler waters'); }
  else { const sp = findOpenWater(START.x, START.y); ship.x = sp.x; ship.y = sp.y; setToast('The '+player.boatName+' was lost — you drift to safety'); }
  cam.x = ship.x; cam.y = ship.y;
  syncEscorts();   // the survivors of your fleet wash ashore with you (AFTER the ship moves)
}

/* ---- enemy / projectile rendering (buffer) ---- */
function enemyHealthBar(e){
  if (e.hp >= e.maxhp) return;
  const p = proj(e.x, e.y, 30), w = 20, x = p[0]-w/2, y = p[1]-11;
  bctx.fillStyle = 'rgba(0,0,0,0.5)'; bctx.fillRect(x, y, w, 3);
  bctx.fillStyle = e.ship ? '#e8916b' : '#b07ad1'; bctx.fillRect(x, y, w*clamp(e.hp/e.maxhp,0,1), 3);
}
function drawEnemyShip(e){
  const bob = Math.sin(world.elapsed*2 + e.x*0.1) * (1 + seaRoughness()*1.4);
  const ch = Math.cos(e.heading), sh = Math.sin(e.heading), sc = e.big || 1;
  const lp = (lx,ly,lz) => proj(e.x + (lx*sc)*ch - (ly*sc)*sh, e.y + (lx*sc)*sh + (ly*sc)*ch, lz + bob);
  if (e.ghost) bctx.globalAlpha = 0.55 + 0.15*Math.sin(world.elapsed*2);
  const s = proj(e.x, e.y, 0); bctx.fillStyle = 'rgba(10,20,30,0.3)';
  bctx.beginPath(); bctx.ellipse(s[0], s[1]+3, 18*VIEW*0.55*sc, 18*VIEW*0.55*ISO_Y*sc+1, 0,0,TAU); bctx.fill();
  const cfg = vcfg(e.look || e.type), HT = cfg.ht;
  // directional custom sprite (e.g. the green ghost ship) — pick the iso frame for the heading
  if (cfg.sprDir && drawDirSprite(cfg.sprDir, e.x, e.y, bob, e.heading, (cfg.sprLen||64)*sc, cfg.sprPivot)){
    bctx.globalAlpha = 1; enemyHealthBar(e); return;
  }
  const hull = e.hitT>0 ? [200,110,100] : (e.hull||[52,40,48]);
  let sail = e.hitT>0 ? [220,110,100] : (e.sail||[140,52,50]);
  if (e.slowT > 0) sail = sail.map(c=>c*0.7);                  // chain-shredded rigging hangs dark and limp
  const cols = { hull, deck: hull.map(c=>c*1.25), trim: hull.map(c=>Math.min(255,c*1.4)), sail };
  drawVesselBody(lp, (nx,ny)=>[nx*ch-ny*sh, nx*sh+ny*ch], cfg, cols);
  drawVesselRig(lp, cfg, cols, {});
  if (e.flag && !(e.slowT > 0)){ const tm = cfg.masts.reduce((a,b)=> b.h>a.h ? b : a, cfg.masts[0]); const fp = lp(tm.x, 0.5, HT+tm.h-1);
    bctx.fillStyle = e.hostile?'#ff4030':e.flag; bctx.fillRect(fp[0], fp[1]-1, 4, 3); }
  bctx.globalAlpha = 1;
  enemyHealthBar(e);
}
function drawSerpent(e){
  const f = world.elapsed;
  const baseCol = e.hitT>0 ? [180,120,140] : (e.ranged ? [96,72,110] : [54,92,86]);
  const darkC = e.ranged ? [64,48,80] : [38,68,64];
  for (let i=e.trail.length-1;i>=0;i-=2){
    const sg = e.trail[i], z = Math.max(0, (e.surf||1)*(6 + 5*Math.sin(f*4 - i*0.5)));
    const p = proj(sg.x, sg.y, z), rr = (11 - i*0.32)*VIEW*0.42; if (rr <= 1) continue;
    bctx.fillStyle = col(i%4<2?baseCol:darkC);
    bctx.beginPath(); bctx.ellipse(p[0], p[1], rr, rr*0.8, 0, 0, TAU); bctx.fill();
  }
  const hz = Math.max(0,(e.surf||1)*11), hp_ = proj(e.x, e.y, hz);
  bctx.fillStyle = col(e.hitT>0?[200,140,150]:[70,112,102]);
  bctx.beginPath(); bctx.ellipse(hp_[0], hp_[1], 12*VIEW*0.5, 10*VIEW*0.5, 0, 0, TAU); bctx.fill();
  bctx.fillStyle = e.state==='wind' ? '#ff5a3c' : '#ffd98a';
  bctx.fillRect(hp_[0]-4, hp_[1]-2, 2, 2); bctx.fillRect(hp_[0]+2, hp_[1]-2, 2, 2);
  enemyHealthBar(e);
}
function drawKraken(e){
  const f = world.elapsed, hit = e.hitT>0;
  const bodyZ = 4 + e.surf*7;
  const s0 = proj(e.x, e.y, 0); bctx.fillStyle = 'rgba(8,14,26,0.30)';
  bctx.beginPath(); bctx.ellipse(s0[0], s0[1]+3, 32*VIEW*0.5, 32*VIEW*0.5*ISO_Y, 0,0,TAU); bctx.fill();
  const dist = Math.hypot(ship.x-e.x, ship.y-e.y)||1;

function drawAngler(e){

function drawEnemyInner(e){ if (e.boss) drawBoss(e); else if (e.ship) drawEnemyShip(e); else if (e.kraken) drawKraken(e); else if (e.angler) drawAngler(e); else if (e.jelly) drawJelly(e); else drawSerpent(e); }

function drawAim(){

/* ============================ AUDIO (Web Audio) =========================== */
const AUDIO = { ctx:null, master:null, started:false, muted:false, seaG:null, windG:null, windBP:null };
/* real background music — 4 instrumental tracks cycling (the old procedural chord
   pad is gone; Web Audio now does AMBIENCE ONLY: waves, wind, tension, SFX) */
const MUSIC = {
  tracks: [
    { file:'foggy-horizon.mp3',      name:'Foggy Horizon' },
    { file:'the-lonely-horizon.mp3', name:'The Lonely Horizon' },
    { file:'the-long-way-home.mp3',  name:'The Long Way Home' },
    { file:'windswept-drift.mp3',    name:'Windswept Drift' },
  ],
  combat: [                                                    // combat channel — the Road for skirmishes, boss tracks for terrors
    { file:'the-road-to-the-last-light.mp3', name:'The Road to the Last Light' },
    { file:'boss-combat-1.mp3',              name:'Boss Combat I' },
    { file:'boss-combat-2.mp3',              name:'Boss Combat II' },
  ],
  el:null, cEl:null, rEl:null, idx:0, cIdx:0, started:false, vol:0.26, cVol:0.33, rVol:0.28,   // music sits UNDER the effects — SFX were drowning
  inCombat:false, clearT:0, rErr:null,
};
/* region themes — looping tracks that own certain waters (combat still outranks them) */
const REGION_MUSIC = {
  cursed: { file:'the-cursed-deep.mp3', name:'The Cursed Deep' },
  ice:    { file:'the-frozen-void.mp3', name:'The Frozen Void' },
};
function musicActive(){                                        // one priority rule: combat > region theme > calm cycle
  if (MUSIC.inCombat) return 'combat';
  const t = REGION_MUSIC[curRegion];
  return (t && MUSIC.rErr !== t.file) ? 'region' : 'calm';
}
function initMusic(){
  if (MUSIC.started) return; MUSIC.started = true;
  MUSIC.idx = Math.floor(Math.random()*MUSIC.tracks.length);   // fresh session, fresh opener — then cycle in order
  const el = new Audio(); el.preload = 'auto'; MUSIC.el = el;
  el.volume = AUDIO.muted ? 0 : MUSIC.vol*OPTS.music;
  el.addEventListener('ended', () => { MUSIC.idx = (MUSIC.idx+1)%MUSIC.tracks.length; playMusicTrack(); });
  el.addEventListener('error', () => setTimeout(() => { MUSIC.idx = (MUSIC.idx+1)%MUSIC.tracks.length; playMusicTrack(); }, 5000));
  const cEl = new Audio(); cEl.preload = 'auto'; MUSIC.cEl = cEl;
  cEl.volume = 0;
  cEl.addEventListener('ended', () => { if (MUSIC.inCombat){ MUSIC.cIdx = (MUSIC.cIdx+1)%MUSIC.combat.length; playCombatTrack(); } });
  cEl.addEventListener('error', () => setTimeout(() => { if (MUSIC.inCombat){ MUSIC.cIdx = (MUSIC.cIdx+1)%MUSIC.combat.length; playCombatTrack(); } }, 5000));
  const rEl = new Audio(); rEl.preload = 'auto'; rEl.loop = true; MUSIC.rEl = rEl;   // region themes loop while you sail their waters
  rEl.volume = 0;
  rEl.addEventListener('error', () => { MUSIC.rErr = (rEl.src||'').split('/').pop(); });   // broken theme → fall back to the calm cycle
  playMusicTrack();
}
function playMusicTrack(){
  const el = MUSIC.el; if (!el) return;
  const t = MUSIC.tracks[MUSIC.idx];
  el.src = 'assets/music/' + t.file;
  const p = el.play(); if (p && p.catch) p.catch(()=>{});     // autoplay guard — retries on the next user gesture via resumeAudio
  if (world.running) setToast('♪ ' + t.name);
}
function playCombatTrack(){
  const el = MUSIC.cEl; if (!el) return;
  el.src = 'assets/music/' + MUSIC.combat[MUSIC.cIdx].file;
  const p = el.play(); if (p && p.catch) p.catch(()=>{});

/* combat ↔ calm crossfade. In combat while: a boss/terror is risen, a hostile is
   within earshot, or the navy is hunting your bounty. 7s of clear water stands down. */
function stepMusic(dt){
  if (!MUSIC.started) return;
  const near = o => Math.hypot(o.x-ship.x, o.y-ship.y) < 650;
  const boss   = enemies.some(e => (e.boss||e.miniboss) && !e.dead && Math.hypot(e.x-ship.x, e.y-ship.y) < 900);   // a terror stalking beyond sight isn't a fight yet
  const threat = enemies.some(e => !e.dead && near(e)) || npcs.some(n => !n.dead && n.hostile && near(n));
  const hunted = player.bounty > 0 && npcs.some(n => !n.dead && n.navy && n.hostile && Math.hypot(n.x-ship.x, n.y-ship.y) < 950);
  const want = !ui.port && !ship.sinking && (boss || threat || hunted);
  if (want){
    MUSIC.clearT = 0;
    if (!MUSIC.inCombat){
      MUSIC.inCombat = true;
      MUSIC.cIdx = boss ? 1 + (Math.random()<0.5 ? 0 : 1) : 0;   // terrors open on a boss track, skirmishes on the Road
      playCombatTrack();
    }
  } else if (MUSIC.inCombat){
    MUSIC.clearT += dt;
    if (MUSIC.clearT > 7) MUSIC.inCombat = false;              // stand down — the winning channel resumes below
  }
  const active = musicActive();
  if (active === 'region'){                                    // load/announce the theme when its waters are entered
    const theme = REGION_MUSIC[curRegion];
    if (!(MUSIC.rEl.src||'').endsWith(theme.file)){
      MUSIC.rEl.src = 'assets/music/' + theme.file;
      if (world.running) setToast('♪ ' + theme.name);
    }
  }
  const hush = ship.sinking ? 0 : 1;                           // the sea takes her in silence — the death sting stands alone
  const chans = [ [MUSIC.el,  active==='calm'   ? MUSIC.vol *OPTS.music*hush : 0],
                  [MUSIC.cEl, active==='combat' ? MUSIC.cVol*OPTS.music*hush : 0],
                  [MUSIC.rEl, active==='region' ? MUSIC.rVol*OPTS.music*hush : 0] ];
  for (const [el, target] of chans){
    if (!el) continue;
    if (target > 0 && el.paused && el.src){ const p = el.play(); if (p && p.catch) p.catch(()=>{}); }   // paused channels resume where they left off
    const t = AUDIO.muted ? 0 : target, v = el.volume;
    const rate = t < v ? 0.22 : 0.9;                           // duck OUT fast — nothing lingers under the fight music
    el.volume = Math.abs(t-v) < 0.012 ? t : v + (t-v)*Math.min(1, dt/rate);

  }
}
function noiseBuffer(ctx, dur){ const n=Math.floor(ctx.sampleRate*dur), b=ctx.createBuffer(1,n,ctx.sampleRate), d=b.getChannelData(0); let last=0; for(let i=0;i<n;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; d[i]=last*3.2; } return b; }

  if (AUDIO.started) return;

function nearGroundTo(x, y, range=3){

function stepNpcs(dt){

  const hunters = npcs.filter(n=>!n.dead && n.hostile && n.navy).length;
  if (player.notoriety>40 && hunters < Math.floor(player.notoriety/35) && Math.random()<0.01) spawnNpc(player.notoriety>75 && Math.random()<0.45 ? 'manowar' : 'patrol', true);   // notorious pirates draw men-o-war

      if (foe){

function hitNpc(n, dmg, src='player', by){

    }

function becomePirate(n){

function killNpc(n, src='player'){

function nearestNamedNpc(){ let best=null,bd=130; for (const n of npcs){ if(n.dead||!n.captain||n.hostile) continue; const d=Math.hypot(n.x-ship.x,n.y-ship.y); if(d<bd){bd=d;best=n;} } return best; }

const wildlife = [];

function pickWildType(){
  const r = regionAt(ship.x,ship.y), roll = Math.random();

  if (r==='cursed') return roll<0.6?'sprite':roll<0.8?'shark':'whale';
  if (r==='tropic') return roll<0.55?'dolphin':roll<0.72?'turtle':roll<0.86?'sprite':'shark';
  return roll<0.5?'dolphin':roll<0.68?'whale':roll<0.85?'shark':'turtle';
}
function spawnWild(type){

  const w = { type, x:wx, y:wy, vx:0, vy:0, heading:Math.random()*TAU, t:Math.random()*10, farT:0, seed:Math.random()*1000 };
  w.spd = type==='dolphin'?66 : type==='shark'?40 : type==='birds'?58 : type==='whale'?20 : type==='sprite'?24 : 13;
  if (type==='whale'){ w.diveT=4+Math.random()*4; w.surf=0.6; }
  if (type==='birds'){ w.n=3+(Math.random()*4|0); }

function stepWildlife(dt){

    w.heading += (noise2(w.seed, w.t*0.25, 9)-0.5)*dt*1.6;
    w.vx=lerp(w.vx,Math.cos(w.heading)*w.spd,dt*0.7); w.vy=lerp(w.vy,Math.sin(w.heading)*w.spd,dt*0.7);
    if (landAt(w.x + w.vx*dt*6, w.y + w.vy*dt*6)){ w.heading += 2.2; w.vx = -w.vx*0.5; w.vy = -w.vy*0.5; }  // veer off the shore

const marketEvents = [];

function makeMarketEvent(forceSurge){

  const surge = forceSurge || Math.random()<0.55;
  const region = ['calm','temperate','tropic','cursed'][Math.floor(Math.random()*4)];
  marketEvents.push({ good, region, mult: surge?1.55+Math.random()*0.65:0.5+Math.random()*0.2, t:80+Math.random()*70,
    text: (surge?'Shortage':'Glut')+' of '+GOODS[good].name+' — '+REGIONS[region].name });
}
function stepEvents(dt){
  for (const e of marketEvents) e.t-=dt;
  for (let i=marketEvents.length-1;i>=0;i--) if (marketEvents[i].t<=0) marketEvents.splice(i,1);
  mktT-=dt; if (mktT<=0){ mktT=45+Math.random()*45; if(marketEvents.length<3) makeMarketEvent(weather.state==='storm'); }

function eventMult(isl, id){ const r=regionAt(isl.x,isl.y); let m=1; for(const e of marketEvents) if(e.good===id && e.region===r) m*=e.mult; return m; }

/* drifting kelp fronds — atmospheric surface clutter for the Sargasso Tangle */
function drawKelp(minX, maxX, minY, maxY){
  const STEP = 46, f = world.elapsed;
  const frond = col([44,84,42]), leaf = col([72,120,54]), leafD = col([50,92,44]);
  for (let gy=Math.floor(minY/STEP); gy<=Math.floor(maxY/STEP); gy++)
  for (let gx=Math.floor(minX/STEP); gx<=Math.floor(maxX/STEP); gx++){
    if (hash2(gx,gy,4211) > 0.4) continue;                       // ~2/5 of cells host a clump
    const wx = gx*STEP + (hash2(gx,gy,7)-0.5)*STEP*0.8, wy = gy*STEP + (hash2(gx,gy,9)-0.5)*STEP*0.8;
    if (regionAt(wx,wy) !== 'sargasso') continue;
    const n = 2 + (hash2(gx,gy,3)*4|0);
    for (let k=0;k<n;k++){
      const a = hash2(gx*7+k,gy,11)*TAU, rad = 3 + hash2(gx,gy*5+k,13)*8;
      const bx = wx + Math.cos(a)*rad, by = wy + Math.sin(a)*rad;
      const sway = Math.sin(f*1.1 + gx*0.7 + k*1.3)*2.2, h = 3.5 + hash2(k,gx,2)*4;
      const p0 = proj(bx, by, 0), p1 = proj(bx+sway, by+sway*0.6, h);
      bctx.strokeStyle = frond; bctx.lineWidth = Math.max(1, 1.6*VIEW*0.5);
      bctx.beginPath(); bctx.moveTo(p0[0],p0[1]); bctx.lineTo(p1[0],p1[1]); bctx.stroke();
      const rr = (1.4 + hash2(gx,k,17)*1.6)*VIEW*0.5;
      bctx.fillStyle = k%2?leaf:leafD; bctx.beginPath(); bctx.ellipse(p1[0],p1[1],rr,rr*0.8,0,0,TAU); bctx.fill();
    }
  }
}
function render() {

  // fishing grounds sit flat on the water, under everything
  for (let cy=c0y;cy<=c1y;cy++) for (let cx=c0x;cx<=c1x;cx++){
    for (const rf of genChunk(cx,cy).reefs) drawReef(rf);
    for (const fw of genChunk(cx,cy).flows) drawFlow(fw);

}
let saveThrottle = 0;
function frame(ts) {
  if (!world.running) return;
  if (W !== window.innerWidth || H !== window.innerHeight) resize();   // self-heal missed resize events (emulation/orientation quirks)
  if (!world.last) world.last = ts;
  let dt = Math.min((ts - world.last)/1000, 0.1); world.last = ts;
  pollGamepad(); applyTouchSteer();
  world.acc += dt;
  if (ui.paused){ world.acc = 0; } else { while (world.acc >= STEP){ update(STEP); world.acc -= STEP; } }
  render();
  saveThrottle += dt; if (saveThrottle > 4 && !ship.sinking){ saveGame(); saveThrottle = 0; }   // never persist a mid-sink hp:0 limbo
  requestAnimationFrame(frame);
}

}

/* ============================ animated title scene ==========================
   Golden-hour parallax drawn on the game canvas BEHIND the DOM #intro overlay:
   base plate + drifting clouds + a bobbing sloop + sea shimmer + gulls. Layers
   live in assets/title/; anything missing degrades gracefully (procedural sky /
   procedural clouds). Loop self-stops the instant a voyage starts. */
const TITLEART = { bg:'assets/title/title_bg.png', clouds:'assets/title/title_clouds.png', ship:'assets/title/title_ship.png' };
const TIMG = {};
let TITLE_CLOUDS_CLEAN = true;     // painted clouds re-exported on magenta + keyed clean → use them
(function loadTitleArt(){ for (const k in TITLEART){ const img = new Image(); img.onload = () => { TIMG[k] = img; }; img.src = TITLEART[k] + '?v=' + GAME_VERSION; } })();   // ?v busts stale caches when art is swapped on a version bump
const titleGulls = [];
for (let i=0;i<5;i++) titleGulls.push({ x:(i*0.21+0.08)%1, y:0.13+((i*0.37)%1)*0.20, spd:0.010+(i%3)*0.006, ph:i*1.3, sc:0.65+(i%3)*0.3 });
let titleT = 0, titleLast = 0;

function drawTitleScene(){
  const g = ctx, w = W, h = H;
  g.save(); g.imageSmoothingEnabled = true;
  // --- base plate (or fallback sky) with a slow Ken-Burns drift ---
  if (TIMG.bg){
    const img = TIMG.bg, s = Math.max(w/img.width, h/img.height) * 1.12, bw = img.width*s, bh = img.height*s;
    const dx = Math.sin(titleT*0.06)*16 - (bw-w)/2, dy = Math.sin(titleT*0.045)*9 - (bh-h)/2;
    g.drawImage(img, dx, dy, bw, bh);
  } else {
    const sk = g.createLinearGradient(0,0,0,h);
    sk.addColorStop(0,'#1d3a56'); sk.addColorStop(0.5,'#3a5a72'); sk.addColorStop(0.62,'#e8b979'); sk.addColorStop(1,'#2b586a');
    g.fillStyle = sk; g.fillRect(0,0,w,h);
  }
  // --- clouds: one painted layer that scales with the screen and gently sways.
  //     No tiling → no seam, no ghost, no fixed-size "tiny on big monitors" problem. ---
  if (TIMG.clouds && TITLE_CLOUDS_CLEAN){
    const img = TIMG.clouds, cw = w*1.12, ch = img.height*cw/img.width;     // covers the width (+margin), scales with the display
    const cx = -(cw-w)/2 + Math.sin(titleT*0.045)*(cw-w)*0.5;               // slow horizontal sway inside the margin
    const cy = Math.round(h*0.44 - ch*0.60 + Math.sin(titleT*0.03)*4);      // band held above the ocean horizon (~0.5h)
    g.globalAlpha = 0.95; g.drawImage(img, Math.round(cx), cy, cw, ch); g.globalAlpha = 1;
  } else {
    for (let i=0;i<6;i++){
      const cx = (((i*0.618 + titleT*0.004*(0.6+(i%3)*0.35)) % 1.25) - 0.12) * w;
      const cy = h*(0.09 + (i%4)*0.052), r = h*(0.05 + (i%3)*0.028);
      const grd = g.createRadialGradient(cx,cy,0,cx,cy,r*2.4);
      grd.addColorStop(0,'rgba(255,241,216,0.5)'); grd.addColorStop(0.5,'rgba(251,221,187,0.26)'); grd.addColorStop(1,'rgba(251,221,187,0)');
      g.fillStyle = grd;
      for (let k=-2;k<=2;k++){ g.beginPath(); g.ellipse(cx+k*r*0.72, cy+Math.abs(k)*r*0.13, r*(1.15-Math.abs(k)*0.18), r*0.62, 0,0,TAU); g.fill(); }
    }
  }
  // --- sea shimmer (screen-blended glints on the lower water) ---
  g.save(); g.globalCompositeOperation = 'screen';
  for (let i=0;i<7;i++){
    const y = h*(0.52 + i*0.058), x = (Math.sin(titleT*0.55 + i*1.7)*0.5+0.5)*w, len = w*(0.05+(i%3)*0.03);
    const a = Math.max(0, 0.05 + 0.04*Math.sin(titleT*1.3 + i));
    g.fillStyle = 'rgba(255,236,190,'+a.toFixed(3)+')'; g.fillRect(x-len/2, y, len, 2);
  }
  g.restore();
  // --- gulls ---
  g.save(); g.strokeStyle = 'rgba(28,38,52,0.5)'; g.lineWidth = 2; g.lineCap = 'round';
  for (const b of titleGulls){
    b.x += b.spd*0.016; if (b.x > 1.15) b.x = -0.15;
    const x = b.x*w, y = b.y*h, s = b.sc*8, dip = (Math.sin(titleT*6 + b.ph)*0.5+0.5)*s*0.5;
    g.beginPath(); g.moveTo(x-s, y); g.quadraticCurveTo(x-s*0.5, y-dip, x, y); g.quadraticCurveTo(x+s*0.5, y-dip, x+s, y); g.stroke();
  }
  g.restore();
  // --- hero sloop (bob + slight roll) ---
  if (TIMG.ship){
    const img = TIMG.ship, sw = Math.min(w*0.30, 440), sh = img.height*sw/img.width;
    const cx = w*0.23, waterY = h*0.70;                       // the hull rides on this waterline
    const bob = Math.sin(titleT*0.9)*4, roll = Math.sin(titleT*0.55)*0.014;
    const sink = sh*0.16;                                     // keel depth hidden below the surface
    // contact shadow on the water
    g.save(); g.fillStyle = 'rgba(8,22,32,0.26)'; g.beginPath(); g.ellipse(cx, waterY+3, sw*0.33, sh*0.05, 0,0,TAU); g.fill(); g.restore();
    // reflection — flipped, squashed, faint, clipped below the waterline
    g.save(); g.beginPath(); g.rect(cx-sw, waterY, sw*2, sh); g.clip();
    g.globalAlpha = 0.13; g.translate(cx, waterY); g.scale(1,-0.5); g.rotate(roll*0.5);
    g.drawImage(img, -sw/2, -(sh-sink)-bob, sw, sh); g.restore();
    // hull LAST — waterline sits at waterY, submerged keel clipped away so she floats IN the water
    // (shadow + reflection are drawn before this, so every water effect stays behind the boat)
    g.save(); g.beginPath(); g.rect(cx-sw, 0, sw*2, waterY+2); g.clip();
    g.translate(cx, waterY); g.rotate(roll); g.drawImage(img, -sw/2, -(sh-sink)-bob, sw, sh); g.restore();
  }
  g.restore();
}
function titleFrame(ts){
  if (world.running) return;                                  // a voyage began → hand the canvas to the game loop
  if (W !== window.innerWidth || H !== window.innerHeight) resize();
  if (!titleLast) titleLast = ts;
  const dt = Math.min((ts - titleLast)/1000, 0.05); titleLast = ts; titleT += dt;
  try { if (W > 0 && H > 0) drawTitleScene(); } catch(e){ /* one bad frame must never kill the title loop */ }
  ctx.imageSmoothingEnabled = false;                          // restore the game's crisp default
  requestAnimationFrame(titleFrame);
}
resize();                                                     // ensure W/H/buffer are sized before the first title frame
requestAnimationFrame(titleFrame);

/* --- title flow: new voyage → controls briefing → set sail; gear → controls reference --- */
function firstEmptySlot(){ for (let s=1;s<=SAVE_SLOTS;s++){ if (!localStorage.getItem(slotKey(s))) return s; } return 0; }
function controlsOpen(){ return !document.getElementById('controlsScreen').classList.contains('hidden'); }
/* --- new-voyage wizard: controls → onboarding cards → set sail. The gear shows step 0 (controls) as reference. --- */
const CONTROLS_HTML =
  '<div class="ctrl-grid">' +

const TUTORIAL = [
  { title:'The endless sea', lead:"You've inherited a weathered sloop and an open horizon.",
    body:"There's no single way to win — <b>trade</b>, <b>fish</b>, <b>fight</b>, and <b>explore</b> to grow rich, earn grander ships, and make your name across ten culture-seaboards. Sail far enough east and the world wraps back on itself; only the polar ice walls you in.",
    keys:[{cap:'W / S',lbl:'sail'},{cap:'A / D',lbl:'steer'}] },
  { title:'Make your fortune', lead:'Every captain needs coin.',

  { title:'A grander ship', lead:'Your sloop is only the beginning.',
    body:"At a port's <b>Shipyard</b>, spend coin to strengthen your hull, add sail and cannons, widen your hold, or buy a whole new class of ship. Some seas — frozen, cursed, weed-choked — gnaw an unfitted hull until you fit the right gear.",
    keys:[{cap:'Space',lbl:'dock, then Shipyard'}] },
  { title:'The sea bites back', lead:'Fair weather never lasts.',
    body:"Squalls sweep in fast — reef your sail (<b>S</b>) and ride them out, or run before the wind. Night falls often; light your <b>lantern</b> (<b>L</b>) to see, though its glow draws hungry things. Ease off the sail near shoals, reefs, ice, and whirlpools.",

    body:"<b>Click</b> to fire your cannons (aim with the mouse); press <b>R</b> to change shot, and sink your attackers for loot. But fire on peaceful ships and the navy puts a bounty on you — pay it off at any harbour to call them off.",
    keys:[{cap:'Click',lbl:'fire'},{cap:'R',lbl:'swap shot'}] },
  { title:'Chart your course', lead:'The whole sea is yours to read.',

/* looping clips of ACTUAL gameplay captured from the game (assets/title/tut/), one per card */
const TUT_CLIPS = ['sail','fish','grander','storm','combat','chart'];
let wizStep = 0, wizVoyage = false;
function renderWizard(){
  const total = wizVoyage ? 1 + TUTORIAL.length : 1, last = wizStep === total-1;
  document.getElementById('ctrlTitle').textContent =
    wizStep === 0 ? (wizVoyage ? 'Before you sail' : "Ship's controls") : TUTORIAL[wizStep-1].title;
  if (wizStep === 0){
    document.getElementById('ctrlBody').innerHTML = CONTROLS_HTML;
  } else {
    const c = TUTORIAL[wizStep-1];
    const keysHTML = c.keys.map(k=>'<span class="keycap">'+k.cap+'</span><span class="keylbl">'+k.lbl+'</span>').join('<span class="keysep">·</span>');
    document.getElementById('ctrlBody').innerHTML =
      '<video class="tut-viz" src="assets/title/tut/tut_'+TUT_CLIPS[wizStep-1]+'.mp4?v='+GAME_VERSION+'" autoplay loop muted playsinline></video>' +
      '<div class="tut-keys">'+keysHTML+'</div>' +
      '<div class="tut-lead">'+c.lead+'</div><div class="tut-p">'+c.body+'</div>';
  }
  const dots = document.getElementById('ctrlDots');
  dots.style.display = wizVoyage ? '' : 'none';
  if (wizVoyage) dots.innerHTML = Array.from({length:total}, (_,i)=>'<span class="'+(i===wizStep?'on':'')+'"></span>').join('');
  document.getElementById('ctrlBack').textContent = wizStep===0 ? (wizVoyage?'Back':'Close') : 'Back';
  const next = document.getElementById('ctrlNext');
  next.style.display = wizVoyage ? '' : 'none'; next.textContent = last ? 'Set sail ⚓' : 'Next';
  document.getElementById('ctrlSkip').style.display = (wizVoyage && !last) ? '' : 'none';
}
function showControls(newVoyage){ wizVoyage = !!newVoyage; wizStep = 0; renderWizard(); document.getElementById('controlsScreen').classList.remove('hidden'); }
function hideControls(){ document.getElementById('controlsScreen').classList.add('hidden'); }
function wizNext(){ if (!wizVoyage) return; const total = 1 + TUTORIAL.length;
  if (wizStep < total-1){ wizStep++; renderWizard(); } else { hideControls(); start(true); } }
function wizBack(){ if (wizStep > 0){ wizStep--; renderWizard(); } else hideControls(); }
function beginNewVoyage(slot){ setActiveSlot(slot || firstEmptySlot() || 1); showControls(true); }   // briefing + onboarding, then Set sail
document.getElementById('startVoyage').addEventListener('click', () => {
  let slot = firstEmptySlot();
  if (!slot){ if (!confirm('All four slots hold a voyage. Overwrite Slot 1 with a new one?')) return; slot = 1; }
  beginNewVoyage(slot);
});
document.getElementById('titleSettings').addEventListener('click', () => showControls(false));
document.getElementById('ctrlBack').addEventListener('click', wizBack);
document.getElementById('ctrlNext').addEventListener('click', wizNext);
document.getElementById('ctrlSkip').addEventListener('click', () => { hideControls(); start(true); });
document.getElementById('controlsScreen').addEventListener('click', e => { if (e.target.id === 'controlsScreen') hideControls(); });

window.addEventListener('keydown', e => {                      // Enter resumes the most recent voyage (or starts one if none)
  if (world.running) return;
  if (controlsOpen()){
    if (e.key==='Escape') hideControls();
    else if (e.key==='ArrowLeft') wizBack();
    else if (e.key==='ArrowRight' || e.key==='Enter') wizNext();
    return;
  }
  if (!(e.key==='Enter' || e.key===' ')) return;
  let best = 0, bt = -1;
  for (let s = 1; s <= SAVE_SLOTS; s++){
    try { const m = JSON.parse(localStorage.getItem(slotKey(s))); if (m && (m.savedAt||0) > bt){ bt = m.savedAt||0; best = s; } } catch(e2){}
  }
  if (best){ setActiveSlot(best); start(false); } else { beginNewVoyage(firstEmptySlot()||1); }
});

    for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++)for(const isl of genChunk(cx+dx,cy+dy).islands){

  nearestGround(){ let best=null,bd=1e9; const cx=Math.floor(ship.x/CHUNK),cy=Math.floor(ship.y/CHUNK);

  storms, spawnStorm, bergs, spawnBerg, loot, spawnLoot, lootSpill,

  slicks, chums, setAmmo(id){ player.ammoSel = id; },
  groundStock, stockHere(){ const g = this.nearestGround(); return g ? { key:g.key, stock:stockOf(g) } : null; },

  hold(){ return player.hold; }, vault(){ return player.vault; },
  fortState, nearestFort(){ let best=null,bd=1e9; const cx=Math.floor(ship.x/CHUNK),cy=Math.floor(ship.y/CHUNK);
    for(let dy=-6;dy<=6;dy++)for(let dx=-6;dx<=6;dx++)for(const isl of genChunk(cx+dx,cy+dy).islands){
