const ship = {
  x: START.x, y: START.y, heading: -Math.PI/2, vx: 0, vy: 0, speed: 0,
  sail: 0.55, anchor: false, hp: 100, maxhp: 100, rockPhase: 0,
  dmgFlash: 0, sinking: false, sinkT: 0, slowT: 0, burnT: 0,
};

/* ------------------------ wind / weather / time -------------------------- */
const wind = { dir: 0.6, target: 0.6, strength: 0.62, targetStr: 0.62, gust: 0 };
const WEATHERS = ['clear','clear','clear','cloudy','cloudy','rain','rain'];   // ambient only — storms are physical cells now
const weather = { state: 'clear', base: 'clear', cell: null, timer: 22, fog: 0, rainDrops: [], flash: 0, boltT: 0, bolt: null, seq: 0, next: 'cloudy' };
/* V9: physical roaming storm cells — visible, moving weather you can watch and outrun */
const storms = [];
let stormSpawnT = 40;
function spawnStorm(x, y){
  const a = Math.random()*TAU;
  const s = { x, y, r: 480 + Math.random()*420,
    vx: Math.cos(wind.dir)*38 + Math.cos(a)*14, vy: Math.sin(wind.dir)*38 + Math.sin(a)*14,
    life: 220 + Math.random()*200, seed: (Math.random()*1e9)|0 };
  storms.push(s); return s;
}
function stormAt(wx, wy){
  for (const s of storms) if (Math.hypot(wx-s.x, wy-s.y) < s.r) return s;
  return null;
}
function nearestStorm(){
  let best=null, bd=1e9;
  for (const s of storms){ const d=Math.hypot(s.x-ship.x, s.y-ship.y)-s.r; if (d<bd){ bd=d; best=s; } }
  return best;
}
function stepStorms(dt){
  stormSpawnT -= dt;
  if (stormSpawnT <= 0){
    stormSpawnT = 50 + Math.random()*70;
    const bias = 0.5 + (REGIONS[curRegion]?.rough||0)*2.2;
    if (storms.length < 2 && Math.random() < 0.55*bias){
      const a = Math.random()*TAU, d = 4200 + Math.random()*2400;
      spawnStorm(ship.x + Math.cos(a)*d, ship.y + Math.sin(a)*d);
    }
  }
  for (const s of storms){
    s.x += s.vx*dt; s.y += s.vy*dt; s.life -= dt;
    if (s.life < 20) s.r = Math.max(0, s.r - dt*30);   // dissipate at end of life
  }
  for (let i=storms.length-1;i>=0;i--)
    if (storms[i].life <= 0 || storms[i].r <= 40 || Math.hypot(storms[i].x-ship.x, storms[i].y-ship.y) > 12000) storms.splice(i,1);
}
/* drifting icebergs — physical colliders that haunt Frostreach water (V9) */
const bergs = [];
let bergSpawnT = 4;
function spawnBerg(x, y){
  const r = 16 + Math.random()*26, seed = (Math.random()*1e9)|0, pts = [];
  for (let j=0;j<8;j++){ const a=j/8*TAU; pts.push({ a, r: r*lerp(0.62,1.2,hash2(j,seed,5)) }); }
  const a2 = Math.random()*TAU;
  const b = { x, y, r, pts, seed, H: 6 + r*0.5, vx: Math.cos(a2)*(5+Math.random()*9), vy: Math.sin(a2)*(5+Math.random()*9) };
  bergs.push(b); return b;
}
function stepBergs(dt){
  bergSpawnT -= dt;
  if (bergSpawnT <= 0){
    bergSpawnT = 5 + Math.random()*7;
    if (curRegion==='ice' && bergs.length < 7){
      const a = Math.random()*TAU, d = 900 + Math.random()*3200;
      const bx2 = ship.x + Math.cos(a)*d, by2 = ship.y + Math.sin(a)*d;
      if (!landAt(bx2, by2) && !shoalAt(bx2, by2) && regionAt(bx2, by2)==='ice') spawnBerg(bx2, by2);
    }
  }
  for (const b of bergs){ b.x += b.vx*dt; b.y += b.vy*dt; }
  for (let i=bergs.length-1;i>=0;i--)
    if (Math.hypot(bergs[i].x-ship.x, bergs[i].y-ship.y) > 6500 || landAt(bergs[i].x, bergs[i].y)) bergs.splice(i,1);
}

/* floating spoils (V10) — kills spill crates & coin pouches at the sink point;
   they bob, drift on the wind, despawn after ~90s, and magnet to the ship on sail-over */
const loot = [];
const lootFx = [];   // rising pickup labels ("+12 coin"), world-anchored, drawn crisp at full res
function spawnLoot(x, y, drops){
  for (const d of drops){
    const a = Math.random()*TAU, r = 4 + Math.random()*30;
    loot.push({ x: x+Math.cos(a)*r, y: y+Math.sin(a)*r, vx:(Math.random()-0.5)*18, vy:(Math.random()-0.5)*18,
      good: d.good||null, qty: d.qty||0, coin: d.coin||0, t: 90, ph: Math.random()*TAU });
  }
}
function lootSpill(x, y, purse, goods){   // purse = coin, goods = {id:qty} — the spill REPLACES auto-loot
  const drops = [];
  if (purse > 0){ const n = purse>80?3:purse>30?2:1;
    for (let i=0;i<n;i++) drops.push({ coin: Math.max(1, Math.round(purse/n * (0.8+Math.random()*0.4))) }); }
  for (const id in goods){ let q = goods[id]; while (q > 0){ const take = Math.min(q, 2); drops.push({ good:id, qty:take }); q -= take; } }
  spawnLoot(x, y, drops);
}
function addLootFx(x, y, txt, col2){ lootFx.push({ x, y, z: 10, txt, col: col2||'#ffd98a', t: 1.4 }); }
function stepLoot(dt){
  for (const f of lootFx){ f.t -= dt; f.z += 14*dt; }
  for (let i=lootFx.length-1;i>=0;i--) if (lootFx[i].t <= 0) lootFx.splice(i,1);
  const wvx = Math.cos(wind.dir)*wind.strength*5, wvy = Math.sin(wind.dir)*wind.strength*5;
  for (let i=loot.length-1;i>=0;i--){
    const L = loot[i]; L.t -= dt;
    if (L.t <= 0){ loot.splice(i,1); continue; }
    const d = Math.hypot(L.x-ship.x, L.y-ship.y);
    if (!ship.sinking && d < 110){                                  // magnet — reel it in on sail-over
      const pull = 190*(1-d/110)+50, ang = Math.atan2(ship.y-L.y, ship.x-L.x);
      L.vx += Math.cos(ang)*pull*dt*6; L.vy += Math.sin(ang)*pull*dt*6;
    }
    const nx = L.x + (L.vx+wvx)*dt, ny = L.y + (L.vy+wvy)*dt;
    if (!landAt(nx, ny)){ L.x = nx; L.y = ny; } else { L.vx = L.vy = 0; }
    L.vx *= Math.exp(-2.2*dt); L.vy *= Math.exp(-2.2*dt);
    if (!ship.sinking && d < 30){                                   // collect
      if (L.coin){ earn(L.coin); addLootFx(L.x, L.y, '+'+L.coin+' coin'); SFX.coin(); loot.splice(i,1); }
      else {
        const added = Math.max(0, addCargo(L.good, L.qty));   // addCargo can return negative if the hold is over-full
        if (added > 0){ addLootFx(L.x, L.y, '+'+added+' '+GOODS[L.good].name, '#9ad17a'); SFX.loot(); }   // crates come up dripping — coin pouches keep the chime
        if (added >= L.qty) loot.splice(i,1);
        else { L.qty -= added; if (added === 0 && Math.random() < dt*0.8) addLootFx(ship.x, ship.y, 'hold full!', '#e8916b'); }
      }
    }
  }
}
function drawLoot(L){
  const bob = Math.sin(world.elapsed*2.2 + L.ph)*1.6;
  const fade = L.t < 10 ? (Math.sin(world.elapsed*7) > -0.2 ? 1 : 0.25) : 1;   // blink when about to sink away
  const p = proj(L.x, L.y, 3.5+bob), s2 = proj(L.x, L.y, 0);
  bctx.save(); bctx.globalAlpha = fade;
  bctx.fillStyle = 'rgba(10,20,30,0.25)'; bctx.beginPath(); bctx.ellipse(s2[0], s2[1]+2, 6*VIEW*0.5, 6*VIEW*0.5*ISO_Y, 0,0,TAU); bctx.fill();
  const gl = 0.35 + 0.25*Math.sin(world.elapsed*3 + L.ph);                     // soft glint so spoils catch the eye
  if (L.coin){
    bctx.fillStyle = `rgba(255,220,120,${gl*0.5})`; bctx.beginPath(); bctx.arc(p[0], p[1], 7, 0, TAU); bctx.fill();
    bctx.fillStyle = col([196,158,74]); bctx.beginPath(); bctx.arc(p[0], p[1], 3.5, 0, TAU); bctx.fill();
    bctx.fillStyle = col([255,224,140]); bctx.beginPath(); bctx.arc(p[0]-1, p[1]-1, 2, 0, TAU); bctx.fill();
  } else {
    bctx.fillStyle = `rgba(255,220,140,${gl*0.35})`; bctx.beginPath(); bctx.arc(p[0], p[1], 8, 0, TAU); bctx.fill();
    // sprite crate / barrel (variant keyed on the bob phase — x/y drift every frame)
    const lk = (L.good==='rum' || L.good==='oil') ? 'barrel' : 'crate';
    if (drawSpriteBuf(sprVar(lk, hash2(Math.round(L.ph*1000), 7, 65)), L.x, L.y, 1.5+bob, 9)){ bctx.restore(); return; }
    if (L.good==='rum' || L.good==='oil'){                                    // barrel
      bctx.fillStyle = col([116,78,44]); bctx.fillRect(p[0]-3, p[1]-4, 6, 8);
      bctx.fillStyle = col([160,118,66]); bctx.fillRect(p[0]-3, p[1]-3, 6, 1); bctx.fillRect(p[0]-3, p[1]+1, 6, 1);
    } else {                                                                  // crate
      bctx.fillStyle = col([126,92,54]); bctx.fillRect(p[0]-4, p[1]-4, 8, 8);
      bctx.fillStyle = col([88,62,36]); bctx.fillRect(p[0]-4, p[1]-1, 8, 1); bctx.fillRect(p[0]-1, p[1]-4, 1, 8);
      bctx.fillStyle = col([188,152,98]); bctx.fillRect(p[0]-4, p[1]-4, 8, 1);
    }
  }
  bctx.restore();
}
function drawLootFx(){
  if (!lootFx.length) return;
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font=fnt(12);
  for (const f of lootFx){
    const p = proj(f.x, f.y, f.z);
    ctx.globalAlpha = clamp(f.t/0.5, 0, 1);
    ctx.fillStyle = 'rgba(10,18,28,0.8)'; ctx.fillText(f.txt, p[0]*PIXEL+1, p[1]*PIXEL+1);
    ctx.fillStyle = f.col; ctx.fillText(f.txt, p[0]*PIXEL, p[1]*PIXEL);
  }
  ctx.restore();
}

/* utility-shot patches (V10 gunnery) — oil slicks (ignitable area denial) and
   chum (fish lure that also baits monsters). Both live on the water, both temporary. */
const slicks = [];   // {x,y,r,t,lit,burnT}
const chums  = [];   // {x,y,r,t}
let grap = null;     // active grapple line {t:target, isNpc, timer}
function slickAt(x, y){ for (const sl of slicks) if (Math.hypot(sl.x-x, sl.y-y) < sl.r) return sl; return null; }
function chumAt(x, y){ for (const c of chums) if (Math.hypot(c.x-x, c.y-y) < c.r) return c; return null; }
function splashUtility(s){
  if (s.kind==='oil'){ slicks.push({ x:s.x, y:s.y, r:64, t:45, lit:false, burnT:0 }); setToast('Oil spreads on the water — a spark would take it'); }
  else { chums.push({ x:s.x, y:s.y, r:90, t:40 }); setToast('Chum in the water — the sea stirs…'); }
  addFx(s.x, s.y, 'splash'); s.t = -1;
}
function stepSlicks(dt){
  for (let i=slicks.length-1;i>=0;i--){
    const sl = slicks[i]; sl.t -= dt;
    if (sl.lit){
      sl.burnT -= dt;
      if (Math.random() < dt*20) addFx(sl.x+(Math.random()-0.5)*sl.r*1.6, sl.y+(Math.random()-0.5)*sl.r*1.2, 'flame');
      if (!ship.sinking && !ui.port && Math.hypot(sl.x-ship.x, sl.y-ship.y) < sl.r){ ship.hp -= 10*dt; ship.dmgFlash = Math.max(ship.dmgFlash, 0.3); if (ship.hp<=0){ ship.hp=0; startSink(); } }
      for (const e of enemies){ if (e.dead) continue; if (Math.hypot(sl.x-e.x, sl.y-e.y) < sl.r){ e.hp -= 10*dt; if (e.hp<=0 && !e.dead){ e.dead=true; killEnemy(e); } } }
      for (const n of npcs){ if (n.dead) continue; if (Math.hypot(sl.x-n.x, sl.y-n.y) < sl.r){ if (!n.provoked){ n.provoked=true; becomePirate(n); if (n.navy) n.hostile=true; } n.hp -= 10*dt; if (n.hp<=0 && !n.dead){ n.dead=true; killNpc(n); } } }
      if (sl.burnT <= 0){ slicks.splice(i,1); continue; }
    }
    if (sl.t <= 0) slicks.splice(i,1);
  }
  for (let i=chums.length-1;i>=0;i--){ chums[i].t -= dt; if (chums[i].t <= 0) chums.splice(i,1); }
  // grapple line — haul the snagged ship and yours together for a point-blank exchange
  if (grap){
    grap.timer -= dt;
    const t = grap.t;
    if (grap.timer <= 0 || t.dead || ship.sinking){ grap = null; }
    else {
      const gx = t.x-ship.x, gy = t.y-ship.y, gd = Math.hypot(gx,gy)||1;
      if (gd > 70){
        ship.vx += gx/gd*170*dt; ship.vy += gy/gd*170*dt;
        t.vx = (t.vx||0) - gx/gd*120*dt; t.vy = (t.vy||0) - gy/gd*120*dt;
      }
    }
  }
}
function drawSlick(sl){
  const p = proj(sl.x, sl.y, 0), rx = sl.r*VIEW, ry = sl.r*VIEW*ISO_Y;
  bctx.save();
  if (sl.lit){
    const fl = 0.55 + 0.25*Math.sin(world.elapsed*11 + sl.x);
    bctx.fillStyle = `rgba(230,110,40,${0.30*fl})`; bctx.beginPath(); bctx.ellipse(p[0],p[1],rx,ry,0,0,TAU); bctx.fill();
    bctx.fillStyle = `rgba(255,200,90,${0.30*fl})`; bctx.beginPath(); bctx.ellipse(p[0],p[1],rx*0.55,ry*0.55,0,0,TAU); bctx.fill();
    for (let i=0;i<7;i++){ const a=i/7*TAU + world.elapsed*0.7, fr=rx*(0.3+0.55*hash2(i,sl.x|0,3));
      const fp = proj(sl.x + Math.cos(a)*fr/VIEW, sl.y + Math.sin(a)*fr/VIEW, 3 + 2*Math.sin(world.elapsed*9+i*2.1));
      bctx.fillStyle = i%2 ? '#ffb060' : '#e07a30'; bctx.fillRect(fp[0]-1, fp[1]-3, 2, 4); }
  } else {
    const a = clamp(sl.t/8, 0.35, 0.6);
    bctx.fillStyle = `rgba(24,30,34,${0.42*a})`; bctx.beginPath(); bctx.ellipse(p[0],p[1],rx,ry,0,0,TAU); bctx.fill();
    bctx.strokeStyle = `rgba(120,150,140,${0.35*a})`; bctx.lineWidth = 1;   // faint petrol sheen
    bctx.beginPath(); bctx.ellipse(p[0],p[1],rx*0.66,ry*0.66,0,0,TAU); bctx.stroke();
    bctx.strokeStyle = `rgba(150,120,160,${0.25*a})`;
    bctx.beginPath(); bctx.ellipse(p[0],p[1],rx*0.4,ry*0.4,0,0,TAU); bctx.stroke();
  }
  bctx.restore();
}
function drawChum(c){
  const p = proj(c.x, c.y, 0), rx = c.r*VIEW*0.7, ry = c.r*VIEW*0.7*ISO_Y;
  bctx.save();
  bctx.fillStyle = 'rgba(150,60,66,0.16)'; bctx.beginPath(); bctx.ellipse(p[0],p[1],rx,ry,0,0,TAU); bctx.fill();
  for (let i=0;i<9;i++){ const a=hash2(i,c.x|0,5)*TAU + world.elapsed*0.2, rr=rx*hash2(i,c.y|0,7);
    const fp = proj(c.x + Math.cos(a)*rr/VIEW, c.y + Math.sin(a)*rr/VIEW*ISO_Y, 0);
    bctx.fillStyle = i%2 ? 'rgba(196,106,114,0.7)' : 'rgba(142,62,74,0.7)'; bctx.fillRect(fp[0]-1, fp[1]-1, 2, 2); }
  const rp = (world.elapsed*0.5 + hash2(c.x|0,c.y|0,9)) % 1;   // spreading ripple
  bctx.strokeStyle = `rgba(220,230,230,${0.4*(1-rp)})`; bctx.lineWidth = 1;
  bctx.beginPath(); bctx.ellipse(p[0],p[1],rx*rp,ry*rp,0,0,TAU); bctx.stroke();
  bctx.restore();
}
function pickWeather(seq){ return WEATHERS[Math.floor(noise2(seq*3.7, 3, 99)*WEATHERS.length) % WEATHERS.length]; }
function durFor(state, seq){ const h = hash2(seq, 7, 1); return state==='storm' ? lerp(11,22,h) : lerp(18,40,h); }
weather.next = pickWeather(1);
function forecast(){
  const f = [{ state: weather.next, t: weather.timer }];
  if (player.up.glass >= 1 || hasCrew('navigator')){
    f.push({ state: pickWeather(weather.seq+1), t: weather.timer + durFor(weather.next, weather.seq+1) });
  }
  return f;
}
const timeOfDay = { t: 0.34, speed: 1/840 };   // full day/night cycle ≈ 14 min
let curRegion = 'temperate';

function stepWind(dt) {
  wind.target += (noise2(world.elapsed*0.03, 11.3, 71) - 0.5) * dt * 0.9;
  wind.dir = angLerp(wind.dir, wind.target, clamp(dt*0.4,0,1));
  let baseStr = weather.state==='storm' ? 1.15 : weather.state==='rain' ? 0.85 : weather.state==='cloudy' ? 0.7 : 0.6;
  wind.targetStr = baseStr + (noise2(world.elapsed*0.05, 4.1, 23) - 0.5) * 0.4;
  wind.strength = lerp(wind.strength, clamp(wind.targetStr, 0.18, 1.45), dt*0.5);
  wind.gust = lerp(wind.gust, noise2(world.elapsed*0.4, 9.9, 5) > (weather.state==='storm'?0.5:0.78) ? 1 : 0, dt*1.5);
}
function stepWeather(dt) {
  weather.timer -= dt;
  if (weather.timer <= 0) {
    weather.base = weather.next; weather.seq++;
    weather.timer = durFor(weather.base, weather.seq);
    weather.next = pickWeather(weather.seq + 1);
  }
  stepStorms(dt); stepBergs(dt);
  weather.cell = stormAt(ship.x, ship.y);           // 'storm' is now a PLACE, not a phase
  weather.state = weather.cell ? 'storm' : weather.base;
  const storm = weather.state==='storm';
  const fogTarget = storm ? 0.4 : weather.state==='rain' ? 0.3 : weather.state==='cloudy' ? 0.1 : 0;
  weather.fog = lerp(weather.fog, fogTarget, dt*0.4);
  if (weather.state==='rain' || storm) {
    const n = Math.max(1, Math.round((storm ? 9 : 4) * (OPTS.rain ? 1 : 0.45)));   // 'light rain & spray' option thins the sheets
    for (let i = 0; i < n; i++) if (weather.rainDrops.length < (OPTS.rain ? 360 : 160))
      weather.rainDrops.push({ x: Math.random()*BW, y: -6, v: (storm?420:280) + Math.random()*180, len: (storm?8:5) + Math.random()*6 });
  }
  for (const d of weather.rainDrops) { d.y += d.v*dt; d.x -= (storm?110:50)*dt; }
  weather.rainDrops = weather.rainDrops.filter(d => d.y < BH + 12);
  // lightning
  weather.flash = Math.max(0, weather.flash - dt*3);
  if (weather.bolt){ weather.bolt.t -= dt; if (weather.bolt.t <= 0) weather.bolt = null; }
  if (storm){
    weather.boltT -= dt;
    if (weather.boltT <= 0){
      weather.boltT = 2.5 + Math.random()*5;
      weather.flash = 1;
      weather.bolt = { x: ship.x + (Math.random()-0.5)*640, y: ship.y + (Math.random()-0.5)*420, t: 0.22 };
      SFX.thunder();
    }
  }
}
function stepTime(dt) { timeOfDay.t = (timeOfDay.t + dt*timeOfDay.speed) % 1; }
function seaRoughness() {
  const base = weather.state==='storm'?1.1 : weather.state==='rain'?0.7 : weather.state==='cloudy'?0.4 : 0.2;
  return clamp(base + (wind.strength-0.5)*0.4 + (REGIONS[curRegion]?.rough||0), 0.08, 1.4);
}
function dayFactor() {
  const raw = Math.sin(timeOfDay.t * TAU - Math.PI/2) * 0.5 + 0.5;   // symmetric 0..1
  return clamp(Math.pow(raw, 0.5), 0, 1);   // day-biased: long bright day, short gentle night
}

/* ------------------------------ camera ----------------------------------- */
const cam = { x: 0, y: 0 };
function updateCam(dt) {
  const la = 0.5;
  cam.x = lerp(cam.x, ship.x + ship.vx * la, clamp(dt*2.6,0,1));
  cam.y = lerp(cam.y, ship.y + ship.vy * la, clamp(dt*2.6,0,1));
}
// world (wx,wy,wz=up) -> buffer pixel
function proj(wx, wy, wz) {
  const dx = (wx - cam.x) * VIEW, dy = (wy - cam.y) * VIEW;
  return [ Math.round(dx + BW/2), Math.round(dy * ISO_Y - wz * VIEW * ISO_Z + BH/2) ];
}

/* ------------------------------ input ------------------------------------ */
const keys = {};
// Reset held-key state so a missed keyup (window blur, opening the map/port, etc.)
// can't leave a movement key "stuck" — e.g. a stuck reef key would pin the sail at 0
// and make W feel dead. Genuinely-held keys re-assert via OS key-repeat next frame.
function clearKeys(){ for (const kk in keys) keys[kk] = false; }
function toggleMap(){ if (ui.port || ui.hold) return; ui.mapOpen = !ui.mapOpen; ui.zoomEdit = null; SFX.map(); if (ui.mapOpen){ mapWorldView = false; mapRange = 9000; ui.inv = false; } clearKeys(); }   // always open in local mode
window.addEventListener('blur', clearKeys);
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (ui.naming){                                      // naming dialog captures all typing
    e.preventDefault();
    if (k==='enter') christen();
    else if (k==='escape'){ if (ui.naming.first) christen(); else ui.naming=null; clearKeys(); }
    else if (k==='backspace') ui.naming.text = ui.naming.text.slice(0,-1);
    else if (e.key.length===1 && ui.naming.text.length<18 && /[a-zA-Z0-9 '\-]/.test(e.key)) ui.naming.text += e.key;
    return;
  }
  if (ui.zoomEdit && ui.mapOpen){                      // chart zoom box captures typing (value in thousands)
    e.preventDefault();
    if (k==='enter'){ const v=parseFloat(ui.zoomEdit.buf);
      if (isFinite(v) && v>0){ mapRange = clamp(v*1000, MAP_LOCAL_MIN, MAP_LOCAL_MAX); mapWorldView = false; }
      ui.zoomEdit = null; }
    else if (k==='escape') ui.zoomEdit = null;
    else if (k==='backspace') ui.zoomEdit.buf = ui.zoomEdit.buf.slice(0,-1);
    else if (e.key.length===1 && ui.zoomEdit.buf.length<5 && /[0-9.]/.test(e.key)) ui.zoomEdit.buf += e.key;
    return;
  }
  keys[k] = true;

/* ----------------------------- ship physics ------------------------------ */
function stepShip(dt) {
  // sail & anchor sounds fire on the key EDGE, not per-frame while held
  if (K('up') && !ship.sfxUp && ship.sail < 1){ ship.sfxUp = true; SFX.sailUp(); } if (!K('up')) ship.sfxUp = false;
  if (K('down') && !ship.sfxDn && ship.sail > 0){ ship.sfxDn = true; SFX.sailDown(); } if (!K('down')) ship.sfxDn = false;
  if (K('anchor') && !ship.sfxAnc){ ship.sfxAnc = true; if (ship.speed > 12) SFX.anchor(); } if (!K('anchor')) ship.sfxAnc = false;
  if (K('up')) ship.sail = clamp(ship.sail + dt*0.8, 0, 1);
  if (K('down')) ship.sail = clamp(ship.sail - dt*0.8, 0, 1);
  ship.anchor = !!K('anchor');
  const turnRate = 1.5 * (0.5 + 0.5 * clamp(ship.speed/180,0,1)) * UP.turnMul();
  if (K('left') || keys['arrowleft'])  ship.heading -= turnRate * dt;
  if (K('right') || keys['arrowright']) ship.heading += turnRate * dt;

  const align = Math.cos(ship.heading - wind.dir);
  const windPush = (align * 0.55 + 0.55);
  const effWind = wind.strength * (1 + wind.gust*0.5);
  const sailOpen = ship.anchor ? 0 : ship.sail;
  ship.shoal = shoalAt(ship.x, ship.y);      // cached once per step (damage + HUD reuse it)
  const shoalSlow = ship.shoal ? (ship.shoal.kind==='sandbar' ? 0.45 : 0.78) : 1;
  const slickSlow = slickAt(ship.x, ship.y) ? 0.72 : 1;                 // oil clings to the hull
  const chainSlow = ship.slowT > 0 ? 0.6 : 1;                           // shredded rigging
  const gateSlow = (waterGate() ? 0.5 : 1) * shoalSlow * slickSlow * chainSlow;   // wrong water / shallows = sluggish
  // solid base propulsion (never stuck) + a meaningful wind bonus on top
  const thrust = sailOpen * (92 + 155 * windPush * effWind) * UP.sailMul() * gateSlow;

  ship.vx += Math.cos(ship.heading) * thrust * dt;
  ship.vy += Math.sin(ship.heading) * thrust * dt;
  // flow hazards: riptides shove along their lane; whirlpools pull inward with a swirl
  ship.flow = flowAt(ship.x, ship.y);
  if (ship.flow){
    const fl = ship.flow;
    if (fl.kind==='rip'){ ship.vx += Math.cos(fl.dir)*150*dt; ship.vy += Math.sin(fl.dir)*150*dt; }
    else {
      const ax = fl.x-ship.x, ay = fl.y-ship.y, d = Math.hypot(ax,ay)||1;
      const pull = 200*(1 - d/fl.r) + 40;
      ship.vx += (ax/d*pull - ay/d*pull*0.7)*dt;
      ship.vy += (ay/d*pull + ax/d*pull*0.7)*dt;
    }
  }

  const fx = Math.cos(ship.heading), fy = Math.sin(ship.heading);
  let fwd = ship.vx*fx + ship.vy*fy;
  let latx = ship.vx - fwd*fx, laty = ship.vy - fwd*fy;
  fwd *= Math.exp(-((ship.anchor ? 3.4 : 0.7) + (fishing.active ? 1.5 : 0))*dt);
  const latDamp = Math.exp(-4.5*dt); latx *= latDamp; laty *= latDamp;
  ship.vx = fwd*fx + latx; ship.vy = fwd*fy + laty;

  const rough = seaRoughness(), driftAng = wind.dir + 0.4;
  ship.vx += Math.cos(driftAng) * rough * 8 * dt;
  ship.vy += Math.sin(driftAng) * rough * 8 * dt;

  // top-speed cap (so boats don't get silly-fast downwind)
  const cap = (172 * shipC().spd + player.up.sail*8) * gateSlow;
  const spNow = Math.hypot(ship.vx, ship.vy);
  if (spNow > cap){ const s = cap/spNow; ship.vx *= s; ship.vy *= s; }

  let nx = ship.x + ship.vx*dt, ny = ship.y + ship.vy*dt;
  const isl = landAt(nx, ny);
  if (isl) {
    const ang = Math.atan2(ny - isl.y, nx - isl.x), rEdge = islandRadiusAt(isl, ang) + 12;
    nx = isl.x + Math.cos(ang)*rEdge; ny = isl.y + Math.sin(ang)*rEdge;
    if (ship.speed > 60 && world.elapsed - (ship.bumpT||0) > 1.6){ ship.bumpT = world.elapsed; SFX.collision(); addShake(3); }
    ship.vx *= 0.2; ship.vy *= 0.2;
  }
  for (const b of bergs){                                       // iceberg impacts — hard at speed
    const d = Math.hypot(nx-b.x, ny-b.y);
    if (d < b.r + 12){
      const a = Math.atan2(ny-b.y, nx-b.x);
      nx = b.x + Math.cos(a)*(b.r+12); ny = b.y + Math.sin(a)*(b.r+12);
      if (ship.speed > 45){ damagePlayer(Math.min(18, (ship.speed-45)*0.09)); addShake(4); SFX.collision(); }
      ship.vx *= 0.25; ship.vy *= 0.25;
      break;
    }
  }
  ship.x = nx; ship.y = ny; clampPole(ship);
  ship.speed = Math.hypot(ship.vx, ship.vy);
  ship.rockPhase += dt * (1.4 + rough*2.2);
  markExplored(); collectFlotsam();
}
function stepShipDrift(dt) {
  ship.vx *= Math.exp(-0.7*dt); ship.vy *= Math.exp(-0.7*dt);
  ship.x += ship.vx*dt; ship.y += ship.vy*dt; clampPole(ship); ship.speed = Math.hypot(ship.vx, ship.vy);
}

const explored = new Set();
function markExplored() {
  const cx = Math.floor(ship.x / CHUNK), cy = Math.floor(ship.y / CHUNK);
  for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++){
    const ch = genChunk(cx+dx, cy+dy);
    for (const isl of ch.islands)
      if (Math.hypot(isl.x-ship.x, isl.y-ship.y) < 850) explored.add(isl.key);
    for (const rf of ch.reefs)
      if (Math.hypot(rf.x-ship.x, rf.y-ship.y) < 850) explored.add(rf.key);
    for (const fw of ch.flows)
      if (Math.hypot(fw.x-ship.x, fw.y-ship.y) < 850) explored.add(fw.key);
  }
}

let LIGHT = [-0.62, -0.48]; { const l=Math.hypot(LIGHT[0],LIGHT[1]); LIGHT=[LIGHT[0]/l,LIGHT[1]/l]; }

let envMul = 1, envGray = 0;
let curWaters = null, watersT = -1, lastFlaggedWaters = null;
let gateWarned = {};                                         // one entry warning per gated sea per session (v0.19.1)
function computeEnv() {
  envMul = lerp(OPTS.brightNights ? 0.74 : 0.58, 1, dayFactor());   // brighter night floor so the sea stays legible (raisable in Settings)
  envGray = weather.state==='storm'?0.55:weather.state==='rain'?0.42:weather.state==='cloudy'?0.18:0;
  const prevRegion = curRegion;
  curRegion = regionAt(ship.x, ship.y);
  if (curRegion !== prevRegion && REGIONS[curRegion] && REGIONS[curRegion].gate && !(player.up[REGIONS[curRegion].gate.comp] > 0) && !gateWarned[curRegion] && world.elapsed > 5){
    gateWarned[curRegion] = true;                             // warn BEFORE the drain teaches by punishment (v0.19.1)
    setToast('⚠ ' + REGIONS[curRegion].name + ' gnaws at unfitted hulls — turn back or fit the ' + REGIONS[curRegion].gate.name + ' (Shipyard)', true);
  }
  if (world.elapsed - watersT > 0.5){    // whose waters — throttled chunk scan
    watersT = world.elapsed;
    curWaters = homeWaters(ship.x, ship.y);
    if (curWaters && curWaters !== lastFlaggedWaters && world.elapsed > 8){
      setToast(curWaters === 'you' ? 'Entering your waters — the banner holds' : 'Entering '+FACTIONS[curWaters].adj+' waters — '+repWord(repOf(curWaters)));
      lastFlaggedWaters = curWaters;
    }
  }
}
function tintC(c) {
  let r=c[0]*envMul, g=c[1]*envMul, b=c[2]*envMul;
  if (envGray){ const m=(r+g+b)/3; r=lerp(r,m*1.05,envGray); g=lerp(g,m*1.04,envGray); b=lerp(b,m,envGray); }
  return [r|0,g|0,b|0];
}
const rgb = c => `rgb(${c[0]},${c[1]},${c[2]})`;
const col = c => rgb(tintC(c));
function quant(c, nd) { const t = nd>0.55?1 : nd>0.18?0.82 : 0.64; return [c[0]*t,c[1]*t,c[2]*t]; }
const qcol = (c, nd) => rgb(tintC(quant(c, nd)));
const lift = (c, m) => [Math.min(255,c[0]*m|0), Math.min(255,c[1]*m|0), Math.min(255,c[2]*m|0)];   // sunlit-side lighten

function polyFill(pts, fill, stroke) {
  bctx.beginPath();
  for (let i=0;i<pts.length;i++){ const p=pts[i]; i?bctx.lineTo(p[0],p[1]):bctx.moveTo(p[0],p[1]); }
  bctx.closePath();
  if (fill){ bctx.fillStyle=fill; bctx.fill(); }
  if (stroke){ bctx.strokeStyle=stroke; bctx.lineWidth=1; bctx.stroke(); }
}
function localNormal(a, b) {
  let nx=b[1]-a[1], ny=-(b[0]-a[0]);
  if (nx*(a[0]+b[0]) + ny*(a[1]+b[1]) < 0){ nx=-nx; ny=-ny; }
  const l=Math.hypot(nx,ny)||1; return [nx/l, ny/l];
}
function rotN(nx, ny) { const ch=Math.cos(ship.heading), sh=Math.sin(ship.heading); return [nx*ch-ny*sh, nx*sh+ny*ch]; }

/* -------------------------------- water ---------------------------------- */
function blurRGBA(d, W, H, wrapX){   // r=1 box blur on RGBA ImageData, premultiplied so
  // transparent cells don't drag colours toward black at zone borders; x optionally wraps
  const n=W*H, t=new Float32Array(n*4);
  for (let i=0;i<n;i++){ const a=d[i*4+3]/255; t[i*4]=d[i*4]*a; t[i*4+1]=d[i*4+1]*a; t[i*4+2]=d[i*4+2]*a; t[i*4+3]=d[i*4+3]; }
  const u=new Float32Array(n*4);
  for (let y=0;y<H;y++) for (let x=0;x<W;x++) for (let ch=0;ch<4;ch++){
    let s=0,c2=0; for (let k=-1;k<=1;k++){ let xx=x+k; if (wrapX) xx=(xx+W)%W; else if (xx<0||xx>=W) continue; s+=t[(y*W+xx)*4+ch]; c2++; }
    u[(y*W+x)*4+ch]=s/c2; }
  for (let y=0;y<H;y++) for (let x=0;x<W;x++) for (let ch=0;ch<4;ch++){
    let s=0,c2=0; for (let k=-1;k<=1;k++){ const yy=y+k; if (yy<0||yy>=H) continue; s+=u[(yy*W+x)*4+ch]; c2++; }
    t[(y*W+x)*4+ch]=s/c2; }
  for (let i=0;i<n;i++){ const a=t[i*4+3]/255;
    d[i*4]=a>0.003?t[i*4]/a:0; d[i*4+1]=a>0.003?t[i*4+1]/a:0; d[i*4+2]=a>0.003?t[i*4+2]/a:0; d[i*4+3]=t[i*4+3]; }
}
function blurField(d, W, H, r){   // separable box blur on the low-res colour field → soft borders
  const t = new Float32Array(W*H*3);
  for (let y=0;y<H;y++) for (let x=0;x<W;x++) for (let c=0;c<3;c++){ let s=0,n=0; for (let k=-r;k<=r;k++){ const xx=x+k; if(xx<0||xx>=W) continue; s+=d[(y*W+xx)*4+c]; n++; } t[(y*W+x)*3+c]=s/n; }
  for (let y=0;y<H;y++) for (let x=0;x<W;x++) for (let c=0;c<3;c++){ let s=0,n=0; for (let k=-r;k<=r;k++){ const yy=y+k; if(yy<0||yy>=H) continue; s+=t[(yy*W+x)*3+c]; n++; } d[(y*W+x)*4+c]=s/n; }
}
function drawWater() {
  // ocean colour sampled per-LOCATION across the visible sea, blurred, then upscaled →
  // a soft world-anchored gradient (ice/cursed/coral zones blend smoothly at their edges).
  const GW = 64, GH = 38;
  if (rbuf.width !== GW){ rbuf.width = GW; rbuf.height = GH; }
  // sample a little beyond the screen so edges have blur context
  const mX = (BW/2)/VIEW * 0.18, mY = (BH/2)/(VIEW*ISO_Y) * 0.18;
  const worldL = cam.x-(BW/2)/VIEW-mX, worldR = cam.x+(BW/2)/VIEW+mX;
  const worldT = cam.y-(BH/2)/(VIEW*ISO_Y)-mY, worldB = cam.y+(BH/2)/(VIEW*ISO_Y)+mY;
  if (!drawWater._img) drawWater._img = rctx.createImageData(GW, GH);   // reused — per-frame allocs churn the GC (v0.19.4)
  const img = drawWater._img, d = img.data;
  for (let gy=0; gy<GH; gy++) for (let gx=0; gx<GW; gx++){
    const wx = lerp(worldL, worldR, (gx+0.5)/GW), wy = lerp(worldT, worldB, (gy+0.5)/GH);
    const rt = REGIONS[regionAt(wx, wy)].tint;
    const c = tintC([PAL.SEA_DEEP[0]+rt[0], PAL.SEA_DEEP[1]+rt[1], PAL.SEA_DEEP[2]+rt[2]]);
    const i = (gy*GW+gx)*4; d[i]=c[0]; d[i+1]=c[1]; d[i+2]=c[2]; d[i+3]=255;
  }
  blurField(d, GW, GH, 4);   // <- widens hard region steps into smooth bands, kills the shimmer
  rctx.putImageData(img, 0, 0);
  bctx.imageSmoothingEnabled = true;
  // draw with the same margin offset so world alignment is preserved
  const sx0 = -mX*VIEW, sy0 = -mY*VIEW*ISO_Y, sw = BW + 2*mX*VIEW, sh = BH + 2*mY*VIEW*ISO_Y;
  bctx.drawImage(rbuf, 0, 0, GW, GH, sx0, sy0, sw, sh);
  bctx.imageSmoothingEnabled = false;
  // subtle neutral depth shading (not regional)
  const g = bctx.createLinearGradient(0,0,0,BH);
  g.addColorStop(0, 'rgba(255,255,255,0.045)'); g.addColorStop(0.5, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,10,18,0.26)');
  bctx.fillStyle = g; bctx.fillRect(0,0,BW,BH);

  // chunky animated wavelets in world space
  const rough = seaRoughness();
  const step = 30;
  const halfW = (BW/2)/VIEW + step, halfH = (BH/2)/(VIEW*ISO_Y) + step;
  const x0 = cam.x - halfW, x1 = cam.x + halfW, y0 = cam.y - halfH, y1 = cam.y + halfH;
  const fx0 = Math.floor(x0/step)*step, fy0 = Math.floor(y0/step)*step;
  const foam = tintC(PAL.FOAM), midc = tintC(PAL.SEA_MID);
  const t = world.elapsed;
  for (let wy = fy0; wy < y1; wy += step) {
    for (let wx = fx0; wx < x1; wx += step) {
      const jx = hash2(wx|0, wy|0, 3)*step*0.7, jy = hash2(wy|0, wx|0, 4)*step*0.7;
      const px = wx + jx, py = wy + jy;
      const ph = Math.sin(px*0.05 + py*0.03 + t*1.6) + Math.sin(px*0.013 - t*0.7);
      if (ph > 1.15) {
        const p = proj(px, py, 0);
        bctx.fillStyle = `rgba(${foam[0]},${foam[1]},${foam[2]},${0.10+rough*0.13})`;
        bctx.fillRect(p[0], p[1], 2, 1);
      } else if (ph < -1.25) {
        const p = proj(px, py, 0);
        bctx.fillStyle = `rgba(${midc[0]},${midc[1]},${midc[2]},0.4)`;
        bctx.fillRect(p[0], p[1], 2, 1);
      }
    }
  }
}

/* roaming storm cells — dark squall discs with falling rain, visible from outside */
function drawStorms(){
  for (const s of storms){
    const p = proj(s.x, s.y, 0), pr = s.r*VIEW;
    if (p[0] < -pr-40 || p[0] > BW+pr+40 || p[1] < -pr*ISO_Y-40 || p[1] > BH+pr*ISO_Y+40) continue;
    const g = bctx.createRadialGradient(p[0], p[1], pr*0.18, p[0], p[1], pr);
    g.addColorStop(0, 'rgba(14,20,30,0.38)'); g.addColorStop(0.78, 'rgba(14,20,30,0.24)'); g.addColorStop(1, 'rgba(14,20,30,0)');
    bctx.fillStyle = g; bctx.beginPath(); bctx.ellipse(p[0], p[1], pr, pr*ISO_Y, 0, 0, TAU); bctx.fill();
    // rain shafts inside the squall
    const t = world.elapsed;
    bctx.strokeStyle='rgba(196,212,224,0.22)'; bctx.lineWidth=1; bctx.beginPath();
    for (let i=0;i<44;i++){
      const a2 = hash2(i, s.seed, 3)*TAU, d2 = Math.sqrt(hash2(i, s.seed, 7))*s.r*0.88;
      const fall = (t*300 + i*57) % 110;
      const q = proj(s.x + Math.cos(a2)*d2, s.y + Math.sin(a2)*d2*0.9 + fall*0.3, 26 - fall*0.24);
      bctx.moveTo(q[0], q[1]); bctx.lineTo(q[0]-2, q[1]+5);
    }
    bctx.stroke();
  }
}
/* riptide lanes & whirlpools — animated water flow drawn flat on the sea */
function drawFlow(fl){
  const f = tintC(PAL.FOAM), t = world.elapsed;
  if (fl.kind==='rip'){
    bctx.strokeStyle = `rgba(${f[0]},${f[1]},${f[2]},0.30)`; bctx.lineWidth = 1; bctx.beginPath();
    const ca = Math.cos(fl.dir), sa = Math.sin(fl.dir);
    for (let i=0;i<12;i++){
      const off = (hash2(i, fl.x|0, 3)-0.5) * fl.r*1.5;
      const along = ((hash2(i, fl.y|0, 5)*fl.r*2 + t*70) % (fl.r*2)) - fl.r;
      const px2 = fl.x + ca*along - sa*off, py2 = fl.y + sa*along + ca*off;
      if (Math.hypot(px2-fl.x, py2-fl.y) > fl.r*0.96) continue;
      const q0 = proj(px2, py2, 0), q1 = proj(px2 + ca*16, py2 + sa*16, 0);
      bctx.moveTo(q0[0], q0[1]); bctx.lineTo(q1[0], q1[1]);
    }
    bctx.stroke();
  } else {
    const c0 = proj(fl.x, fl.y, 0);                                          // dark eye
    bctx.fillStyle = 'rgba(8,14,24,0.38)';
    bctx.beginPath(); bctx.ellipse(c0[0], c0[1], fl.r*0.28*VIEW, fl.r*0.28*VIEW*ISO_Y, 0, 0, TAU); bctx.fill();
    bctx.strokeStyle = `rgba(${f[0]},${f[1]},${f[2]},0.32)`; bctx.lineWidth = 1;
    for (let k=0;k<3;k++){                                                   // rotating spiral arms
      bctx.beginPath();
      for (let j=0;j<=9;j++){
        const ang = -t*1.3 + k*(TAU/3) + j*0.42, rad = fl.r*(0.2 + j/9*0.75);
        const q = proj(fl.x + Math.cos(ang)*rad, fl.y + Math.sin(ang)*rad, 0);
        j ? bctx.lineTo(q[0], q[1]) : bctx.moveTo(q[0], q[1]);
      }
      bctx.stroke();
    }
  }
}
/* drifting iceberg — pale faceted floe with a raised crown */
function drawBerg(bg){
  const f = tintC(PAL.FOAM), n = bg.pts.length;
  const ring = (s, z) => bg.pts.map(p => proj(bg.x + Math.cos(p.a)*p.r*s, bg.y + Math.sin(p.a)*p.r*s, z));
  polyFill(ring(1.25, 0), `rgba(${f[0]},${f[1]},${f[2]},0.18)`, null);
  if (drawSpriteBuf(sprVar('iceberg', hash2(bg.seed, 3, 61)), bg.x, bg.y, 0.4, bg.r*1.5 + 6)) return;   // sprite floe over the foam halo
  polyFill(ring(1, 0.8), col([214,226,236]), col([120,146,176]));            // waterline floe
  const g = ring(0.62, 0.8), tp = ring(0.62, bg.H);
  for (let i=0;i<n;i++){
    const mid = (bg.pts[i].a + bg.pts[(i+1)%n].a)/2, ny = Math.sin(mid);
    if (ny < -0.25) continue;
    const nd = clamp(Math.cos(mid)*LIGHT[0] + ny*LIGHT[1], 0, 1);
    polyFill([g[i], g[(i+1)%n], tp[(i+1)%n], tp[i]], qcol([176,198,220], nd), col([120,146,176]));
  }
  polyFill(tp, col([236,244,250]), col([150,176,204]));                      // crown
}
/* reef / sandbar patches — pale shallow water with foam speckles (sandbars show dry sand) */
function drawReef(rf){
  const f = tintC(PAL.FOAM);
  const ring = (s, z) => rf.pts.map(p => proj(rf.x + Math.cos(p.a)*p.r*s, rf.y + Math.sin(p.a)*p.r*s, z));
  polyFill(ring(1.18, 0), `rgba(${f[0]},${f[1]},${f[2]},0.10)`, null);
  polyFill(ring(1, 0), `rgba(${f[0]},${f[1]},${f[2]},0.16)`, null);
  const seed = (rf.x*7 + rf.y*13) | 0;
  for (let i=0;i<10;i++){                                                   // breaking-water speckles
    const a = hash2(i, seed, 3)*TAU, d = Math.sqrt(hash2(i, seed, 5)) * rf.r * 0.9;
    const p = proj(rf.x + Math.cos(a)*d, rf.y + Math.sin(a)*d, 0);
    const tw = 0.35 + 0.3*Math.sin(world.elapsed*2.4 + i*1.7);
    bctx.fillStyle = `rgba(${f[0]},${f[1]},${f[2]},${tw})`; bctx.fillRect(p[0], p[1], 2, 1);
  }
  if (rf.kind==='sandbar'){                                                 // dry sand sliver above water
    const B = BIOME[REGIONS[regionAt(rf.x,rf.y)].biome] || BIOME.green;
    polyFill(ring(0.5, 0.8), col(B.sand), col(quant(B.sand, 0)));
  }
}
/* one squat rounded rock mound — wide base, low rise, gently jittered rims.
   Shared by the sea rocks and the island summit outcrops (tall tapered forms
   read as footballs / pyramids — user feedback, twice). */
function drawRockMound(x, y, z0, r, h, seed, RC, RCD, capC){
  const m = 7, pts2 = [];
  for (let i=0;i<m;i++){ const a = i/m*TAU;
    pts2.push({ a, r0: r*lerp(0.88,1.12,hash2(i,seed,151)), r1: r*0.62*lerp(0.85,1.15,hash2(i,seed+3,153)) }); }
  const g  = pts2.map(p => proj(x + Math.cos(p.a)*p.r0, y + Math.sin(p.a)*p.r0, z0));
  const tp = pts2.map(p => proj(x + Math.cos(p.a)*p.r1, y + Math.sin(p.a)*p.r1, z0 + h));
  for (let i=0;i<m;i++)   // plug pass — jittered rims open back-face gaps, fill dark first
    polyFill([g[i], g[(i+1)%m], tp[(i+1)%m], tp[i]], col(quant(RC, 0)), null);
  for (let i=0;i<m;i++){
    const a = pts2[i].a, b2 = pts2[(i+1)%m].a;
    const mid = a + (((b2 - a + Math.PI)%TAU)-Math.PI)/2, nyf = Math.sin(mid);
    if (nyf < -0.25) continue;
    const nd = clamp(Math.cos(mid)*LIGHT[0] + nyf*LIGHT[1], 0, 1);
    polyFill([g[i], g[(i+1)%m], tp[(i+1)%m], tp[i]], qcol(RC, nd), col(RCD));
  }
  polyFill(tp, col(capC || RC), col(RCD));
}
function drawIsland(isl) {
  const n = isl.pts.length, B = BIOME[isl.biome] || BIOME.green;
  const ring = (s, z) => isl.pts.map(p => proj(isl.x + Math.cos(p.a)*p.r*s, isl.y + Math.sin(p.a)*p.r*s, z));
  const f = tintC(PAL.FOAM);
  // shallow shelf — pale turquoise apron around the island (= the shoal scrape zone)
  if (!isl.rock){
    const s1 = isl.continent ? 1.12 : 1.48, s2 = isl.continent ? 1.06 : 1.24;
    polyFill(ring(s1, 0), `rgba(${f[0]},${f[1]},${f[2]},0.10)`, null);
    polyFill(ring(s2, 0), `rgba(${f[0]},${f[1]},${f[2]},0.12)`, null);
  }
  // foam hugging the coast
  for (let k=0;k<2;k++)
    polyFill(ring(1.10 - k*0.045, 0), `rgba(${f[0]},${f[1]},${f[2]},${0.26 - k*0.10})`, null);
  // sea rock: 1–3 low rounded mounds side by side — wide, squat, barely above
  // the swell (tall tapered stacks read as footballs — user feedback).
  // The island polygon underneath still handles collision/shelf/foam unchanged.
  if (isl.rock){
    const RC = [136,128,116], RCD = [96,90,82];   // bare weathered stone — sea rocks ignore the biome palette
    const hsd = isl.x|0;
    const capC = isl.biome === 'ice' ? [230,240,246] : hash2(hsd, 5, 109) > 0.6 ? [206,202,192] : null;
    const mounds = [{ dx:0, dy:0, r: isl.r*0.85, h: isl.H*0.55 + isl.r*0.28, cap: capC, sd: hsd }];
    const nL = 1 + (hash2(hsd, 1, 111)*2.4|0);   // 1–3 mounds per rock
    for (let k=1;k<nL;k++){
      const a3 = hash2(hsd, k*5, 157)*TAU;
      mounds.push({ dx: Math.cos(a3)*isl.r*0.75, dy: Math.sin(a3)*isl.r*0.55,
                    r: isl.r*lerp(0.35, 0.55, hash2(k, hsd, 163)), h: isl.H*0.4 + isl.r*0.16, cap: null, sd: hsd + k*11 });
    }
    mounds.sort((m1, m2) => m1.dy - m2.dy);      // back-to-front
    for (const mn of mounds) drawRockMound(isl.x + mn.dx, isl.y + mn.dy, 0.8, mn.r, mn.h, mn.sd, RC, RCD, mn.cap);
    return;
  }
  // beach ring — outlined in darkened sand, not black (black rims read cartoony)
  polyFill(ring(1, 1.2), col(B.sand), col(quant(B.sand, 0)));
  // terraced tiers: vertical cliff walls + flat tops, stacked inward and upward
  const tiers = isl.tiers || [{ s:1, h:isl.H }];
  let zBase = 1.2;
  for (let ti=0; ti<tiers.length; ti++){
    const t = tiers[ti], g = ring(t.s, zBase), tp = ring(t.s, t.h);
    for (let i=0;i<n;i++){
      const a = isl.pts[i].a, b = isl.pts[(i+1)%n].a;
      let mid = (a + (((b - a + Math.PI)%TAU)-Math.PI)/2);
      const ny = Math.sin(mid);
      if (ny < -0.25) continue;
      const nd = clamp(Math.cos(mid)*LIGHT[0] + ny*LIGHT[1], 0, 1);
      polyFill([g[i], g[(i+1)%n], tp[(i+1)%n], tp[i]], qcol(B.cliff, nd), col(B.cliffD));
    }
    const topC = ti%2 ? B.top2 : B.top;
    polyFill(tp, col(topC), col(quant(topC, 0)));
    if (ti === tiers.length-1)
      polyFill(ring(t.s*0.55, t.h), col(ti%2 ? B.top : B.top2), null);
    zBase = t.h;
  }
  // surface texture — sparse seeded flecks on sand + tier tops so the flat
  // fills don't read as cartoon paper
  {
    const radAt2 = a => { const fi = ((a%TAU)+TAU)%TAU/TAU*n, i0 = Math.floor(fi)%n, i1 = (i0+1)%n; return lerp(isl.pts[i0].r, isl.pts[i1].r, fi - Math.floor(fi)); };
    const sd4 = isl.x|0, fn2 = Math.min(70, (isl.r/4)|0);
    for (let i=0;i<fn2;i++){
      const a2 = hash2(i, sd4, 141)*TAU, dd = Math.sqrt(hash2(sd4, i, 143));
      const rr2 = dd * radAt2(a2) * 0.9;
      let tz = 1.2, tc = B.sand;
      for (let k=tiers.length-1;k>=0;k--){ if (rr2 <= tiers[k].s*radAt2(a2)*0.88){ tz = tiers[k].h; tc = (k%2 ? B.top2 : B.top); break; } }
      const p2 = proj(isl.x + Math.cos(a2)*rr2, isl.y + Math.sin(a2)*rr2, tz);
      bctx.fillStyle = col(hash2(i, sd4+9, 149) > 0.5 ? lift(tc, 1.1) : quant(tc, 0.3));
      bctx.fillRect(p2[0], p2[1], 2, 1);
    }
  }
  // summit outcrop on some larger islands — two stacked rounded slabs in the
  // island's stone tones (the old cone-to-a-point read as a weird pyramid)
  if (isl.peak){
    const pk = isl.peak, ph = pk.h - pk.zb;
    drawRockMound(pk.x, pk.y, pk.zb, pk.r*1.15, ph*0.55, pk.seed, B.cliff, B.cliffD, null);
    drawRockMound(pk.x + pk.r*0.22, pk.y - pk.r*0.15, pk.zb + ph*0.5, pk.r*0.62, ph*0.45, pk.seed + 7,
                  B.cliff, B.cliffD, isl.biome === 'ice' ? [230,240,246] : null);
  }
  // biome flora v2 — hash-picked silhouette variants per tree, flat 3-tone
  // shading (lit upper-left per LIGHT). Canopies are jittered radial polygons
  // (orb), not ellipses — circles read too geometric; outlines are darkened
  // foliage, not black (black reads cartoony). Each tree carries tr.z.
  const bi = isl.biome;
  const OUT = col(quant(B.treeD || B.tree, 0.3));
  const orb = (x, y, r, sq, sd2, c, st) => {
    const m = 9; bctx.beginPath();
    for (let i=0;i<m;i++){
      const a2 = (i + 0.5*hash2(i, sd2, 119))/m*TAU, rr = r * lerp(0.76, 1.24, hash2(i, sd2, 117));
      const px2 = x + Math.cos(a2)*rr, py2 = y + Math.sin(a2)*rr*sq;
      i ? bctx.lineTo(px2, py2) : bctx.moveTo(px2, py2);
    }
    bctx.closePath();
    if (c){ bctx.fillStyle = c; bctx.fill(); }
    if (st){ bctx.strokeStyle = st; bctx.lineWidth = 1; bctx.stroke(); }
  };
  for (const tr of isl.trees) {
    if (bi==='desert' && (tr.s < 0.9)) continue;   // sparse desert
    const zB = tr.z !== undefined ? tr.z : isl.H;
    const base = proj(tr.x, tr.y, zB);
    const th = (10 + tr.s*8) * (bi==='tropic'?1.4:1);
    const v = hash2(tr.x|0, tr.y|0, 53), v2 = hash2(tr.y|0, tr.x|0, 57);
    if (bi==='ice'){
      // stacked snow pine: 2–3 dark tiers, snow settling on each apex
      const tiersN = tr.s > 1.05 ? 3 : 2, fr = 3.5 + tr.s*3;
      const tp0 = proj(tr.x, tr.y, zB + th*0.2);
      bctx.strokeStyle = col(B.trunk); bctx.lineWidth = 1.5;
      bctx.beginPath(); bctx.moveTo(base[0],base[1]); bctx.lineTo(tp0[0],tp0[1]); bctx.stroke();
      for (let k=0;k<tiersN;k++){
        const a2 = proj(tr.x, tr.y, zB + th*(0.14 + 0.3*k)), t2 = proj(tr.x, tr.y, zB + th*(0.6 + 0.26*k));
        const w = fr * (1 - k*0.26);
        polyFill([[a2[0]-w,a2[1]],[a2[0]+w,a2[1]],t2], col(B.tree), OUT);
        const my = t2[1] + (a2[1]-t2[1])*0.42, sw = w*0.5;
        polyFill([t2, [t2[0]-sw,my], [t2[0]+sw,my]], col([230,240,246]), null);
      }
    } else if (bi==='dead'){
      // gnarled dead tree: bent trunk + forking wind-swept branches
      const lean = (v-0.5)*3;
      const tp = proj(tr.x+lean, tr.y, zB+th*0.95), mid = proj(tr.x+lean*0.4, tr.y, zB+th*0.5);
      bctx.strokeStyle = col(B.trunk); bctx.lineCap = 'round';
      bctx.lineWidth = Math.max(1, 2*tr.s);
      bctx.beginPath(); bctx.moveTo(base[0],base[1]); bctx.quadraticCurveTo(mid[0],mid[1],tp[0],tp[1]); bctx.stroke();
      bctx.lineWidth = Math.max(1, 1.1*tr.s); bctx.strokeStyle = col(B.treeD);
      const nb = 2 + (v2 > 0.5 ? 1 : 0);
      for (let k=0;k<nb;k++){
        const bz = 0.42 + 0.2*k, side = (k%2 ? 1 : -1) * (0.6 + v2*0.8), fz = bz + 0.3;
        const b0 = proj(tr.x+lean*bz, tr.y, zB+th*bz);
        const b1 = proj(tr.x+lean*bz + side*3.4*tr.s, tr.y, zB+th*fz);
        const b2 = proj(tr.x+lean*bz + side*5.2*tr.s, tr.y, zB+th*(fz+0.04));
        bctx.beginPath(); bctx.moveTo(b0[0],b0[1]); bctx.quadraticCurveTo(b1[0],b1[1],b2[0],b2[1]); bctx.stroke();
      }
      bctx.lineCap = 'butt';
    } else if (bi==='desert'){
      // saguaro: rounded column + 1–2 elbow arms, sunlit ridge, rare bloom
      const cw = Math.max(2, 3*tr.s), tp = proj(tr.x, tr.y, zB+th*0.8);
      bctx.lineCap = 'round';
      bctx.strokeStyle = col(B.tree); bctx.lineWidth = cw;
      bctx.beginPath(); bctx.moveTo(base[0],base[1]); bctx.lineTo(tp[0],tp[1]); bctx.stroke();
      const arms = 1 + (v > 0.55 ? 1 : 0);
      for (let k=0;k<arms;k++){
        const side = (k ? -1 : 1) * (v2 > 0.5 ? 1 : -1), az = 0.34 + k*0.2;
        const a0 = proj(tr.x, tr.y, zB+th*az);
        const a1 = proj(tr.x+side*3.2*tr.s, tr.y, zB+th*az);
        const a2 = proj(tr.x+side*3.2*tr.s, tr.y, zB+th*(az+0.28));
        bctx.lineWidth = cw*0.7;
        bctx.beginPath(); bctx.moveTo(a0[0],a0[1]); bctx.lineTo(a1[0],a1[1]); bctx.lineTo(a2[0],a2[1]); bctx.stroke();
      }
      bctx.strokeStyle = col(lift(B.tree,1.28)); bctx.lineWidth = 1;
      bctx.beginPath(); bctx.moveTo(base[0]-cw*0.25, base[1]); bctx.lineTo(tp[0]-cw*0.25, tp[1]); bctx.stroke();
      if (v2 > 0.82){ bctx.fillStyle = col([234,168,150]); bctx.fillRect(tp[0]-1, tp[1]-2, 2, 2); }
      bctx.lineCap = 'butt';
    } else if (bi==='tropic'){
      // palm: curved leaning trunk, frond fan (alternating tones), coconuts
      const lean = (v-0.5)*6*tr.s;
      const top2 = proj(tr.x+lean, tr.y, zB+th), mid2 = proj(tr.x+lean*0.35, tr.y, zB+th*0.5);
      bctx.strokeStyle = col(B.trunk); bctx.lineCap = 'round'; bctx.lineWidth = Math.max(1.5, 2*tr.s);
      bctx.beginPath(); bctx.moveTo(base[0],base[1]); bctx.quadraticCurveTo(mid2[0],mid2[1],top2[0],top2[1]); bctx.stroke();
      const fn = 5 + (v2 > 0.5 ? 1 : 0), fl = 4.5 + tr.s*3.5;
      bctx.lineWidth = Math.max(1.2, 1.5*tr.s);
      for (let k=0;k<fn;k++){
        const fa = Math.PI*(0.06 + 0.88*(k/(fn-1)));
        const fx = Math.cos(fa)*fl*1.25, fy = -Math.sin(fa)*fl*0.7;
        bctx.strokeStyle = col(k%2 ? B.treeD : B.tree);
        bctx.beginPath(); bctx.moveTo(top2[0], top2[1]);
        bctx.quadraticCurveTo(top2[0]+fx, top2[1]+fy, top2[0]+fx*1.35, top2[1]+fy*0.25+fl*0.5);
        bctx.stroke();
      }
      if (tr.s > 0.85){ bctx.fillStyle = col([116,84,48]); bctx.fillRect(top2[0]-2, top2[1], 2, 2); bctx.fillRect(top2[0]+1, top2[1]+1, 2, 2); }
      bctx.lineCap = 'butt';
    } else {
      // leafy green — three silhouettes: round oak / cloud canopy / tall poplar
      const trunkTop = proj(tr.x, tr.y, zB + th*0.5);
      bctx.strokeStyle = col(B.trunk); bctx.lineWidth = Math.max(1, 2*tr.s);
      bctx.beginPath(); bctx.moveTo(base[0],base[1]); bctx.lineTo(trunkTop[0],trunkTop[1]); bctx.stroke();
      const fol = proj(tr.x, tr.y, zB + th), fr = 5 + tr.s*4;
      const sd = ((tr.x*7)|0) ^ ((tr.y*13)|0);   // per-tree canopy wobble seed
      if (v < 0.4){
        orb(fol[0], fol[1], fr, 0.92, sd, col(B.tree), OUT);
        orb(fol[0]+fr*0.3, fol[1]+fr*0.3, fr*0.5, 0.9, sd+1, col(B.treeD), null);
        orb(fol[0]-fr*0.34, fol[1]-fr*0.34, fr*0.4, 0.85, sd+2, col(lift(B.tree,1.22)), null);
      } else if (v < 0.75){
        orb(fol[0]-fr*0.55, fol[1]+fr*0.18, fr*0.6, 0.88, sd, col(B.tree), OUT);
        orb(fol[0]+fr*0.58, fol[1]+fr*0.22, fr*0.55, 0.86, sd+1, col(B.treeD), OUT);
        orb(fol[0]+fr*0.02, fol[1]-fr*0.3, fr*0.66, 0.86, sd+2, col(B.tree), OUT);
        orb(fol[0]-fr*0.28, fol[1]-fr*0.5, fr*0.34, 0.83, sd+3, col(lift(B.tree,1.22)), null);
      } else {
        const pf = proj(tr.x, tr.y, zB + th*1.25), cy2 = (pf[1]+fol[1])/2, hh = (fol[1]-pf[1])*0.5 + fr*0.6;
        orb(pf[0], cy2, fr*0.55, hh/(fr*0.55), sd, col(B.tree), OUT);
        orb(pf[0]-fr*0.2, cy2 - hh*0.25, fr*0.26, (hh*0.55)/(fr*0.26), sd+1, col(lift(B.tree,1.2)), null);
        orb(pf[0]+fr*0.18, cy2 + hh*0.3, fr*0.28, (hh*0.45)/(fr*0.28), sd+2, col(B.treeD), null);
      }
    }
  }
}

/* ---- custom sprite assets (optional; every draw falls back to the code art
   when a sprite is absent, so we can drop them in one at a time). Source sprites

  if (tattered){
    polyFill([ lp(mx,-s.sw,HT+s.top), lp(mx,s.sw,HT+s.top), lp(mx+belly, s.sw*0.7, HT+s.bot+2),
               lp(mx+belly*0.7, s.sw*0.15, HT+s.bot-1), lp(mx+belly, -s.sw*0.55, HT+s.bot+2) ],
             col(sailCol), col(PAL.OUTLINE));

/* lantern: a warm pool of light around the boat that cuts the dark */
function lanternActive(){ return player.lantern && !ship.sinking && ((1-dayFactor()) > 0.12 || weather.fog > 0.12); }
function drawLantern(night){
  if (!player.lantern || ship.sinking) return;
  const dark = clamp(night*1.15 + weather.fog*0.7, 0, 1);
  if (dark < 0.1) return;
  const flick = 0.92 + 0.08*Math.sin(world.elapsed*9) + 0.04*Math.sin(world.elapsed*23);
  const p = proj(ship.x, ship.y, 8);
  const R = UP.lanternR() * VIEW, I = UP.lanternI() * dark * flick;
  const g = bctx.createRadialGradient(p[0], p[1], 0, p[0], p[1], R);
  g.addColorStop(0,   `rgba(255,228,158,${0.55*I})`);
  g.addColorStop(0.45,`rgba(255,206,120,${0.22*I})`);
  g.addColorStop(1,   'rgba(255,196,110,0)');

/* --------------------------- overlays (buffer) --------------------------- */
function drawOverlays() {

  if (ship.dmgFlash > 0){ bctx.fillStyle = `rgba(180,40,30,${clamp(ship.dmgFlash,0,1)*0.34})`; bctx.fillRect(0,0,BW,BH); }

/* ============ nautical UI chrome — brass fittings + varnished wood ============

/* The open map (M) has two modes you scroll between: a ship-centered LOCAL chart

/* one coarse scan of the fixed world → where the exclusive goods / boss waters live.
   Each region contributes SEVERAL well-spaced points so the sea doesn't read empty. */
function mapPois(){
  if (_mapPois) return _mapPois;
  const GX=120, GY=96, reg=new Array(GX*GY), cells={};
  for (let gy=0;gy<GY;gy++) for (let gx=0;gx<GX;gx++) reg[gy*GX+gx]=regionAt((gx+0.5)/GX*WORLD_W,(gy+0.5)/GY*WORLD_H);
  for (let gy=0;gy<GY;gy++) for (let gx=0;gx<GX;gx++){
    const r=reg[gy*GX+gx]; let sc=0;                             // score = how 'inland' in its own region
    for (let dy=-2;dy<=2;dy++) for (let dx=-2;dx<=2;dx++){
      const yy=gy+dy, xx=(gx+dx+GX)%GX; if (yy<0||yy>=GY) continue;
      if (reg[yy*GX+xx]===r) sc++;
    }
    (cells[r]=cells[r]||[]).push({sc, x:(gx+0.5)/GX*WORLD_W, y:(gy+0.5)/GY*WORLD_H});
  }
  const picks=(r,k,minD)=>{                                      // top-k dense cells, min separation
    const arr=(cells[r]||[]).slice().sort((a,b)=>b.sc-a.sc), out=[];
    for (const c of arr){ if (out.length>=k) break;
      if (out.every(o=>Math.hypot(wrapDX(o.x,c.x), o.y-c.y)>minD)) out.push(c); }
    return out;
  };
  const byRegion={};                                             // origin goods ◆ + endemic fish ≋, grouped per region
  for (const [id,g] of Object.entries(GOODS)){
    const r=g.origin||g.endemic; if (!r||!cells[r]) continue;
    (byRegion[r]=byRegion[r]||[]).push((g.origin?'◆ ':'≋ ')+g.name);
  }
  const goods=[];
  for (const [r,lines] of Object.entries(byRegion))
    for (const p of picks(r, 4, 11000)) goods.push({x:p.x, y:p.y, lines, region:REGIONS[r].name});
  const bosses=[];
  for (const p of picks('cursed', 2, 16000)) bosses.push({x:p.x, y:p.y, label:'⚠ Leviathan waters'});

// click the open chart to drop/steer a waypoint (or click the marker to clear it)
function mapClick(sx, sy){
  for (const b of mapBtnRects)                                   // header buttons claim the click first
    if (sx>=b.x && sx<=b.x+b.w && sy>=b.y && sy<=b.y+b.h){
      SFX.click();
      if (b.k==='zoomin') mapZoomIn();
      else if (b.k==='zoomout') mapZoomOut();
      else if (b.k==='zoombox'){ if (!mapWorldView) ui.zoomEdit = { buf:'' }; }
      else mapFilter[b.k] = !mapFilter[b.k];
      return;
    }
  const g = mapGeom; if (!g) return;
  let wx, wy;
  if (g.world){
    if (sx<g.dx || sx>g.dx+g.dw || sy<g.dy || sy>g.dy+g.dh) return;
    const wrapped = (sx-g.dx)/g.dw*WORLD_W;
    wy = (sy-g.dy)/g.dh*WORLD_H;
    wx = wrapped + Math.round((ship.x-wrapped)/WORLD_W)*WORLD_W;   // nearest period copy → steer the short way
  } else {
    if (sx<g.mx || sx>g.mx+g.size || sy<g.my || sy>g.my+g.size) return;
    wx = g.sx + (sx-g.cx)/g.scale; wy = g.sy + (sy-g.cy)/g.scale;
  }
  wy = clamp(wy, 0, WORLD_H);
  if (waypoint){   // click near the existing marker clears it
    const mp = g.world ? [g.dx+wrapx(waypoint.x)/WORLD_W*g.dw, g.dy+clamp(waypoint.y,0,WORLD_H)/WORLD_H*g.dh]
                       : [g.cx+(waypoint.x-g.sx)*g.scale, g.cy+(waypoint.y-g.sy)*g.scale];
    if (Math.hypot(sx-mp[0], sy-mp[1]) < 12){ waypoint = null; setToast('Waypoint cleared'); return; }
  }

}

function actionIcon(kind, cx, cy, s){
  ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round';
  const C='#e9dec6', D='#b0a488', A='#ffd98a';
  ctx.strokeStyle=C; ctx.fillStyle=C; ctx.lineWidth=Math.max(1.4, s*0.13);

    ctx.beginPath(); ctx.moveTo(cx-s,cy-s*0.7); ctx.lineTo(cx+s,cy-s*0.7); ctx.lineTo(cx,cy+s); ctx.closePath(); ctx.stroke();
    ctx.lineWidth=1;
    for (let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(cx+i*s*0.4, cy-s*0.7); ctx.lineTo(cx, cy+s); ctx.stroke(); }
    for (let j=1;j<=2;j++){ const y=cy-s*0.7+j*s*0.58, wn=s*(1-j*0.33); ctx.beginPath(); ctx.moveTo(cx-wn,y); ctx.lineTo(cx+wn,y); ctx.stroke(); }

    ctx.beginPath(); ctx.moveTo(cx-s*0.52, cy-s*0.18); ctx.lineTo(cx+s*0.52, cy-s*0.18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-s*0.72, cy+s*0.28); ctx.quadraticCurveTo(cx-s*0.72, cy+s*0.78, cx, cy+s*0.72); ctx.stroke();

  } else if (kind==='chart'){

    ctx.strokeStyle=D; ctx.lineWidth=1.2; ctx.strokeRect(cx-s*0.82, cy-s*0.68, s*1.64, s*1.36);
    ctx.strokeStyle='#9a6038'; ctx.setLineDash([2,2]); ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(cx-s*0.5,cy+s*0.4); ctx.lineTo(cx+s*0.35,cy-s*0.28); ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle='#c0402f'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(cx+s*0.24,cy-s*0.44); ctx.lineTo(cx+s*0.54,cy-s*0.14); ctx.moveTo(cx+s*0.54,cy-s*0.44); ctx.lineTo(cx+s*0.24,cy-s*0.14); ctx.stroke();
  } else if (kind==='hold'){
    ctx.fillStyle=D; ctx.fillRect(cx-s*0.72, cy-s*0.56, s*1.44, s*1.2);
    ctx.fillStyle='#6e4c28'; ctx.fillRect(cx-s*0.72, cy-s*0.1, s*1.44, s*0.14); ctx.fillRect(cx-s*0.07, cy-s*0.56, s*0.14, s*1.2);
    ctx.fillStyle=C; ctx.fillRect(cx-s*0.72, cy-s*0.56, s*1.44, s*0.14);
  } else if (kind==='mute'){
    ctx.fillStyle=C; ctx.beginPath(); ctx.arc(cx-s*0.28, cy+s*0.5, s*0.3, 0, TAU); ctx.fill();
    ctx.fillRect(cx-s*0.02, cy-s*0.72, s*0.16, s*1.24);

/* bottom-centre action bar: SAIL/SPEED gauges + compass + clock + hotbar + hull bar */

    let msg = '';
    if (fishing.active) msg = 'Fishing…  ·  Space to stow the net' + (ship.speed > 45 ? '  ·  slower is better' : '');
    else if (threat) msg = (cannon.reload>0 ? 'Reloading…' : 'Click to fire cannon') + '  ·  aim with mouse';
    else {
      const d = nearbyDock();
      const ruin = nearRuin();
      if (d) msg = '⚓  Space to dock at ' + d.port.name;
      else if (cap) msg = 'Space to hail ' + cap.captain;
      else if (ruin) msg = '⚑  Space to claim the ruin  ·  800c';
      else if (player.hold && holdDist(ship.x, ship.y) < 280) msg = '⌂  Space to enter your stronghold';
      else if (nearBuildSite()) msg = '⚒  Space to raise an outpost here  ·  '+OUTPOST_COST+'c';
      else { const ga = groundAt(ship.x, ship.y);
        msg = ga.rich > 0.35 ? 'Space to cast net  ·  rich waters'
            : (ga.ground && stockOf(ga.ground) < 0.3) ? 'Space to cast net  ·  waters fished thin'
            : 'Space to cast net'; }
    }
    if (msg) {
      const py0 = H - 142 - 12 - 44;                       // sit just above the action bar
      ctx.save(); ctx.font=fnt(13);
      const tw = ctx.measureText(msg).width;
      chromePanel(W/2-tw/2-18, py0, tw+36, 34, {r:8,fw:3});
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=UICOL.cream; ctx.fillText(msg, W/2, py0+17); ctx.restore();
    }
  }
  // catch / loot / event toast (hidden under the open chart — it would peek out at the edges)
  if (fishing.toastT > 0 && !ui.port && !ui.mapOpen && !ui.paused) {
    ctx.save(); ctx.globalAlpha = clamp(fishing.toastT,0,1); ctx.textAlign='center';
    ctx.fillStyle = fishing.urgent ? '#f4907a' : '#ffd98a'; ctx.font=fnt(19); ctx.fillText(fishing.toast, W/2, H-142-12-76); ctx.restore();
  }
  // sunk overlay
  if (ship.sinking) {
    ctx.save(); ctx.fillStyle = `rgba(6,12,22,${clamp(ship.sinkT/2.6,0,1)*0.75})`; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#e8916b'; ctx.font=fnt(30); ctx.fillText(('THE '+player.boatName+' WAS LOST').toUpperCase(), W/2, H/2-12);
    ctx.fillStyle='rgba(233,222,198,0.7)'; ctx.font=fnt(13); ctx.fillText('recovering a vessel…', W/2, H/2+22);
    ctx.restore();
  }

  // quest-item indicator
  if (player.hasHeart){
    const hy = player.bounty>0 ? 208 : 158;   // WANTED strip grew to 44px for its how-to line (v0.19.1)
    ctx.save(); ctx.textBaseline='middle'; ctx.textAlign='left';
    chromePanel(16,hy,240,30,{r:6,fw:3,tint:'rgba(150,38,72,0.6)'});
    ctx.fillStyle='#f4b8c8'; ctx.font=fnt(11); ctx.fillText('♥ Leviathan’s Heart', 32, hy+16); ctx.restore();
  }

  drawBossBar();
  if (!ui.mapOpen && !ship.sinking && !ui.port && !ui.inv && !ui.hold) drawActionBar();
  drawCompass(91, H-91, 71);            // bottom-left, mirrors the circular chart's size
  drawMinimap();
  ctx.fillStyle='rgba(233,222,198,0.3)'; ctx.font=fnt(11); ctx.textAlign='left'; ctx.textBaseline='bottom';
  ctx.fillText(`${ship.x.toFixed(0)}, ${ship.y.toFixed(0)}`, 178, H-12);
}

/* ============================ FISHING ===================================== */
/* fish-school stock (V11) — grounds deplete as you and NPC fishing boats work them,
   and quietly recover over ~2 game days. Fewer birds/ripples telegraph a thin ground. */
const groundStock = new Map();   // g.key → {s: 0..1, t: last-updated elapsed}
const STOCK_REGEN = 1/(840*2);   // full recovery in ~2 game days
function stockOf(g){
  let e = groundStock.get(g.key);
  if (!e){ e = { s:1, t:world.elapsed }; groundStock.set(g.key, e); }
  else if (world.elapsed > e.t){ e.s = Math.min(1, e.s + (world.elapsed - e.t)*STOCK_REGEN); e.t = world.elapsed; }
  return e.s;
}
function drainGround(g, amt){ stockOf(g); const e = groundStock.get(g.key); e.s = Math.max(0, e.s - amt); }
function groundAt(x, y) {
  const cx = Math.floor(x/CHUNK), cy = Math.floor(y/CHUNK);
  let best = 0, bg = null;
  for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++)
    for (const g of genChunk(cx+dx, cy+dy).grounds) {
      const d = Math.hypot(g.x-x, g.y-y);
      if (d < g.r) { const v = g.rich * (1 - 0.4*d/g.r) * (0.25 + 0.75*stockOf(g)); if (v > best){ best = v; bg = g; } }
    }
  for (const c of chums){ const d = Math.hypot(c.x-x, c.y-y); if (d < c.r){
    const k = 1 - d/c.r;
    best = Math.min(1, bg ? best * (1 + 0.6*k) : best + 0.12*k);   // chum CONCENTRATES a school — it can't conjure fish from bare water (v0.19.3)
  } }
  return { rich: best, ground: bg };
}
const fishing = { active:false, prog:0, toast:'', toastT:0 };
const toastQ = [];
function setToast(t, urgent){
  if (fishing.toast === t && fishing.toastT > 1.2) return;   // dedupe rapid repeats
  if (urgent){                                               // danger doesn't queue behind fish chatter (v0.19.1)
    fishing.toast = t; fishing.toastT = 3; fishing.urgent = true; return;
  }
  toastQ.push(t); if (toastQ.length > 4) toastQ.shift();
  if (fishing.toastT <= 0){ fishing.toast = toastQ.shift(); fishing.toastT = 1.9; fishing.urgent = false; }
}
function rollCatch(rich) {
  const night = 1 - dayFactor(), rare = 1 + UP.netRare()*0.25;
  const w = { herring:50, mackerel:30, cod:16*(1+night*0.5), tuna:(5+rich*14)*(1+night*0.4)*rare, marlin:(0.6+rich*4.5)*rare };
  const reg = regionAt(ship.x, ship.y);
  for (const id of GOOD_ORDER) if (GOODS[id].endemic === reg) w[id] = (7 + rich*12) * rare;   // endemic fish bite at home
  const rb = REGIONS[reg].fish;   // region catch bias
  for (const k in rb) if (w[k]) w[k] *= rb[k];
  let tot = 0; for (const k in w) tot += w[k];
  let r = Math.random()*tot;
  for (const k in w){ r -= w[k]; if (r <= 0) return k; }
  return 'herring';
}
function toggleFishing() {
  if (fishing.active){ fishing.active = false; SFX.netStow(); return; }
  if (cargoCount() >= player.cargoMax){ setToast('Hold is full'); return; }
  fishing.active = true; fishing.prog = 0; SFX.netCast();
}
function stepFishing(dt) {
  if (fishing.toastT > 0){ fishing.toastT -= dt; if (fishing.toastT <= 0 && toastQ.length){ fishing.toast = toastQ.shift(); fishing.toastT = 1.9; fishing.urgent = false; } }
  if (!fishing.active) return;
  if (cargoCount() >= player.cargoMax){ fishing.active = false; setToast('Hold is full'); return; }
  const ga = groundAt(ship.x, ship.y), rich = ga.rich;
  const slowBonus = clamp(1.3 - ship.speed/90, 0.4, 1.3);     // reward trawling slowly
  fishing.prog += (0.18 + rich*0.55) * slowBonus * UP.netRate() * (lanternActive()?1.3:1) * dt;
  if (fishing.prog >= 1) {
    fishing.prog = 0;
    const id = rollCatch(rich);
    if (addCargo(id, 1) > 0){
      player.stats.caught++; setToast('Caught ' + GOODS[id].name + '!'); SFX.catch(); if (id==='tuna'||id==='marlin') questEvent('rarefish');
      if (ga.ground) drainGround(ga.ground, 0.035);           // every haul thins the school a little (~2 full holds per rich ground)
    }
    else { setToast('Hold is full'); fishing.active = false; }
  }
}
function drawGround(g) {
  const t = world.elapsed, f = tintC(PAL.FOAM), st = stockOf(g);   // thin grounds show fewer birds & fainter rings
  for (let k=0;k<3;k++){
    const rr = g.r*(0.42 + 0.18*k) + Math.sin(t*0.8 + k)*6, seg = 20;
    bctx.strokeStyle = `rgba(${f[0]},${f[1]},${f[2]},${0.02 + 0.05*st})`; bctx.lineWidth = 1; bctx.beginPath();
    for (let i=0;i<=seg;i++){ const a=i/seg*TAU; const p=proj(g.x+Math.cos(a)*rr, g.y+Math.sin(a)*rr, 0); i?bctx.lineTo(p[0],p[1]):bctx.moveTo(p[0],p[1]); }
    bctx.stroke();
  }
  const bc = tintC([240,242,244]), nBirds = Math.round(1 + 4*st);
  for (let i=0;i<nBirds;i++){
    const a = t*0.7 + i*TAU/5;
    const p = proj(g.x + Math.cos(a)*g.r*0.45, g.y + Math.sin(a)*g.r*0.45, 42 + Math.sin(t*2+i)*6);
    bctx.strokeStyle = `rgb(${bc[0]},${bc[1]},${bc[2]})`; bctx.lineWidth = 1;
    bctx.beginPath(); bctx.moveTo(p[0]-2,p[1]); bctx.lineTo(p[0],p[1]-1.5); bctx.lineTo(p[0]+2,p[1]); bctx.stroke();
  }
}

/* ============================ PORTS / DOCKING ============================= */
function drawPier(isl) {
  const p = isl.port, perp = p.ang + Math.PI/2, hw = 9, z = 4;
  const ax = Math.cos(perp)*hw, ay = Math.sin(perp)*hw;
  const A = proj(p.pierX+ax, p.pierY+ay, z), B = proj(p.dockX+ax, p.dockY+ay, z);
  const C = proj(p.dockX-ax, p.dockY-ay, z), D = proj(p.pierX-ax, p.pierY-ay, z);
  polyFill([A,B,C,D], col(PAL.DOCK), col(PAL.OUTLINE));
  for (const s of [-1,1]) {
    const bx = p.dockX + Math.cos(perp)*hw*s, by = p.dockY + Math.sin(perp)*hw*s;
    const b0 = proj(bx,by,0), b1 = proj(bx,by,z+4);
    bctx.strokeStyle = col(PAL.DOCK_D); bctx.lineWidth = 2; bctx.beginPath(); bctx.moveTo(b0[0],b0[1]); bctx.lineTo(b1[0],b1[1]); bctx.stroke();
  }
  // tall flagpole + big waving pennant at the shore end (a visible landmark, culture-coloured)
  const f0 = proj(p.pierX, p.pierY, z), f1 = proj(p.pierX, p.pierY, z+38);
  bctx.strokeStyle = col(PAL.MAST); bctx.lineWidth = 2; bctx.beginPath(); bctx.moveTo(f0[0],f0[1]); bctx.lineTo(f1[0],f1[1]); bctx.stroke();
  const wav = Math.sin(world.elapsed*3)*3;
  polyFill([ proj(p.pierX,p.pierY,z+38), proj(p.pierX,p.pierY,z+27),
             proj(p.pierX+Math.cos(p.ang)*16, p.pierY+Math.sin(p.ang)*16, z+32+wav) ],
           CULTURES[portCulture(isl)].pennant, col(PAL.OUTLINE));
  // dockside clutter — a crate or barrel or two on the sand by the pier root
  const cs = (p.seed>>>0);
  for (let k=0;k<2;k++){
    const hcl = hash2(cs, k*13, 87); if (k && hcl < 0.35) break;   // 2nd piece at ~65% of ports
    const side2 = hcl > 0.5 ? 1 : -1;
    const cxp = p.pierX - Math.cos(p.ang)*(4+k*3) + Math.cos(perp)*(13+k*6)*side2;
    const cyp = p.pierY - Math.sin(p.ang)*(4+k*3) + Math.sin(perp)*(13+k*6)*side2;
    if (!landAt(cxp, cyp)) continue;
    if (hash2(k, cs, 89) < 0.55) drawCrateP(cxp, cyp, 1.2, 2.4); else drawBarrelP(cxp, cyp, 1.2, 2.1);
  }
  drawPortHouse(isl);
}
/* dockside props shared by the pier + hamlets */
function drawCrateP(x, y, z, s){
  const Q = (dx,dy,dz) => proj(x+dx*s, y+dy*s, z+dz*s);
  polyFill([Q(-1,1,0),Q(1,1,0),Q(1,1,1.7),Q(-1,1,1.7)], col([126,92,54]), col(PAL.OUTLINE));
  polyFill([Q(1,1,0),Q(1.5,-0.5,0),Q(1.5,-0.5,1.7),Q(1,1,1.7)], col([104,74,42]), col(PAL.OUTLINE));
  polyFill([Q(-1,1,1.7),Q(1,1,1.7),Q(1.5,-0.5,1.7),Q(-0.5,-0.5,1.7)], col([160,120,70]), col(PAL.OUTLINE));
}
function drawBarrelP(x, y, z, s){
  const b0 = proj(x, y, z), b1 = proj(x, y, z+s*2.2);
  bctx.strokeStyle = col([116,78,44]); bctx.lineCap = 'round'; bctx.lineWidth = Math.max(2, s*1.5*VIEW);
  bctx.beginPath(); bctx.moveTo(b0[0],b0[1]); bctx.lineTo(b1[0],b1[1]); bctx.stroke();
  bctx.strokeStyle = col([158,116,64]); bctx.lineWidth = 1;
  for (const t of [0.35, 0.75]){ const h = proj(x, y, z+s*2.2*t), w = s*0.7*VIEW;
    bctx.beginPath(); bctx.moveTo(h[0]-w,h[1]); bctx.lineTo(h[0]+w,h[1]); bctx.stroke(); }
  bctx.lineCap = 'butt';
}
/* small culture dwelling used by the port hamlets */
function drawHut(hx, hy, zb, s, wall, wallD, roof){
  const Q = (dx,dy,dz) => proj(hx+dx*s, hy+dy*s, zb+dz*s);
  polyFill([Q(-1,0.75,0),Q(1,0.75,0),Q(1,0.75,1),Q(-1,0.75,1)], col(wall), col(PAL.OUTLINE));
  polyFill([Q(1,0.75,0),Q(1.5,-0.35,0),Q(1.5,-0.35,1),Q(1,0.75,1)], col(wallD), col(PAL.OUTLINE));
  polyFill([Q(-1.15,0.85,1),Q(1.15,0.85,1),Q(0.95,0.05,1.8),Q(-0.95,0.05,1.8)], col(roof), col(PAL.OUTLINE));
  polyFill([Q(1.15,0.85,1),Q(1.5,-0.35,1),Q(1.25,-0.45,1.7),Q(0.95,0.05,1.8)], col(lift(roof,0.8)), col(PAL.OUTLINE));
  bctx.fillStyle = col([44,36,28]); const d = Q(0,0.8,0); bctx.fillRect(d[0]-1, d[1]-3, 3, 3);
}
/* culture architecture on the shore by every pier (V13) — how a harbour is built
   tells you whose waters these are before you ever read a name */
function drawPortHouse(isl){
  const p = isl.port, cult = portCulture(isl), a = p.ang;
  const bx = p.pierX - Math.cos(a)*30, by = p.pierY - Math.sin(a)*30, zb = 5;
  const P = (dx,dy,dz) => proj(bx+dx, by+dy, zb+dz);
  if (cult === 'norse'){
    // long stave hall — dark planks, steep roof, crossed gable beams; a rune stone stands by
    polyFill([P(-15,7,0),P(15,7,0),P(15,7,9),P(-15,7,9)], col([74,58,40]), col(PAL.OUTLINE));
    polyFill([P(15,7,0),P(21,-4,0),P(21,-4,9),P(15,7,9)], col([60,46,32]), col(PAL.OUTLINE));
    polyFill([P(-15,7,9),P(15,7,9),P(14,1,19),P(-14,1,19)], col([92,68,44]), col(PAL.OUTLINE));
    polyFill([P(15,7,9),P(21,-4,9),P(19,-6,17),P(14,1,19)], col([70,52,34]), col(PAL.OUTLINE));
    bctx.strokeStyle = col([56,42,28]); bctx.lineWidth = 1;                         // roof plank seams
    for (const gx of [-7,0,7]){ const s1=P(gx*1.05,7,9), s2=P(gx*0.98,1,19);
      bctx.beginPath(); bctx.moveTo(s1[0],s1[1]); bctx.lineTo(s2[0],s2[1]); bctx.stroke(); }
    bctx.strokeStyle = col([110,84,54]); bctx.lineWidth = 1.4;                      // crossed gable beams
    for (const gx of [-14,14]){ const g1=P(gx-3,1,22), g2=P(gx+3,1,17), g3=P(gx+3,1,22), g4=P(gx-3,1,17);
      bctx.beginPath(); bctx.moveTo(g1[0],g1[1]); bctx.lineTo(g2[0],g2[1]); bctx.moveTo(g3[0],g3[1]); bctx.lineTo(g4[0],g4[1]); bctx.stroke(); }
    bctx.fillStyle = col([40,30,22]); const dr = P(0,7.2,0);                        // door
    bctx.fillRect(dr[0]-2, dr[1]-5, 4, 5);
    polyFill([P(27,13,0),P(32,13,0),P(31,13,13),P(28,13,13)], col([122,120,114]), col(PAL.OUTLINE));   // rune stone
    bctx.fillStyle = 'rgba(140,210,225,0.8)'; const rn = P(29.5,13,7);
    bctx.fillRect(rn[0], rn[1]-3, 1, 2); bctx.fillRect(rn[0]-1, rn[1], 1, 1); bctx.fillRect(rn[0]+1, rn[1]+1, 1, 2);
  } else if (cult === 'east'){
    // two-tiered pagoda — upturned eaves, red lacquer, gold finial
    polyFill([P(-7,5,0),P(7,5,0),P(7,5,8),P(-7,5,8)], col([146,120,92]), col(PAL.OUTLINE));            // body
    polyFill([P(7,5,0),P(11,-2,0),P(11,-2,8),P(7,5,8)], col([120,96,72]), col(PAL.OUTLINE));
    polyFill([P(-13,7,8),P(13,7,8),P(9,1,13),P(-9,1,13)], col([164,58,44]), col(PAL.OUTLINE));         // lower roof
    bctx.strokeStyle = col([164,58,44]); bctx.lineWidth = 1.6;                                          // upturned eaves
    for (const s2 of [-1,1]){ const e1=P(13*s2,7,8), e2=P(16*s2,7,11); bctx.beginPath(); bctx.moveTo(e1[0],e1[1]); bctx.lineTo(e2[0],e2[1]); bctx.stroke(); }
    polyFill([P(-5,4,13),P(5,4,13),P(5,4,18),P(-5,4,18)], col([146,120,92]), col(PAL.OUTLINE));        // upper body
    polyFill([P(-9,6,18),P(9,6,18),P(6,1,22),P(-6,1,22)], col([164,58,44]), col(PAL.OUTLINE));         // upper roof
    for (const s2 of [-1,1]){ const e1=P(9*s2,6,18), e2=P(12*s2,6,21); bctx.beginPath(); bctx.moveTo(e1[0],e1[1]); bctx.lineTo(e2[0],e2[1]); bctx.stroke(); }
    bctx.strokeStyle = col([164,58,44]); bctx.lineWidth = 1.2;                                          // lacquered corner posts
    for (const s2 of [-1,1]){ const c1=P(6.6*s2,5.2,0), c2=P(6.6*s2,5.2,8); bctx.beginPath(); bctx.moveTo(c1[0],c1[1]); bctx.lineTo(c2[0],c2[1]); bctx.stroke(); }
    bctx.fillStyle = '#ffd98a'; const fin = P(0,3,24); bctx.fillRect(fin[0]-1, fin[1]-2, 2, 3);         // finial
    bctx.fillStyle = col([40,30,22]); const dr2 = P(0,5.2,0); bctx.fillRect(dr2[0]-2, dr2[1]-4, 4, 4);  // door

    bctx.fillStyle = col([54,40,28]); const dr3 = P(0,6.2,0); bctx.fillRect(dr3[0]-2, dr3[1]-4, 4, 4);  // doorway
    polyFill([P(18,10,0),P(22,10,0),P(21,10,20),P(19,10,20)], col([210,186,142]), col(PAL.OUTLINE));   // obelisk
    polyFill([P(19,10,20),P(21,10,20),P(20,10,24)], '#ffd98a', col(PAL.OUTLINE));                      // gilded tip
  } else if (cult === 'roman'){
    // marble-coast villa — white walls, low red tile roof, portico columns
    polyFill([P(-12,6,0),P(12,6,0),P(12,6,8),P(-12,6,8)], col([226,220,208]), col(PAL.OUTLINE));
    polyFill([P(12,6,0),P(17,-3,0),P(17,-3,8),P(12,6,8)], col([204,198,186]), col(PAL.OUTLINE));
    polyFill([P(-13,7,8),P(13,7,8),P(11,0,13),P(-11,0,13)], col([176,84,58]), col(PAL.OUTLINE));
    polyFill([P(13,7,8),P(17,-3,8),P(14,-4,12),P(11,0,13)], col([150,70,48]), col(PAL.OUTLINE));
    bctx.strokeStyle = col([238,234,224]); bctx.lineWidth = 1.6;                                   // portico columns
    for (const gx of [-8,-2,4,10]){ const c1=P(gx,6.4,0), c2=P(gx,6.4,7); bctx.beginPath(); bctx.moveTo(c1[0],c1[1]); bctx.lineTo(c2[0],c2[1]); bctx.stroke(); }
    bctx.fillStyle = col([54,44,36]); const drR = P(-5,6.2,0); bctx.fillRect(drR[0]-2, drR[1]-4, 4, 4);
  } else if (cult === 'greek'){
    // thalassian temple-house — whitewash, pale gable, two columns, blue door
    polyFill([P(-10,6,0),P(10,6,0),P(10,6,8),P(-10,6,8)], col([236,234,226]), col(PAL.OUTLINE));
    polyFill([P(10,6,0),P(15,-3,0),P(15,-3,8),P(10,6,8)], col([212,210,200]), col(PAL.OUTLINE));
    polyFill([P(-12,7,8),P(12,7,8),P(9,0,14),P(-9,0,14)], col([206,200,184]), col(PAL.OUTLINE));
    polyFill([P(-12,7,8),P(12,7,8),P(0,7,12)], col([224,220,208]), col(PAL.OUTLINE));               // pediment gable
    bctx.strokeStyle = col([242,240,232]); bctx.lineWidth = 1.8;
    for (const gx of [-6,6]){ const c1=P(gx,6.4,0), c2=P(gx,6.4,7.4); bctx.beginPath(); bctx.moveTo(c1[0],c1[1]); bctx.lineTo(c2[0],c2[1]); bctx.stroke(); }

function nearbyDock() {
  const cx = Math.floor(ship.x/CHUNK), cy = Math.floor(ship.y/CHUNK);
  let best = null, bd = 104;
  for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++)
    for (const isl of genChunk(cx+dx, cy+dy).islands) {
      if (!isl.port) continue;
      const d = Math.hypot(isl.port.dockX-ship.x, isl.port.dockY-ship.y);
      if (d < bd){ bd = d; best = isl; }
    }
  return best;
}
function nearbyPortWithin(range){
  const cx = Math.floor(ship.x/CHUNK), cy = Math.floor(ship.y/CHUNK), cr = Math.ceil(range/CHUNK)+1;
  let best = null, bd = range;
  for (let dy=-cr;dy<=cr;dy++) for (let dx=-cr;dx<=cr;dx++) for (const isl of genChunk(cx+dx,cy+dy).islands){ if(!isl.port) continue; const d=Math.hypot(isl.port.dockX-ship.x, isl.port.dockY-ship.y); if(d<bd){bd=d;best=isl;} }
  return best;
}
function nearestCursed(){
  for (let r=500;r<9000;r+=500) for (let a=0;a<TAU;a+=0.4){ const x=ship.x+Math.cos(a)*r, y=ship.y+Math.sin(a)*r; if(regionAt(x,y)==='cursed') return {x,y}; }
  return null;
}
function openPort(isl){
  ui.port = isl; ui.portTab = 'market'; ui.marketScroll = 0; fishing.active = false; ship.vx = ship.vy = 0; clearKeys();
  SFX.dock();
  player.lastPort = { x: isl.port.dockX, y: isl.port.dockY, name: isl.port.name };
  recordLedger(isl);                       // the hold's price ledger notes what this market pays
  ui.inv = false;
  ship.hp = ship.maxhp;                    // docking patches up the hull
  for (const f of player.fleet) if (!f.route) f.hp = SHIPS[f.cls].hp;   // the yard sees to the escorts at your side (traders patch up on their own legs)
  if (!player.visited.includes(isl.key)) player.visited.push(isl.key);
  completeDeliveries(isl);                  // fulfil any delivery contracts targeting here
  questEvent('dock');
  if (player.quest.step===4 && player.hasHeart){ player.hasHeart = false; questEvent('deliver_heart'); }
  resumeAudio();
}
function closePort(){
  if (!ui.port) return;
  SFX.castoff();
  const isl = ui.port, a = Math.atan2(ship.y-isl.y, ship.x-isl.x);
  ship.vx = Math.cos(a)*34; ship.vy = Math.sin(a)*34; ui.port = null;
  graceT = Math.max(graceT, 5);   // a moment of calm as you leave harbour
  clearKeys();
}
function handleAction() {
  if (ui.mapOpen || ui.port || ui.hold) return;
  const dock = nearbyDock();
  if (dock){ openPort(dock); return; }
  const cap = nearestNamedNpc();
  if (cap){ hailNpc(cap); return; }
  const ruin = nearRuin();
  if (ruin){ claimRuin(ruin); return; }
  if (player.hold && holdDist(ship.x, ship.y) < 280){ openHold(); return; }
  const site = nearBuildSite();
  if (site){ buildOutpost(site); return; }
  toggleFishing();
}
function doBuy(isl, id) {
  const g = GOODS[id];
  if (g.origin && g.origin !== portRegion(isl)){ setToast('None in stock — '+g.name+' comes from the '+REGIONS[g.origin].name); return; }
  const p = priceFor(isl, id, 'buy');
  if (player.coin < p){ setToast('Not enough coin'); return; }
  if (cargoCount() >= player.cargoMax){ setToast('Hold is full'); return; }
  player.coin -= p; addCargo(id, 1); SFX.coin();
}
function doSell(isl, id) {
  if ((player.cargo[id]||0) <= 0) return;
  removeCargo(id, 1); earn(priceFor(isl, id, 'sell')); SFX.coin(); questEvent('sell_goods');
}
function doSellAll(isl, id) {
  const n = player.cargo[id]||0; if (n <= 0) return;
  let total = 0;
  for (let i=0;i<n;i++){ total += priceFor(isl, id, 'sell'); removeCargo(id, 1); }
  earn(total); SFX.coin(); questEvent('sell_goods', n);
}

function toggleInv(){ if (ui.settings || ui.paused || ui.hold) return; if (ui.mapOpen) ui.mapOpen = false; ui.inv = !ui.inv; SFX.book(); clearKeys(); }   // works everywhere, docked included
/* ledger v2 (V11) — a price BOOK: up to 4 known ports per good, with coordinates,
   so the hold can answer "where is this worth sailing to?" (price × distance). */
function ledgerNote(id, p, name, x, y, rumor){
  let arr = player.ledger[id]; if (!Array.isArray(arr)) arr = player.ledger[id] = [];
  const i = arr.findIndex(e => e.port === name); if (i >= 0) arr.splice(i, 1);   // refresh the same port
  arr.push({ p, port: name, x: Math.round(x), y: Math.round(y), t: world.elapsed, ...(rumor?{rumor:1}:{}) });
  if (arr.length > 4){ arr.sort((a,b) => ledgerScore(b) - ledgerScore(a)); arr.length = 4; }
}
function recordLedger(isl){
  for (const id of GOOD_ORDER) ledgerNote(id, priceFor(isl, id, 'sell'), isl.port.name, isl.x, isl.y);
  leakRumorPrice(isl);
}
function ledgerDist(e){                                       // wrapped E–W distance from the ship
  let dx = (e.x - ship.x) % WORLD_W; if (dx > WORLD_W/2) dx -= WORLD_W; if (dx < -WORLD_W/2) dx += WORLD_W;
  return Math.hypot(dx, e.y - ship.y);
}
function ledgerScore(e){ return e.p / (1 + ledgerDist(e)/9000); }   // coin discounted by the sail to get there
function bestOffer(id){
  const arr = player.ledger[id]; if (!Array.isArray(arr) || !arr.length) return null;
  let best = arr[0]; for (const e of arr) if (ledgerScore(e) > ledgerScore(best)) best = e;
  return best;
}
function leakRumorPrice(isl){                                 // dock gossip sometimes names a far market
  if (Math.random() > 0.4) return;
  const id = GOOD_ORDER[Math.floor(Math.random()*GOOD_ORDER.length)];
  for (let tries=0; tries<3; tries++){
    const a = Math.random()*TAU, d = 6000 + Math.random()*8000;
    const px2 = isl.x + Math.cos(a)*d, py2 = isl.y + Math.sin(a)*d;
    const cx = Math.floor(px2/CHUNK), cy = Math.floor(py2/CHUNK);
    let far = null;
    for (let dy=-2; dy<=2 && !far; dy++) for (let dx=-2; dx<=2; dx++){
      const c = genChunk(cx+dx, cy+dy);
      for (const o of c.islands) if (o.port && o !== isl){ far = o; break; }
      if (far) break;
    }
    if (!far) continue;
    const p = priceFor(far, id, 'sell');
    ledgerNote(id, p, far.port.name, far.x, far.y, true);
    setToast('Rumour on the docks: '+GOODS[id].name+' fetches '+p+'c at '+far.port.name);
    return;
  }
}
function daysAgo(t){ const d = Math.floor((world.elapsed - t)/840); return d<=0 ? 'today' : d===1 ? 'yesterday' : d+' days ago'; }
function fmtDist(d){ return d < 950 ? 'near' : '~'+(d/1000).toFixed(d<9500?1:0)+'k'; }
function bearingArrow(e){
  let dx = (e.x - ship.x) % WORLD_W; if (dx > WORLD_W/2) dx -= WORLD_W; if (dx < -WORLD_W/2) dx += WORLD_W;
  const a = Math.atan2(e.y - ship.y, dx);
  return ['→','↘','↓','↙','←','↖','↑','↗'][((Math.round(a/(Math.PI/4))%8)+8)%8];
}

/* shared hold content — drawn inside the port 'Hold' tab and the at-sea inventory screen */
function drawInvContent(ax, ay, aw, btns, inPort){
  ctx.textBaseline='top'; ctx.textAlign='left';
  const owned = GOOD_ORDER.filter(id => (player.cargo[id]||0) > 0);
  // --- cargo grid (left) ---
  ctx.font=fntS(10); ctx.fillStyle='rgba(233,222,198,0.5)';
  ctx.fillText('CARGO  ('+cargoCount()+' / '+player.cargoMax+')', ax, ay);
  const sz=56, gap=8, perRow=5, gx0=ax, gy0=ay+24;   // 20 slots — the hold caps at 20 items, all distinct fits
  let hover=null;
  for (let i=0;i<20;i++){
    const gx=gx0+(i%perRow)*(sz+gap), gy=gy0+Math.floor(i/perRow)*(sz+gap);
    img9(HIMG.slot, gx, gy, sz, sz, 12);
    const id = owned[i];
    if (id){
      drawGoodIcon(id, gx+sz/2, gy+sz/2-3, sz*0.24);
      const q = player.cargo[id];
      ctx.font=fnt(9); ctx.textAlign='right'; ctx.textBaseline='alphabetic';
      const qs='×'+q, cw2=Math.ceil(ctx.measureText(qs).width)+7;
      ctx.fillStyle='rgba(12,8,4,0.72)'; roundRect(gx+sz-5-cw2, gy+sz-20, cw2, 15, 3); ctx.fill();
      ctx.fillStyle=UICOL.hi; ctx.fillText(qs, gx+sz-8, gy+sz-8);
      ctx.textAlign='left'; ctx.textBaseline='top';
      const mx=mouse.x/US, my=mouse.y/US;
      if (mx>=gx&&mx<=gx+sz&&my>=gy&&my<=gy+sz) hover=id;
    }
  }
  const gridBot = gy0 + 4*(sz+gap);
  if (hover){ ctx.font=fnt(12); ctx.fillStyle='#ffd98a'; ctx.fillText(GOODS[hover].name+'  ·  '+(player.cargo[hover]||0)+' aboard  ·  base '+GOODS[hover].base+'c', ax, gridBot+4); }
  else if (!owned.length){ ctx.font=fntS(11); ctx.fillStyle='rgba(233,222,198,0.35)'; ctx.fillText('an empty hold — fish, trade, or plunder', ax, gridBot+4); }
  // --- ammo rack (bottom) ---   (the price ledger lives on its own tab now — no more overlap)
  const ayy = gridBot + 30;
