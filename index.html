<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Helmsong</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=IM+Fell+English&family=VT323&family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --paper:#e9dec6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0b1722; }
  body { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; -webkit-font-smoothing:none; }
  #game { display:block; width:100vw; height:100vh; image-rendering:pixelated; image-rendering:crisp-edges; cursor:crosshair; }
  /* leather + gold-frame reused by every title control (matches the in-game chromePanel) */
  .goldframe { background:linear-gradient(158deg,#3c2c1d 0%,#241610 100%);
    border:14px solid transparent; border-image:url("assets/hud_UI_Slot_Selected.png") 17 / 14px / 0 stretch; image-rendering:pixelated; }
  #intro {
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    background:transparent;                                   /* the animated title scene is drawn on the canvas behind */
    color:var(--paper); text-align:center; z-index:10; transition:opacity .6s ease; padding:6vh 24px 8vh;
  }
  #intro::after { content:''; position:absolute; inset:0; pointer-events:none; z-index:0;   /* scrim: legibility top (logo) + bottom (menu) */
    background:linear-gradient(180deg, rgba(9,16,26,0.34) 0%, transparent 24%, transparent 52%, rgba(9,16,26,0.74) 100%); }
  #intro > * { position:relative; z-index:1; }
  #titleTop { display:flex; flex-direction:column; align-items:center; gap:12px; }
  #titleBottom { display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; }
  #titleLogo { width:min(750px,63vw); height:auto; image-rendering:pixelated;
    filter:drop-shadow(0 8px 16px rgba(0,0,0,0.55)); animation:logobob 6.5s ease-in-out infinite; }
  @keyframes logobob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  #intro h1 { font-size:clamp(40px,9vw,86px); letter-spacing:.18em; font-weight:700; text-shadow:0 3px 0 #00000040; }
  #intro .sub { opacity:.95; letter-spacing:.42em; font-size:13px; text-transform:uppercase; color:#f6ecd4; margin-top:-2px;
    text-shadow:0 0 10px rgba(0,0,0,.95), 0 0 4px rgba(0,0,0,.9), 0 2px 4px rgba(0,0,0,.95); }
  #startVoyage { font-family:'VT323',ui-monospace,monospace; font-size:27px; letter-spacing:.05em; color:#f6ecce;
    cursor:pointer; padding:11px 42px; margin-top:6px; text-shadow:0 1px 3px rgba(0,0,0,.65);
    background:linear-gradient(158deg,#4c3820 0%,#2c1c10 100%);
    border:16px solid transparent; border-image:url("assets/hud_UI_Slot_Selected.png") 17 / 16px / 0 stretch; image-rendering:pixelated;
    transition:transform .1s ease, filter .12s ease; }
  #startVoyage:hover { filter:brightness(1.14) saturate(1.06); }
  #startVoyage:active { transform:translateY(2px); }
  #titleSettings { position:absolute; bottom:18px; right:24px; z-index:2; width:54px; height:54px;
    font-size:25px; line-height:1; color:#f1db97; cursor:pointer; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(158deg,#3c2c1d,#281a10);
    border:14px solid transparent; border-image:url("assets/hud_UI_Slot_Selected.png") 17 / 13px / 0 stretch; image-rendering:pixelated;
    transition:filter .12s ease; }
  #titleSettings:hover { filter:brightness(1.18); }
  #intro .hint { font-size:11px; opacity:.5; letter-spacing:.1em; text-shadow:0 1px 3px rgba(0,0,0,.7); }
  #verline { position:absolute; bottom:14px; left:0; right:0; font-size:12px; opacity:.82; letter-spacing:.14em; color:#e9dec6; text-shadow:0 1px 5px rgba(0,0,0,.95); }
  /* controls / settings screen */
  #controlsScreen { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; padding:24px;
    background:rgba(7,12,20,0.6); transition:opacity .3s ease; }
  #controlsScreen .cpanel { max-width:560px; width:100%; min-height:572px; display:flex; flex-direction:column; text-align:center; color:var(--paper); padding:28px 34px 24px;
    background:linear-gradient(158deg,#3c2c1d 0%,#241610 100%);
    border:20px solid transparent; border-image:url("assets/hud_UI_Slot_Selected.png") 17 / 20px / 0 stretch; image-rendering:pixelated; }
  #controlsScreen h2 { font-family:'VT323',ui-monospace,monospace; color:#f1db97; font-size:30px; letter-spacing:.05em; margin-bottom:16px; }
  #ctrlBody { flex:1 1 auto; display:flex; flex-direction:column; justify-content:center; }
  /* tutorial card */
  #ctrlBody .tut-lead { font-family:'VT323',ui-monospace,monospace; color:#f4e3b0; font-size:22px; letter-spacing:.02em; margin-bottom:14px; }
  #ctrlBody .tut-p { font-size:15px; line-height:1.62; color:#d8c7a4; max-width:452px; margin:0 auto; }
  #ctrlBody .tut-p b { color:#f1db97; font-family:'VT323',ui-monospace,monospace; font-size:18px; letter-spacing:.02em; }
  #ctrlDots { display:flex; gap:8px; justify-content:center; margin-top:16px; min-height:10px; }
  #ctrlDots span { width:8px; height:8px; border-radius:50%; background:rgba(233,222,198,0.25); transition:background .15s; }
  #ctrlDots span.on { background:#f1db97; }
  /* tutorial visual + key chips */
  #ctrlBody .tut-viz { display:block; margin:0 auto 10px; width:300px; height:169px; border-radius:5px; object-fit:cover; background:#22485c;
    box-shadow:0 0 0 2px rgba(150,116,62,0.55), 0 4px 12px rgba(0,0,0,0.4); }
  #ctrlBody .tut-keys { display:flex; gap:5px; align-items:center; justify-content:center; margin-bottom:12px; flex-wrap:wrap; font-size:12px; }
  #ctrlBody .keycap { font-family:'VT323',ui-monospace,monospace; font-size:15px; line-height:1; color:#241606;
    background:linear-gradient(#f4e2a6,#cbac62); border-radius:4px; padding:3px 8px 2px; box-shadow:0 2px 0 #6e5427; }
  #ctrlBody .keylbl { color:#c9b489; margin-right:4px; }
  #ctrlBody .keysep { color:#7d6c4e; margin:0 3px; }
  #controlsScreen .ctrl-grid { display:grid; grid-template-columns:auto 1fr; gap:9px 18px; text-align:left; font-size:14px; max-width:420px; margin:0 auto 18px; }
  #controlsScreen .ctrl-grid b { color:#f1db97; font-family:'VT323',ui-monospace,monospace; font-size:18px; letter-spacing:.02em; }
  #controlsScreen .ctrl-grid span:nth-child(even) { color:#cbb489; }
  #controlsScreen .ctrl-note { font-size:12px; color:#b7a488; margin-bottom:8px; line-height:1.45; max-width:440px; margin-left:auto; margin-right:auto; }
  #controlsScreen .ctrl-note b { color:#e0c893; }
  #controlsScreen .ctrl-btns { display:flex; gap:14px; justify-content:center; margin-top:20px; }
  #controlsScreen button { font-family:'VT323',ui-monospace,monospace; font-size:21px; letter-spacing:.05em; color:#f6ecce; cursor:pointer;
    padding:8px 28px; background:linear-gradient(158deg,#4c3820,#2c1c10);
    border:14px solid transparent; border-image:url("assets/hud_UI_Slot_Selected.png") 17 / 13px / 0 stretch; image-rendering:pixelated;
    transition:transform .1s ease, filter .12s ease; }
  #controlsScreen button:hover { filter:brightness(1.14); }
  #controlsScreen button:active { transform:translateY(2px); }
  #controlsScreen button.ghost { filter:saturate(.65) brightness(.86); }
  #intro .ships { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:660px; }
  #intro .ships .card { background:rgba(15,30,42,0.5); border:2px solid transparent; border-radius:6px; padding:9px 13px; cursor:pointer; min-width:132px; transition:.12s; text-align:left; }
  #slots { display:flex; gap:13px; justify-content:center; flex-wrap:wrap; }
  #slots .card {                                             /* ornate gold-framed leather slot — matches the in-game chromePanel */
    min-width:182px; text-align:left; cursor:pointer; position:relative;
    font-family:'VT323',ui-monospace,monospace; color:var(--paper);
    padding:13px 18px 15px;
    background:linear-gradient(158deg,#3c2c1d 0%,#281a10 100%);
    border:14px solid transparent;
    border-image:url("assets/hud_UI_Slot_Selected.png") 17 / 14px / 0 stretch;
    image-rendering:pixelated; transition:transform .1s ease, filter .12s ease;
  }
  #slots .card:hover { filter:brightness(1.16) saturate(1.05); }
  #slots .card:active { transform:translateY(2px); }
  #slots .card b { color:#f1db97; font-size:21px; letter-spacing:.03em; }
  #slots .card .sub { font-size:15px; color:#cbb489; display:block; margin-top:2px; line-height:1.15; }
  #slots .card .ver { font-size:13px; color:#9c8763; display:block; margin-top:2px; line-height:1.1; }
  #slots .card .del { position:absolute; top:5px; right:11px; opacity:.4; font-size:15px; color:#e9dec6; line-height:1; }
  #slots .card .del:hover { opacity:1; color:#e05a42; }
  #slots .card.empty { text-align:center; }
  #slots .card.empty b { color:#f1db97; }
  #intro .ships .card:hover { background:rgba(15,30,42,0.75); }
  #intro .ships .card.sel { border-color:#ffd98a; background:rgba(255,217,138,0.12); }
  #intro .ships .card b { color:#ffd98a; letter-spacing:.08em; font-size:14px; }
  #intro .ships .card small { display:block; opacity:.6; font-size:10px; margin-top:4px; line-height:1.35; }
  .hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="intro">
  <div id="titleTop">
    <img id="titleLogo" src="assets/title/logo.png" alt="HELMSONG"
         onerror="this.style.display='none';var w=document.getElementById('titleWord');if(w)w.style.display='block';">
    <h1 id="titleWord" style="display:none">HELMSONG</h1>
    <button id="startVoyage">Start a new voyage</button>
  </div>
  <div id="titleBottom">
    <div id="slots"></div>
  </div>
  <div class="hint" id="verline"></div>
  <button id="titleSettings" title="Settings &amp; controls" aria-label="Settings and controls">&#9881;</button>
</div>
<!-- controls / settings screen (shown before a new voyage, and from the title gear) -->
<div id="controlsScreen" class="hidden">
  <div class="cpanel">
    <h2 id="ctrlTitle">Before you sail</h2>
    <div id="ctrlBody"><!-- controls grid / tutorial card injected per step --></div>
    <div id="ctrlDots"></div>
    <div class="ctrl-btns">
      <button id="ctrlBack" class="ghost">Back</button>
      <button id="ctrlSkip" class="ghost">Skip intro</button>
      <button id="ctrlNext">Next</button>
    </div>
  </div>
</div>
<script>
"use strict";
/* ============================================================================
   HELMSONG — V1 "Sailing & Feel"  (isometric pixel-art rendering)
   Single-file HTML5 canvas. Infinite procedural ocean, wind-driven ship,
   waves, weather, day/night, HUD + minimap, localStorage save.
   World renders to a low-res pixel buffer (3/4 iso projection) upscaled
   nearest-neighbor; HUD is drawn crisp on top.
   Debug: window.__HS
   ========================================================================== */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
// HUD/menu UI scale — native size on roomy windows; on SHORT windows the whole chrome
// scales down so the 700px-tall port panel always fits (hit()/mapClick divide by US).
let US = 1, UW = 0, UH = 0, uiScaleMul = 1;   // US = scale factor; UW/UH = design-space dims
function computeUIScale(){ US = clamp(uiScaleMul * Math.min(1, H/700), 0.7, 4); UW = W/US; UH = H/US; }   // 700 = the port panel's design height → 720p stays native-crisp
// Font scale — bigger TEXT inside same-size chrome. All canvas text goes through fnt(n).
let FONT_SCALE = 1.8;
function fnt(n){ return Math.round(n*FONT_SCALE)+'px VT323,ui-monospace,monospace'; }
// Sans companion for SMALL description/secondary text — crisper than VT323 at tiny sizes.
// Sized so fntS(n) reads visually similar to fnt(n) (sans x-height ≈ VT323 at ~72% the px).
function fntS(n){ return '500 '+Math.round(n*1.4)+'px Geist,-apple-system,"Segoe UI",sans-serif'; }

// ---- pixel buffer (low-res world render) ----
const buf = document.createElement('canvas');
const bctx = buf.getContext('2d');
const rbuf = document.createElement('canvas');   // low-res region-colour field (smoothly upscaled → ocean gradient)
const rctx = rbuf.getContext('2d');
let BW = 0, BH = 0;          // buffer dimensions (low-res)
let VIEW = 1.0;             // buffer pixels per world unit (derived from zoom)
let PIXEL = 4;             // screen pixels per buffer pixel — chunkiness of the art
let viewSpan = 480;        // world units visible vertically — the zoom (bigger = further out)
const VIEW_MIN = 240, VIEW_MAX = 1100;
const ISO_Y = 0.58;         // vertical squash of the ground plane (3/4 tilt)
const ISO_Z = 0.95;         // how strongly height lifts objects up-screen

function recalcView() { VIEW = BH / (viewSpan * ISO_Y); }
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  computeUIScale();
  // integer-scaled pixel buffer: every buffer pixel is exactly PIXEL screen pixels
  BW = Math.ceil(W / PIXEL); BH = Math.ceil(H / PIXEL);
  buf.width = BW; buf.height = BH;
  recalcView();
  ctx.imageSmoothingEnabled = false;
  bctx.imageSmoothingEnabled = false;
  bctx.lineJoin = 'round';
}
window.addEventListener('resize', () => resize());
// chunkiness adapts to zoom: chunky up close, finer when far out so the small
// boat keeps enough detail to read instead of turning to mush.
/* player options — sound levels + graphics, persisted separately from the save */
const OPTS = { music:1, sfx:1, shake:true, rain:true, brightNights:false, pixel:0 };   // pixel 0 = auto pixel-art, 1 = no pixel style (crisp)
function saveOpts(){ try { localStorage.setItem('helmsong_opts', JSON.stringify(OPTS)); } catch(e){} }
(function loadOpts(){ try { Object.assign(OPTS, JSON.parse(localStorage.getItem('helmsong_opts')||'{}')); } catch(e){}
  if (OPTS.pixel !== 1) OPTS.pixel = 0; })();                  // old saved 2/3/4 sizes collapse back to auto
function pixelForSpan(s) { if (OPTS.pixel) return OPTS.pixel; return s > 820 ? 2 : s > 600 ? 3 : 4; }
PIXEL = pixelForSpan(480);   // honour a saved pixel-size preference from the first frame (480 = default viewSpan)
function applyZoom(span) {
  viewSpan = clamp(span, 150, 1600);
  const np = pixelForSpan(viewSpan);
  if (np !== PIXEL) { PIXEL = np; resize(); } else recalcView();
}
// scroll to change the camera POV (zoom in / out)
window.addEventListener('wheel', e => {
  if (ui.mapOpen){ if (e.deltaY > 0) mapZoomOut(); else mapZoomIn(); return; }   // scroll zooms the chart when it's open
  if (ui.port){                                                                  // scroll pages the market ledger (and never zooms the world behind the panel)
    if (ui.portTab === 'market') ui.marketScroll = Math.max(0, (ui.marketScroll||0) + (e.deltaY > 0 ? 1 : -1));
    return;
  }
  applyZoom(viewSpan * (e.deltaY > 0 ? 1.12 : 0.89));
}, { passive: true });

/* ----------------------------- math / noise ------------------------------ */
const TAU = Math.PI * 2;
const clamp = (v,a,b) => v < a ? a : v > b ? b : v;
const lerp = (a,b,t) => a + (b - a) * t;
const smooth = t => t * t * (3 - 2 * t);
const angLerp = (a,b,t) => { let d = ((b - a + Math.PI) % TAU) - Math.PI; if (d < -Math.PI) d += TAU; return a + d * t; };
resize();

function hash2(ix, iy, seed) {
  let h = (ix * 374761393) ^ (iy * 668265263) ^ (seed * 2246822519);
  h = (h ^ (h >>> 13)) >>> 0; h = Math.imul(h, 1274126177) >>> 0; h = (h ^ (h >>> 16)) >>> 0;
  return h / 4294967296;
}
function noise2(x, y, seed) {
  const x0 = Math.floor(x), y0 = Math.floor(y);
  const fx = smooth(x - x0), fy = smooth(y - y0);
  const a = hash2(x0,y0,seed), b = hash2(x0+1,y0,seed), c = hash2(x0,y0+1,seed), d = hash2(x0+1,y0+1,seed);
  return lerp(lerp(a,b,fx), lerp(c,d,fx), fy);
}
function fbm(x, y, seed, oct=4) {
  let v = 0, amp = 0.5, f = 1, norm = 0;
  for (let i = 0; i < oct; i++) { v += amp * noise2(x*f, y*f, seed + i*101); norm += amp; amp *= 0.5; f *= 2; }
  return v / norm;
}

/* ------------------------------- world ----------------------------------- */
const WORLD_SEED = 1337;
const CHUNK = 1000;
const ISLAND_CHANCE = 0.5;
const chunkCache = new Map();
// A fixed, finite world. It WRAPS east–west (content repeats every WORLD_W, so
// coordinates stay continuous and sailing far east circumnavigates back to the
// start) and is BOUNDED north–south by impassable polar ice. Equator = hot middle.
const WORLD_W = 80000;                 // circumference (E–W wrap period) ≈ 8–10 min around
const WORLD_H = 64000;                 // pole-to-pole (bounded) ≈ 7 min top-to-bottom
const NCX = Math.round(WORLD_W/CHUNK); // chunk columns before the world repeats
const NCY = Math.round(WORLD_H/CHUNK);
const EQUATOR = WORLD_H/2;
const wrapx = x => ((x % WORLD_W) + WORLD_W) % WORLD_W;
const wrapCol = cx => ((cx % NCX) + NCX) % NCX;         // periodic chunk column → identical, repeating map
const START = { x: WORLD_W*0.5, y: WORLD_H*0.16 };      // gentle north-temperate starting waters

const EMPTY_CHUNK = { islands:[], grounds:[], flotsam:[], reefs:[], flows:[] };
function genChunk(cx, cy) {
  const key = cx + ',' + cy;                     // cache per continuous position...
  let c = chunkCache.get(key);
  if (c) return c;
  if (cy < 0 || cy >= NCY) return EMPTY_CHUNK;    // nothing beyond the polar edges
  const wc = wrapCol(cx);                          // ...but DECIDE content per wrapped column → map repeats every WORLD_W
  const conts = continentsInChunk(cx, cy);         // large landmasses overlapping this chunk
  const islands = [];
  const onCont = (px,py) => conts && conts.some(cc => Math.hypot(cc.x-px, cc.y-py) < cc.r*1.05);
  if (hash2(wc, cy, WORLD_SEED) < ISLAND_CHANCE) {
    const jx = hash2(wc, cy, WORLD_SEED + 7), jy = hash2(wc, cy, WORLD_SEED + 9);
    const baseX = cx * CHUNK + lerp(0.25, 0.75, jx) * CHUNK;
    const baseY = cy * CHUNK + lerp(0.25, 0.75, jy) * CHUNK;
    if (!onCont(baseX, baseY)) {
    let r = lerp(70, 300, Math.pow(hash2(wc, cy, WORLD_SEED + 11), 1.35));   // bigger islands (V9)
    if (hash2(wc, cy, WORLD_SEED + 101) < 0.035) r = lerp(340, 520, hash2(wc, cy, WORLD_SEED + 103));   // rare GREAT isles — small continents in their own right
    const biome = REGIONS[regionAt(baseX, baseY)].biome;                       // island matches its ocean
    // organic coastline: 2–4 big lobes (bays/headlands) + fbm detail, still star-convex
    const pts = [], N = 30, shapeSeed = (wc * 131 + cy * 977) | 0;
    const lobes = 2 + Math.floor(hash2(wc, cy, WORLD_SEED + 13) * 3), lph = hash2(wc, cy, WORLD_SEED + 17) * TAU;
    for (let i = 0; i < N; i++) {
      const a = (i / N) * TAU;
      const lo = Math.sin(a*lobes + lph) * 0.5 + 0.5;
      const fb = fbm(Math.cos(a)*2.1 + 5, Math.sin(a)*2.1 + 5, shapeSeed, 3);
      pts.push({ a, r: r * lerp(0.45, 1.25, 0.52*lo + 0.48*fb) });
    }
    const radAt = a => { const fi=((a%TAU)+TAU)%TAU/TAU*N, i0=Math.floor(fi)%N, i1=(i0+1)%N; return lerp(pts[i0].r, pts[i1].r, fi-Math.floor(fi)); };
    // terraced tiers (beach ring → grass tiers → high plateau), heights capped
    const H = 9 + Math.min(24, r*0.10);
    const tiers = [{ s:0.80, h:H }];
    if (r > 120) tiers.push({ s:0.54, h:H + Math.min(20, 6 + r*0.05) });
    if (r > 210) tiers.push({ s:0.31, h:tiers[1].h + Math.min(18, 6 + r*0.045) });
    // trees, distributed across tier tops
    const trees = [];
    const tn = Math.floor(r / 12);
    for (let i = 0; i < tn; i++) {
      const ta = hash2(wc*7+i, cy*3, 21) * TAU;
      const trad = radAt(ta) * 0.72 * Math.sqrt(hash2(i*17, wc-cy, 8));
      let tz = H; for (let k=tiers.length-1;k>=0;k--){ if (trad <= tiers[k].s*radAt(ta)*0.88){ tz = tiers[k].h; break; } }
      trees.push({ x: baseX + Math.cos(ta)*trad, y: baseY + Math.sin(ta)*trad,
                   s: 0.7 + hash2(i, wc+cy, 3)*0.6, z: tz });
    }
    trees.sort((a,b) => a.y - b.y);
    const islObj = { x: baseX, y: baseY, r, biome, pts, trees, tiers, key: wc+','+cy, H };
    // rocky peak crag on some larger islands (spire silhouettes from the refs)
    if (r > 140 && hash2(wc, cy, WORLD_SEED + 19) < 0.4) {
      const pa = hash2(wc, cy, WORLD_SEED + 23) * TAU, pd = r * 0.12;
      const topT = tiers[tiers.length-1];
      islObj.peak = { x: baseX + Math.cos(pa)*pd, y: baseY + Math.sin(pa)*pd, r: r*0.15,
                      zb: topT.h, h: topT.h + 12 + Math.min(24, r*0.08), seed: shapeSeed ^ 99 };
    }
    if (hash2(wc, cy, WORLD_SEED + 31) < 0.5) {
      const pa = hash2(wc, cy, WORLD_SEED + 33) * TAU;
      const rEdge = islandRadiusAt(islObj, pa);
      islObj.port = {
        name: portName(wc, cy), ang: pa,
        pierX: baseX + Math.cos(pa)*rEdge,        pierY: baseY + Math.sin(pa)*rEdge,
        dockX: baseX + Math.cos(pa)*(rEdge + 26), dockY: baseY + Math.sin(pa)*(rEdge + 26),
        profile: portProfile(wc, cy), seed: ((wc*92821) ^ (cy*53987)) >>> 0,
      };
    }
    islands.push(islObj);
    // satellite islets & sea-stack rocks scattered on the island's shelf (refs: lighthouse outcrops)
    if (r > 90) {
      const nr = 2 + Math.floor(hash2(wc, cy, WORLD_SEED + 71) * 3);
      for (let k = 0; k < nr; k++) {
        const ra = hash2(wc + k*13, cy, WORLD_SEED + 73) * TAU;
        const rd = r * lerp(1.35, 1.62, hash2(wc, cy + k*7, WORLD_SEED + 79));
        const rx = baseX + Math.cos(ra)*rd, ry = baseY + Math.sin(ra)*rd;
        if (onCont(rx, ry)) continue;
        const rr = 8 + hash2(wc*3 + k, cy, WORLD_SEED + 83) * 16, rH = 5 + rr * 0.5;
        const rpts = [], RM = 7, rseed = (shapeSeed ^ (k*7919)) | 0;
        for (let j = 0; j < RM; j++) { const a = (j/RM)*TAU;
          rpts.push({ a, r: rr * lerp(0.62, 1.15, hash2(j, rseed, 5)) }); }
        islands.push({ x:rx, y:ry, r:rr, biome, pts:rpts, trees:[], tiers:[{s:0.62,h:rH}],
                       key: wc+','+cy+'#r'+k, H:rH, rock:true });
      }
    }
    }
  }
  if (conts) for (const cc of conts) islands.push(cc);   // inject the overlapping continent(s)
  // fishing grounds — open-water POIs telegraphed by circling birds
  const grounds = [];
  if (hash2(wc, cy, WORLD_SEED + 41) < 0.4) {
    const gx = cx*CHUNK + lerp(0.2,0.8,hash2(wc,cy,WORLD_SEED+43))*CHUNK;
    const gy = cy*CHUNK + lerp(0.2,0.8,hash2(wc,cy,WORLD_SEED+45))*CHUNK;
    if (!onCont(gx, gy) && !islands.some(il => Math.hypot(il.x-gx, il.y-gy) < il.r*1.35 + 80))
      grounds.push({ x:gx, y:gy, r: lerp(150,260,hash2(wc,cy,WORLD_SEED+47)), rich: lerp(0.55,1,hash2(wc,cy,WORLD_SEED+49)), key: 'g'+wc+','+cy });
  }
  // flotsam — drifting lore + a few coins
  const flotsam = [];
  if (hash2(wc, cy, WORLD_SEED + 61) < 0.26) {
    const fx = cx*CHUNK + lerp(0.15,0.85,hash2(wc,cy,WORLD_SEED+63))*CHUNK;
    const fy = cy*CHUNK + lerp(0.15,0.85,hash2(wc,cy,WORLD_SEED+65))*CHUNK;
    if (!onCont(fx, fy)) flotsam.push({ x:fx, y:fy, key: 'f'+wc+','+cy, lore: Math.floor(hash2(wc,cy,WORLD_SEED+67) * 16) });
  }
  // reefs & sandbars — free-standing shallow patches that scrape hulls at speed (V9)
  const reefs = [];
  {
    const biome = REGIONS[regionAt(cx*CHUNK + 500, cy*CHUNK + 500)].biome;
    const chance = biome==='tropic' ? 0.30 : biome==='desert' ? 0.24 : 0.12;
    if (hash2(wc, cy, WORLD_SEED + 91) < chance) {
      const rx = cx*CHUNK + lerp(0.15,0.85,hash2(wc,cy,WORLD_SEED+93))*CHUNK;
      const ry = cy*CHUNK + lerp(0.15,0.85,hash2(wc,cy,WORLD_SEED+95))*CHUNK;
      const rr = lerp(60, 150, hash2(wc,cy,WORLD_SEED+97));
      if (!onCont(rx, ry) && !islands.some(il => Math.hypot(il.x-rx, il.y-ry) < il.r*1.5 + rr + 40)) {
        const kind = (biome==='desert' || hash2(wc,cy,WORLD_SEED+99) < 0.3) ? 'sandbar' : 'reef';
        const rpts = [], RN = 12, rs = (wc*373 + cy*911) | 0;
        for (let j=0;j<RN;j++){ const a=(j/RN)*TAU;
          rpts.push({ a, r: rr * lerp(0.55, 1.15, fbm(Math.cos(a)*1.6+3, Math.sin(a)*1.6+3, rs, 3)) }); }
        reefs.push({ x:rx, y:ry, r:rr, pts:rpts, kind, key:'rf'+wc+','+cy });
      }
    }
  }
  // flow hazards — riptide current lanes (push) and rare whirlpools (pull + core damage)
  const flows = [];
  {
    const h1 = hash2(wc, cy, WORLD_SEED + 101);
    const kind = h1 < 0.11 ? 'rip' : h1 > 0.958 ? 'whirl' : null;
    if (kind) {
      const fx2 = cx*CHUNK + lerp(0.2,0.8,hash2(wc,cy,WORLD_SEED+103))*CHUNK;
      const fy2 = cy*CHUNK + lerp(0.2,0.8,hash2(wc,cy,WORLD_SEED+105))*CHUNK;
      const fr2 = kind==='rip' ? lerp(130,230,hash2(wc,cy,WORLD_SEED+107)) : lerp(90,150,hash2(wc,cy,WORLD_SEED+107));
      if (!onCont(fx2, fy2) && !islands.some(il => Math.hypot(il.x-fx2, il.y-fy2) < il.r*1.5 + fr2 + 40)
          && !reefs.some(rf => Math.hypot(rf.x-fx2, rf.y-fy2) < rf.r + fr2 + 40))
        flows.push({ x:fx2, y:fy2, r:fr2, kind, dir: hash2(wc,cy,WORLD_SEED+109)*TAU, key:'fl'+wc+','+cy });
    }
  }
  c = { islands, grounds, flotsam, reefs, flows };
  chunkCache.set(key, c);
  if (chunkCache.size > 3200){                                 // evict oldest — coords are continuous, so laps leak strips (v0.19.4)
    const it = chunkCache.keys();                              // cap sits ABOVE the max chart sweep (49x49) so the chart never thrashes it
    for (let i=0;i<400;i++) chunkCache.delete(it.next().value);
  }
  return c;
}
// V16: the sea is nobody's friend — npc and enemy hulls respect shoals,
// currents and bergs like the player does (honest physics, no damage).
// Lookups are throttled per entity; forces mirror stepShip's numbers.
function applyHazards(o, dt){
  o.hazT = (o.hazT === undefined ? Math.random()*0.35 : o.hazT) - dt;
  if (o.hazT <= 0){ o.hazT = 0.35; o.hazShoal = shoalAt(o.x, o.y); o.hazFlow = flowAt(o.x, o.y); }
  if (o.hazShoal){ const k = Math.pow(o.hazShoal.kind === 'sandbar' ? 0.45 : 0.78, dt*2); o.vx *= k; o.vy *= k; }
  if (o.hazFlow){
    const fl = o.hazFlow, d = Math.hypot(o.x-fl.x, o.y-fl.y)||1;
    if (fl.kind === 'rip'){ o.vx += Math.cos(fl.dir)*150*dt; o.vy += Math.sin(fl.dir)*150*dt; }
    else { const pull = 200*(1-d/fl.r)+40, a = Math.atan2(fl.y-o.y, fl.x-o.x);
      o.vx += (Math.cos(a)*pull - Math.sin(a)*pull*0.7)*dt; o.vy += (Math.sin(a)*pull + Math.cos(a)*pull*0.7)*dt; }
  }
  for (const b of bergs){ const d = Math.hypot(o.x-b.x, o.y-b.y);
    if (d < b.r+10){ const a = Math.atan2(o.y-b.y, o.x-b.x); o.x = b.x+Math.cos(a)*(b.r+10); o.y = b.y+Math.sin(a)*(b.r+10); o.vx*=0.4; o.vy*=0.4; break; } }
}
function flowAt(wx, wy){
  const cx = Math.floor(wx / CHUNK), cy = Math.floor(wy / CHUNK);
  for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++)
    for (const fl of genChunk(cx+dx, cy+dy).flows)
      if (Math.hypot(wx-fl.x, wy-fl.y) < fl.r) return fl;
  return null;
}

function islandRadiusAt(isl, ang) {
  let a = ((ang % TAU) + TAU) % TAU;
  const N = isl.pts.length, fi = a / TAU * N;
  const i0 = Math.floor(fi) % N, i1 = (i0 + 1) % N, t = fi - Math.floor(fi);
  return lerp(isl.pts[i0].r, isl.pts[i1].r, t);
}
function landAt(wx, wy) {
  const cx = Math.floor(wx / CHUNK), cy = Math.floor(wy / CHUNK);
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    for (const isl of genChunk(cx+dx, cy+dy).islands) {
      const ddx = wx - isl.x, ddy = wy - isl.y, dist = Math.hypot(ddx, ddy);
      if (dist > isl.r * 1.35) continue;
      if (dist < islandRadiusAt(isl, Math.atan2(ddy, ddx))) return isl;
    }
  }
  return null;
}
// push any moving entity out of land (same rule the player obeys)
function keepOffLand(o){
  const isl = landAt(o.x, o.y);
  if (!isl) return;
  const a = Math.atan2(o.y-isl.y, o.x-isl.x), r = islandRadiusAt(isl, a) + 24;
  o.x = isl.x + Math.cos(a)*r; o.y = isl.y + Math.sin(a)*r;
  if (o.vx !== undefined){                                     // slide along the coast + a small seaward shove so grinders unstick
    const tx = -Math.sin(a), ty = Math.cos(a), sp = Math.hypot(o.vx, o.vy);
    const s = (o.vx*tx + o.vy*ty) >= 0 ? 1 : -1;
    o.vx = tx*s*sp*0.85 + Math.cos(a)*10; o.vy = ty*s*sp*0.85 + Math.sin(a)*10;
    o.heading = Math.atan2(o.vy, o.vx);                        // face the way you're actually sliding
  }
}
// obstacle steering: probe the intended course; if land lies ahead, follow the coast the
// SAME way until clear (turn hysteresis kills the flip-flop that pins ships on islands).
// AI ships & beasts only — the player steers herself.
function steerClear(o, dx, dy, look=150){
  const clear = a => !landAt(o.x+Math.cos(a)*look, o.y+Math.sin(a)*look)
                  && !landAt(o.x+Math.cos(a)*look*0.6, o.y+Math.sin(a)*look*0.6)
                  && !landAt(o.x+Math.cos(a)*look*0.3, o.y+Math.sin(a)*look*0.3);
  const base = Math.atan2(dy, dx);
  if (clear(base)){ o._turn = 0; return [dx, dy]; }
  const side = o._turn || 1;                                   // keep circling the way we committed to
  for (const mag of [0.35, 0.7, 1.05, 1.4, 1.75, 2.1, 2.5]) for (const s of [side, -side]){
    const a = base + s*mag;
    if (clear(a)){ o._turn = s; return [Math.cos(a), Math.sin(a)]; }
  }
  o._turn = -side;                                             // fully pocketed — reverse and back out of the cove
  return [-dx, -dy];
}
// shallow water (island shelves, reef patches, sandbars) — scrapes hulls at speed
function shoalAt(wx, wy){
  const cx = Math.floor(wx / CHUNK), cy = Math.floor(wy / CHUNK);
  for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
    const ch = genChunk(cx+dx, cy+dy);
    for (const rf of ch.reefs){
      const d = Math.hypot(wx-rf.x, wy-rf.y);
      if (d < rf.r*1.2 && d < islandRadiusAt(rf, Math.atan2(wy-rf.y, wx-rf.x))) return rf;
    }
    for (const isl of ch.islands){
      if (isl.rock) continue;
      const d = Math.hypot(wx-isl.x, wy-isl.y), lim = isl.continent ? 1.12 : 1.35;
      if (d > isl.r*lim*1.1) continue;
      const cr = islandRadiusAt(isl, Math.atan2(wy-isl.y, wx-isl.x));
      if (d > cr && d < cr*(isl.continent ? 1.08 : 1.30)) return { kind:'shelf' };
    }
  }
  return null;
}
// the poles (top & bottom) are impassable ice walls — keep entities inside the world in y
function clampPole(o){
  if (o.y < 0){ o.y = 0; if (o.vy < 0) o.vy = 0; }
  else if (o.y > WORLD_H){ o.y = WORLD_H; if (o.vy > 0) o.vy = 0; }
}
// nearest open water to a point (spiral out; stays inside the poles)
function findOpenWater(x, y){
  x = wrapx(x); y = clamp(y, 500, WORLD_H-500);
  for (let ring=0; ring<60; ring++){
    for (let k=0; k<8; k++){
      const a = k/8*TAU, tx = wrapx(x + Math.cos(a)*ring*180), ty = clamp(y + Math.sin(a)*ring*180, 500, WORLD_H-500);
      if (!landAt(tx, ty)) return { x:tx, y:ty };
    }
  }
  return { x, y };
}

const FACTION_ORDER = Object.keys(FACTIONS).filter(k => k !== 'you');
function portFaction(isl){
  if (isl.port.fac) return isl.port.fac;
  const h = hash2(isl.port.seed, 5150, 3);
  return isl.port.fac = h < 0.42 ? 'crown' : h < 0.72 ? 'guild' : 'free';
}
function facOfEnemy(e){ return e.ghost ? 'tide' : e.ship ? 'redsails' : 'tide'; }   // monsters answer to the Deep Song
function facOfNpc(n){ return n.navy ? 'crown' : n.ghost ? 'tide' : n.type==='fisher' ? 'free' : 'guild'; }
function repOf(fac){ return player.rep[fac] || 0; }
function repAdj(fac, d){
  if (!fac || !FACTIONS[fac]) return;
  player.rep[fac] = clamp(repOf(fac) + d, -100, 100);
  if (fac === 'guild' && player.pact && player.rep.guild < 0){ player.pact = false; setToast('The Compass Guild tears up your trade-pact'); }
}
function repWord(r){ return r>60?'allied':r>20?'friendly':r>=-20?'neutral':r>=-60?'wary':'hostile'; }
// E–W-wrapped horizontal offset (the world is periodic; a circumnavigation must not
// strand you a "full world" from your own stronghold — same pattern as ledgerDist)
function wrapDX(x1, x2){ let dx = (x1 - x2) % WORLD_W; if (dx > WORLD_W/2) dx -= WORLD_W; if (dx < -WORLD_W/2) dx += WORLD_W; return dx; }
function holdDist(x, y){ return player.hold ? Math.hypot(wrapDX(player.hold.x, x), player.hold.y - y) : Infinity; }
function holdNearestX(){ return player.hold.x + Math.round((ship.x - player.hold.x)/WORLD_W)*WORLD_W; }   // nearest period copy, as waypoints do
function homeWaters(x, y){   // whose waters you're in — nearest owned port within its harbour reach
  if (player.hold && holdDist(x, y) < 1700) return 'you';   // your hold projects YOUR territory
  const cx = Math.floor(x/CHUNK), cy = Math.floor(y/CHUNK);
  let best = null, bd = 1e9;
  for (let dy=-2;dy<=2;dy++) for (let dx=-2;dx<=2;dx++)
    for (const isl of genChunk(cx+dx,cy+dy).islands){
      if (!isl.port) continue;
      const d = Math.hypot(isl.x-x, isl.y-y);
      if (d < 1700 && d < bd){ bd = d; best = isl; }
    }
  return best ? portFaction(best) : null;
}

  return (1 - clamp(-r,0,80)*0.0015) * (player.pact && f==='guild' ? 1.08 : 1);   // the Guild honours its pacts
}

/* ---- forts (V12) — garrisoned strongholds, the physical anchor of territory.
   Deterministic placement on big islands; hp/aggro state persisted in fortState.
   Crown/Guild ports get defensive forts; rough water hides Red Sail hangouts; the
   Tidebound keep a hidden stronghold in the Cursed Deep. Destroy for plunder. ---- */
const fortState = new Map();   // key → {hp, aggroT, fireT, sortieT, dead}
let nearForts = [];            // recomputed each step — forts within a chunk of the ship
const builtForts = new Map();  // islKey → fort def — outposts YOU raised on empty islands (persisted via player.built)
function islKeyOf(isl){ return isl.key || (Math.round(isl.x)+','+Math.round(isl.y)); }
function fortOf(isl){
  const bk = islKeyOf(isl);
  if (builtForts.has(bk)) return isl.fortDef = builtForts.get(bk);   // a raised outpost overrides — persists through chunk eviction
  if (isl.fortDef !== undefined) return isl.fortDef;
  let def = null;
  if (!isl.rock && !isl.continent && isl.r >= 150){
    const h = hash2(Math.round(isl.x*0.13), Math.round(isl.y*0.13), 9091);
    if (isl.port){ const fac = portFaction(isl); if (h < 0.4 && fac !== 'free') def = { fac, max: 380 }; }
    else { const reg = regionAt(isl.x, isl.y);
      if (reg === 'cursed' && h < 0.6) def = { fac:'tide', max: 500 };                    // the hidden stronghold
      else if (REGIONS[reg].danger >= 1.0 && h < 0.35) def = { fac:'redsails', max: 380 }; // pirate hangout
    }
  }
  if (def) def.key = 'ft' + (isl.key || (Math.round(isl.x)+','+Math.round(isl.y)));
  return isl.fortDef = def;
}
function fortPos(isl){
  const f = fortOf(isl); if (!f) return null;
  if (f.px === undefined){
    const a = isl.port ? isl.port.ang + 2.2 : hash2(Math.round(isl.x), Math.round(isl.y), 77)*TAU;
    f.px = isl.x + Math.cos(a)*isl.r*0.42; f.py = isl.y + Math.sin(a)*isl.r*0.42;
  }
  return f;
}
function fortStateOf(isl){
  const f = fortOf(isl); if (!f) return null;
  let e = fortState.get(f.key);
  if (!e){ e = { hp: f.max, aggroT: 0, fireT: 2, sortieT: 0, dead: 0 }; fortState.set(f.key, e); }
  if (e.hp <= 0 && e.dead && (world.elapsed - e.dead) > 840*3){ e.hp = f.max; e.dead = 0; }   // rebuilt in ~3 days
  return e;
}
function fortFac(f, st){ return st && st.owner === 'player' ? 'you' : (st && st.fac) || f.fac; }   // a claimed ruin flies YOUR banner; wars can flip the rest (v0.21)
function fortHostile(f, st){
  if (st.owner === 'player') return false;                      // your own hold never fires on you
  if (st.aggroT > 0) return true;
  if (f.fac === 'redsails' || f.fac === 'tide') return true;    // outlaws and the cult fire on strangers
  if (f.fac === 'crown' && player.bounty > 50) return true;     // wanted pirates get no quarter
  return repOf(f.fac) < -60;
}
function nearRuin(){   // an unclaimed razed fort within hailing distance — yours for the taking
  for (const nf of nearForts)
    if (nf.st.hp <= 0 && !nf.st.owner && (!player.hold) && Math.hypot(nf.f.px-ship.x, nf.f.py-ship.y) < 260) return nf;
  return null;
}
/* ---- sieges against your hold (V15) — owning a stronghold means defending

   a timer (urgent toasts + the hold guide arrow lead you home); close in, the
   drain stops and real raiders spawn — sink them to lift the siege. Losing

let holdSiege = null, siegeRollT = 420;
function startHoldSiege(){
  const st = fortState.get(player.hold.key); if (!st || st.hp <= 0) return;
  holdSiege = { t: 180, spawned: false, victoryT: 0 };
  setToast('⚠ Red Sails besiege your hold at '+bearingWord(player.hold.x, player.hold.y)+' — make sail!', true);
}
function endHoldSiege(win){
  if (win){
    const st = fortState.get(player.hold.key);
    if (st) st.hp = Math.min(st.hp + 80, st.maxHp || 380);     // the garrison shores the walls back up
    setToast('The raiders break — your banner holds', true);
  }
  holdSiege = null;
}
function holdFalls(){
  const st = fortState.get(player.hold.key);
  if (st){ st.hp = 0; st.dead = world.elapsed; st.owner = undefined; }
  const hx = player.hold.x, hy = player.hold.y;
  const spill = {};
  for (const id in player.vault){ const half = Math.floor(player.vault[id]/2); if (half > 0) spill[id] = half; }
  player.vault = {};
  lootSpill(hx + 60, hy + 120, 40, spill);                     // half the vault washes out — recoverable if you're quick
  player.hold = null; holdSiege = null;
  setToast('☠ Your hold has FALLEN — the banner is struck. Half the vault lies adrift at the ruin', true);
}
function stepSieges(dt){
  if (!player.hold){ holdSiege = null; return; }
  if (!holdSiege){
    siegeRollT -= dt;
    if (siegeRollT <= 0){
      siegeRollT = 300 + Math.random()*300;
      if (player.truce > world.elapsed) return;                // tribute buys peace at home too
      const chance = 0.3 + (repOf('redsails') < -40 ? 0.2 : 0);
      if (Math.random() < chance) startHoldSiege();
    }
    return;
  }
  holdSiege.t -= dt;
  const st = fortState.get(player.hold.key);
  if (!st){ holdSiege = null; return; }
  const near = holdDist(ship.x, ship.y) < 2600;
  if (near && !holdSiege.spawned){                             // the raiders become real when you answer the call
    holdSiege.spawned = true;
    const hx = player.hold.x + Math.round((ship.x - player.hold.x)/WORLD_W)*WORLD_W;
    for (let k=0;k<2;k++){
      const a = Math.random()*TAU;
      const e = spawnEnemy(k ? 'brig' : 'corsair', hx + Math.cos(a)*420, player.hold.y + Math.sin(a)*320);
      if (e){ e.sieger = true; e.farT = -999; }                // they don't cull — they're here for the fort
    }
  }
  if (holdSiege.spawned){
    if (!enemies.some(e => !e.dead && e.sieger)){ endHoldSiege(true); return; }
  } else {
    st.hp -= 2.6*dt;                                           // unanswered, the walls come down in ~2.5 min
    if (st.hp <= 0){ holdFalls(); return; }
  }
  if (holdSiege && holdSiege.t <= 0){
    setToast('The Red Sails break off the siege — your walls held', true);
    holdSiege = null;
  }
}
function claimRuin(nf){
  const COST = 800;
  if (player.coin < COST){ setToast('The ruin can be yours for '+COST+' coin — you lack it'); return; }
  player.coin -= COST; SFX.horn(); addShake(3);
  nf.st.owner = 'player'; nf.st.hp = nf.f.max; nf.st.maxHp = nf.f.max; nf.st.dead = 0; nf.st.aggroT = 0;
  if (!player.hold) player.hold = { key: nf.f.key, x: nf.f.px, y: nf.f.py };
  setToast(player.hold && player.hold.key===nf.f.key ? 'The ruin is rebuilt under your banner — your stronghold stands!'
                                                      : 'The ruin flies your colours — another outpost joins your holdings');
}
/* ---- build your own outpost (V15) — raise a fort on a bare island (no port,
   no existing fort). Your first becomes your stronghold; each one after flies
   your banner, auto-defends its waters, and widens your fleet cap. This is the
   path to an empire when there's no ruin to claim. ---- */
const OUTPOST_COST = 1200;
function nearBuildSite(){
  const cx = Math.floor(ship.x/CHUNK), cy = Math.floor(ship.y/CHUNK);
  let best = null, bd = 300;
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++)
    for (const isl of genChunk(cx+dx, cy+dy).islands){
      if (isl.rock || isl.continent || isl.port || isl.r < 120) continue;   // needs bare, real land
      if (fortOf(isl)) continue;                                            // already fortified (incl. one you built)
      const ang = Math.atan2(ship.y-isl.y, ship.x-isl.x);
      const edge = Math.hypot(isl.x-ship.x, isl.y-ship.y) - islandRadiusAt(isl, ang);
      if (edge > 8 && edge < bd){ bd = edge; best = isl; }                  // near the shore, not aground
    }
  return best;
}
function buildOutpost(isl){
  if (player.coin < OUTPOST_COST){ setToast('An outpost here costs '+OUTPOST_COST+' coin — you lack it'); return; }
  const bk = islKeyOf(isl), key = 'ft'+bk;
  const ang = isl.port ? isl.port.ang+2.2 : hash2(Math.round(isl.x), Math.round(isl.y), 77)*TAU;
  const def = { fac:'you', max:340, key, px: isl.x + Math.cos(ang)*isl.r*0.42, py: isl.y + Math.sin(ang)*isl.r*0.42 };
  builtForts.set(bk, def); isl.fortDef = def;
  player.built = player.built || [];
  player.built.push({ k:bk, px:Math.round(def.px), py:Math.round(def.py), max:def.max });
  fortState.set(key, { hp:def.max, maxHp:def.max, aggroT:0, fireT:2, sortieT:0, dead:0, owner:'player' });
  player.coin -= OUTPOST_COST; SFX.horn(); addShake(3);
  if (!player.hold){ player.hold = { key, x:def.px, y:def.py };
    setToast('You raise an outpost — your first stronghold stands! Enter it to store goods and found a banner.'); }
  else setToast('A new outpost rises under your banner — your holdings grow, and your fleet may grow with them');
}
function rebuildBuiltForts(){   // restore player-raised outpost defs from the save so they render & persist
  builtForts.clear();
  for (const b of (player.built||[])){
    const key = 'ft'+b.k;
    builtForts.set(b.k, { fac:'you', max:b.max||340, key, px:b.px, py:b.py });
  }
}
function stepForts(dt){
  nearForts.length = 0;
  const cx = Math.floor(ship.x/CHUNK), cy = Math.floor(ship.y/CHUNK), seen = new Set();
  for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++)
    for (const isl of genChunk(cx+dx,cy+dy).islands){
      if (seen.has(isl)) continue; seen.add(isl);
      const f = fortOf(isl); if (!f) continue;
      fortPos(isl);
      const st = fortStateOf(isl);
      nearForts.push({ isl, f, st });
      if (st.aggroT > 0) st.aggroT -= dt;
      if (st.hp <= 0) continue;
      if (st.owner === 'player'){                                // YOUR guns defend these waters
        st.fireT -= dt;
        if (st.fireT <= 0){
          let tgt = null, bd = 640;
          for (const en of enemies){ if (en.dead) continue; const d2 = Math.hypot(en.x-f.px, en.y-f.py); if (d2 < bd){ bd = d2; tgt = en; } }
          if (tgt){
            st.fireT = 2.6;
            const lead = bd/300, la = Math.atan2(tgt.y + tgt.vy*lead - f.py, tgt.x + tgt.vx*lead - f.px);
            shots.push({ x:f.px, y:f.py, z:30, vx:Math.cos(la)*300, vy:Math.sin(la)*300, vz:84, t:2.2, dmg:13, friendly:false, kind:'round', fac:'you', vsPlayer:false });   // reach ≈ 420u (v0.19.3)
            addFx(f.px, f.py, 'hit');
            { const pd = Math.hypot(f.px-ship.x, f.py-ship.y); if (pd < 1400) SFX.fortCannon(pd < 600 ? 0.85 : 0.5); }
          }
        }
        continue;
      }
      const d = Math.hypot(f.px-ship.x, f.py-ship.y);
      if (fortHostile(f, st) && d < 640 && !ship.sinking && graceT <= 0){   // shore guns
        st.fireT -= dt;
        if (st.fireT <= 0){
          st.fireT = 2.6 + Math.random()*0.8;
          const lead = d/300, la = Math.atan2(ship.y + ship.vy*lead - f.py, ship.x + ship.vx*lead - f.px);
          shots.push({ x:f.px, y:f.py, z:30, vx:Math.cos(la)*300, vy:Math.sin(la)*300, vz:84, t:2.2, dmg:13, friendly:false, kind:'round', fac:f.fac, vsPlayer:true });   // reach ≈ 420u — no more sniping band (v0.19.3)
          addFx(f.px, f.py, 'hit');
          { const pd2 = Math.hypot(f.px-ship.x, f.py-ship.y); if (pd2 < 1400) SFX.fortCannon(pd2 < 600 ? 0.85 : 0.5); }
        }
      }
      if (st.aggroT > 0){                                        // the garrison sorties while under attack
        st.sortieT -= dt;
        if (st.sortieT <= 0){
          st.sortieT = 22;
          const defenders = enemies.filter(e=>!e.dead && e.fortKey===f.key).length + npcs.filter(n=>!n.dead && n.fortKey===f.key).length;
          if (defenders < 2){
            const a = Math.atan2(ship.y-f.py, ship.x-f.px);
            const sx2 = isl.x + Math.cos(a)*(isl.r*1.6), sy2 = isl.y + Math.sin(a)*(isl.r*1.6);
            let d2 = null;
            if (f.fac==='redsails') d2 = spawnEnemy(Math.random()<0.5?'brig':'corsair', sx2, sy2);
            else if (f.fac==='tide') d2 = spawnEnemy('ghost', sx2, sy2);
            else d2 = spawnNpc('patrol', true, sx2, sy2);
            if (d2){ d2.fortKey = f.key; setToast('The garrison sorties!'); }
          }
        }
      }
    }
}
function fortFalls(nf){
  const f = nf.f, isl = nf.isl;
  for (let i=0;i<4;i++) addFx(f.px+(Math.random()-0.5)*30, f.py+(Math.random()-0.5)*20, 'burst');
  addShake(9); SFX.fortFalls();

  lootSpill(lx, ly, Math.round((260 + (Math.random()*120|0)) * plunderMul), goods);
  if (nf.st.razes > 1) setToast('The rebuilt vaults were thin — word of your raids spreads');

}

function cultureAt(x, y){
  const t = 1 - Math.abs(clamp(y,0,WORLD_H) - EQUATOR) / EQUATOR;       // 0 pole .. 1 equator (as regionAt)
  const lon = wrapx(x)/WORLD_W;
  if (t < 0.24) return 'norse';                                          // the cold belongs to the Northmen everywhere
  if (t > 0.72) return lon < 0.33 ? 'african' : lon < 0.66 ? 'desert' : 'egyptian';   // three hot seaboards
  return lon < 0.20 ? 'roman' : lon < 0.40 ? 'greek' : lon < 0.57 ? 'euro'
       : lon < 0.72 ? 'east' : lon < 0.86 ? 'isles' : 'mayan';           // six temperate seaboards around the world
}
function portCulture(isl){ return isl.port.culture || (isl.port.culture = cultureAt(isl.x, isl.y)); }

const NAME_B = ['Hav','Mar','Sel','Dun','Wend','Brack','Tor','Kel','Ash','Fen','Mor','Bryn','Cald','Gale'];

function portName(cx, cy) {
  const cult = cultureAt(cx*CHUNK + CHUNK*0.5, cy*CHUNK + CHUNK*0.5);
  const T = CNAMES[cult];
  if (T){
    const b = T.b[Math.floor(hash2(cx,cy,202)*T.b.length)];
    const c = T.c[Math.floor(hash2(cx,cy,203)*T.c.length)];
    let nm = b + c;
    if (T.pre.length && hash2(cx,cy,200) < T.preP) nm = T.pre[Math.floor(hash2(cx,cy,201)*T.pre.length)] + ' ' + nm;
    return nm;
  }
  const b = NAME_B[Math.floor(hash2(cx,cy,202)*NAME_B.length)];
  const c = NAME_C[Math.floor(hash2(cx,cy,203)*NAME_C.length)];
  let nm = (b + c); nm = nm.charAt(0).toUpperCase() + nm.slice(1);
  if (hash2(cx,cy,200) < 0.5) nm = NAME_A[Math.floor(hash2(cx,cy,201)*NAME_A.length)] + ' ' + nm;
  return nm;
}
const CULT_PRODUCE = { norse:['furs','timber','iron'], east:['tea','cloth','pearls'], desert:['spice','salt','cloth'],
  roman:['cloth','iron','oil'], greek:['oil','cloth','salt'], isles:['tea','pearls','salt'],
  mayan:['salt','timber','cloth'], african:['salt','spice','timber'], egyptian:['salt','cloth','oil'] };
function portProfile(cx, cy) {
  const cult = cultureAt(cx*CHUNK + CHUNK*0.5, cy*CHUNK + CHUNK*0.5), cp = CULT_PRODUCE[cult];
  const pick = s => {
    if (cp && hash2(cx,cy,s+400) < 0.6) return cp[Math.floor(hash2(cx,cy,s)*cp.length)];   // markets favour home produce
    return TRADE_IDS[Math.floor(hash2(cx,cy,s)*TRADE_IDS.length)];
  };
  const produces = [...new Set([pick(211), pick(212)])];
  const demands  = [...new Set([pick(213), pick(214)])].filter(x => !produces.includes(x));
  return { produces, demands };
}
// per-port, per-good price (buy = player buys; sell = player sells), drifts over time
function priceFor(isl, id, mode) {
  const g = GOODS[id], pr = isl.port;
  let bm = 1.2, sm = 0.72;                                   // neutral good (wider spread = smaller profit)
  if (g.origin){                                             // exotics: geography IS the price
    const dd = Math.abs((REGION_POS[portRegion(isl)] ?? 0.4) - REGION_POS[g.origin]);
    if (g.origin === portRegion(isl)){ bm = 0.75; sm = 0.55; }        // cheap at the source
    else { bm = 1.6 + 1.4*dd; sm = 1.0 + 1.4*dd; }                    // the further from home, the dearer
  }
  else if (pr.profile.produces.includes(id)) { bm = 0.82; sm = 0.6; }   // local surplus → cheap
  else if (pr.profile.demands.includes(id)) { bm = 1.45; sm = 1.28; } // local need → dear
  const drift = 0.85 + 0.3 * noise2(world.elapsed*0.01 + pr.seed*0.001, GOOD_ORDER.indexOf(id)*1.7, 17);
  const fm = mode === 'buy' ? facBuyMul(isl) : facSellMul(isl);   // your standing with the harbour's owners
  return Math.max(1, Math.round(g.base * (mode === 'buy' ? bm : sm) * drift * eventMult(isl, id) * fm));
}

  desert:    { name:'Sunspine Flats',tint:[34,22,-8],   rough:-0.1,  danger:0.6,  biome:'desert', fish:{herring:1.2,tuna:1.3}, lore:'sun-baked, becalmed and still', hot:true },
  sargasso:  { name:'Sargasso Tangle',tint:[8,42,-26],  rough:-0.16, danger:0.7,  biome:'tropic', fish:{herring:1.5,mackerel:1.4,tuna:1.2}, lore:'warm weed-choked water — a weedcutter clears the way', gate:{comp:'weedcutter',name:'Weedcutter Ram'}, kelp:true },
  toxic:     { name:'The Verdigris',  tint:[40,56,-32],  rough:0.05,  danger:1.1,  biome:'dead',   fish:{cod:1.3,herring:0.9}, lore:'fetid green murk; seal your hull or sicken', gate:{comp:'sealed',name:'Sealed Hull'}, toxic:true },
};
function waterGate(){ const g = REGIONS[curRegion] && REGIONS[curRegion].gate; return (g && !(player.up[g.comp] > 0)) ? g : null; }
function regionAt(x, y){
  // Temperature is set by LATITUDE: 1 at the equator (vertical middle), 0 at the
  // poles (top & bottom). This makes big, coherent horizontal climate bands.
  const yb = clamp(y, 0, WORLD_H);
  const t = 1 - Math.abs(yb - EQUATOR) / EQUATOR;                     // 0 pole .. 1 equator
  // Longitude field, PERIODIC in x (sampled on a circle) so bands wave and named
  // seas repeat seamlessly every WORLD_W. Also drives calm/temperate & cursed placement.
  const th = wrapx(x)/WORLD_W * TAU;
  const lon = fbm(Math.cos(th)*1.7 + 8,  Math.sin(th)*1.7 + 8  + yb*0.00034, 707, 3);
  const temp = clamp(t + (lon-0.5)*0.14, 0, 1);                        // wobble the band edges
  // A designated Cursed Sea — a periodic blob of black water at a fixed longitude, mid-latitude.
  const cur = fbm(Math.cos(th)*1.15 + 40, Math.sin(th)*1.15 + 40 + yb*0.00026, 909, 3);
  if (cur > 0.72 && temp > 0.30 && temp < 0.64) return 'cursed';
  // hazard blobs (kelp / fetid) — one extra periodic field, sampled only in the mid-temp bands
  if (temp > 0.22 && temp < 0.72){
    const haz = fbm(Math.cos(th)*1.5 + 61, Math.sin(th)*1.5 + 61 + yb*0.0003, 421, 3);
    if (haz > 0.71 && temp > 0.46) return 'sargasso';                 // warm-reef latitudes: weed tangle
    if (haz > 0.73 && temp < 0.44) return 'toxic';                    // cool-temperate murk
  }
  if (temp < 0.16) return 'ice';                                      // polar caps
  if (temp < 0.40) return lon < 0.5 ? 'calm' : 'temperate';           // cold-temperate seas
  if (temp < 0.70) return 'tropic';                                   // warm coral reaches
  return lon < 0.45 ? 'desert' : 'tropic';                            // hot equatorial belt
}
const REGION_COL = { calm:'rgba(96,156,112,0.30)', temperate:null, tropic:'rgba(84,164,150,0.30)', cursed:'rgba(128,84,158,0.42)', ice:'rgba(150,182,212,0.34)', desert:'rgba(196,164,92,0.30)', sargasso:'rgba(96,148,68,0.40)', toxic:'rgba(164,182,72,0.42)' };

/* --- fixed large continents. Positioned by wrapped chunk column so they repeat
   every WORLD_W, and injected into EVERY chunk they overlap (see genChunk) so all
   the chunk-based systems — land collision, ports, docking, rendering — get them
   for free. Placed in mid-latitudes so none sit on the polar ice. --- */
const CONTINENT_DEFS = [
  { i:0, wcx:13, cy:9,  cr:2.5, name:'Norhaven' },   // northern temperate landmass (green)
  { i:1, wcx:47, cy:32, cr:3.0, name:'Sundara'  },   // great equatorial continent (lush/tropic)
  { i:2, wcx:31, cy:55, cr:2.3, name:'Sudreach' },   // southern temperate reach (green)
  { i:3, wcx:65, cy:12, cr:2.2, name:'Vellmark' },   // north-eastern landmass (green)
  { i:4, wcx:8,  cy:30, cr:2.4, name:'Kharsun'  },   // western equatorial continent (hot/desert)
  { i:5, wcx:61, cy:50, cr:2.6, name:'Thalvess' },   // south-eastern reach (green)
];
const contCache = new Map();
function buildContinent(def, period){
  const ck = def.i + '@' + period; let c = contCache.get(ck); if (c) return c;
  const centerCol = def.wcx + period*NCX;
  const x = centerCol*CHUNK + CHUNK*0.5, y = def.cy*CHUNK + CHUNK*0.5, r = def.cr*CHUNK;
  const biome = REGIONS[regionAt(x, y)].biome;
  const pts = [], N = 46, seed = (def.i*7919 + 31)|0;
  for (let k=0;k<N;k++){ const a=k/N*TAU, wob=fbm(Math.cos(a)*1.9+3, Math.sin(a)*1.9+3, seed, 4); pts.push({ a, r: r*lerp(0.58,1.16,wob) }); }
  const trees = [], tn = Math.min(170, Math.floor(r/26));
  for (let k=0;k<tn;k++){ const ta=hash2(k*13,def.i,21)*TAU, tr=r*0.82*Math.sqrt(hash2(k*29,def.i,8)); trees.push({ x:x+Math.cos(ta)*tr, y:y+Math.sin(ta)*tr, s:0.85+hash2(k,def.i,3)*0.7 }); }
  trees.sort((a,b)=>a.y-b.y);
  c = { x, y, r, biome, pts, trees, key:'C'+def.i, H:26, continent:true, name:def.name };
  const pa = hash2(def.i,3,33)*TAU, rEdge = islandRadiusAt(c, pa);
  c.port = { name: portName(def.wcx, def.cy), ang:pa,
             pierX:x+Math.cos(pa)*rEdge,        pierY:y+Math.sin(pa)*rEdge,
             dockX:x+Math.cos(pa)*(rEdge+30), dockY:y+Math.sin(pa)*(rEdge+30),
             profile: portProfile(def.wcx, def.cy), seed:((def.i*92821)^97)>>>0 };
  contCache.set(ck, c); return c;
}
function continentsInChunk(cx, cy){
  let out = null;
  for (const def of CONTINENT_DEFS){
    const period = Math.round((cx - def.wcx)/NCX), centerCol = def.wcx + period*NCX;
    if (Math.abs(cx-centerCol) <= def.cr+0.6 && Math.abs(cy-def.cy) <= def.cr+0.6) (out || (out=[])).push(buildContinent(def, period));
  }
  return out;
}

/* ====================== V14: your fleet ==================================== */
/* Escorts sail in formation off your quarters and fight what you fight.
   player.fleet holds the persistent ships; escorts[] are their live hulls. */
const escorts = [];
let fleetFoe = null, fleetFoeT = 0;   // what YOU last struck — your escorts pile on until it's dead or the trail goes cold
function markFleetFoe(o){ if (o && !o.dead){ fleetFoe = o; fleetFoeT = 16; } }
const ESCORT_COST = { sloop:500, cutter:800, merchant:1200, frigate:1600 };
function syncEscorts(){
  escorts.length = 0;
  player.fleet.forEach((f, i) => {
    if (f.route) return;                                       // ships on a trade route sail their own waters (v0.20)
    const a = ship.heading + Math.PI + (i===0 ? 0.5 : -0.5);
    escorts.push({ f, x: ship.x + Math.cos(a)*70, y: ship.y + Math.sin(a)*70, vx:0, vy:0, heading: ship.heading, fireT: 2, hitT: 0 });
  });
}
/* ---- fleet trade routes (V15) — send an escort trading between two ports:
   abstract legs (a timer, not a simulated hull), coin per completed leg,
   raid rolls scaled by the route's waters. Passive, raidable, recallable. ---- */
function sendTrading(i){
  const f = player.fleet[i]; if (!f || f.route) return;
  const from = ui.port; if (!from){ setToast('Routes are assigned while docked'); return; }
  const p0 = from.port;
  const cx = Math.floor(p0.dockX/CHUNK), cy = Math.floor(p0.dockY/CHUNK);
  let best = null;
  for (let dy=-8;dy<=8;dy++) for (let dx=-8;dx<=8;dx++)
    for (const isl of genChunk(cx+dx, cy+dy).islands){
      if (!isl.port || isl.port.name === p0.name) continue;
      const d = Math.hypot(isl.port.dockX-p0.dockX, isl.port.dockY-p0.dockY);
      if (d < 1800 || d > 8200) continue;
      if (!best || d < best.d) best = { d, isl };
    }
  if (!best){ setToast('No trade partner within reach of '+p0.name); return; }
  const pt = best.isl.port, mid = { x:(p0.dockX+pt.dockX)/2, y:(p0.dockY+pt.dockY)/2 };
  const danger = Math.max(REGIONS[regionAt(p0.dockX,p0.dockY)].danger,
                          REGIONS[regionAt(mid.x,mid.y)].danger,
                          REGIONS[regionAt(pt.dockX,pt.dockY)].danger);
  const legTime = clamp(best.d/140, 25, 90);
  const income = Math.round(legTime * (2.4 + danger*2.4) * (1 + SHIPS[f.cls].cargo/40));   // rougher water pays better — and bleeds more; a ship earns back her price in a few round trips
  f.route = { fromName: p0.name, toName: pt.name, legTime, legT: legTime, income, danger: +danger.toFixed(2), back: false };
  syncEscorts();
  setToast('The '+f.name+' begins trading '+p0.name+' ↔ '+pt.name+'  (+'+income+'c per leg)');
}
function recallTrader(i){
  const f = player.fleet[i]; if (!f || !f.route) return;
  f.route = null; syncEscorts();
  setToast('The '+f.name+' breaks off her route and rejoins your wake');
}
function stepFleetRoutes(dt){
  for (let i = player.fleet.length-1; i >= 0; i--){
    const f = player.fleet[i]; if (!f.route) continue;
    const r = f.route;
    r.legT -= dt;
    if (r.legT > 0) continue;
    const here = r.back ? r.fromName : r.toName;
    const raidP = (0.10 + 0.22*Math.max(0, r.danger - 0.4)) * (player.truce > world.elapsed ? 0.5 : 1);   // tribute buys her passage too
    if (Math.random() < raidP){
      f.hp -= 22 + Math.random()*20;
      if (f.hp <= 0){
        setToast('☠ The '+f.name+' is lost to raiders off '+here+' — her route ends', true);
        player.fleet.splice(i, 1); syncEscorts(); continue;
      }
      setToast('⚠ The '+f.name+' was raided off '+here+' — she limps on ('+(f.hp|0)+' hull)', true);
    } else {
      earn(r.income);
      setToast('♦ The '+f.name+' docks at '+here+'  +'+r.income+' coin');
      f.hp = Math.min(SHIPS[f.cls].hp, f.hp + 8);              // harbour patchwork between legs
    }
    r.back = !r.back; r.legT = r.legTime;
  }
}
/* how many escorts you may lead — grows with your maritime holdings (claimed
   ruins + raised outposts + a founded banner). An empire fields a bigger fleet. */
function playerFortCount(){ let n = 0; fortState.forEach(st => { if (st.owner === 'player' && st.hp > 0) n++; }); return n; }
function fleetCap(){ return clamp(2 + playerFortCount() + (player.banner ? 1 : 0), 2, 6); }
function buyEscort(cls){
  const cap = fleetCap();
  if (player.fleet.length >= cap){ setToast('Your fleet is at its limit ('+cap+') — take more holds to lead more ships'); return; }
  const cost = ESCORT_COST[cls];
  if (player.coin < cost){ setToast('Need '+cost+' coin'); return; }
  player.coin -= cost; SFX.coin();
  const nm = pickShipName();
  player.fleet.push({ cls, name: nm, hp: SHIPS[cls].hp });
  syncEscorts();
  setToast('The '+nm+' joins your fleet — she sails with you'); SFX.upgrade();
}
function dismissEscort(i){
  const f = player.fleet[i]; if (!f) return;
  player.fleet.splice(i, 1); syncEscorts();
  setToast('The '+f.name+' is paid off and sails for home');
}
function stepEscorts(dt){
  if (fleetFoeT > 0){ fleetFoeT -= dt; if (fleetFoe && fleetFoe.dead) fleetFoeT = 0; }
  for (let i=escorts.length-1; i>=0; i--){
    const e = escorts[i], f = e.f;
    if (e.hitT > 0) e.hitT -= dt;
    // formation station off the player's quarter (swaps sides by slot)
    const a = ship.heading + Math.PI + (i===0 ? 0.55 : -0.55);
    const tx = ship.x + Math.cos(a)*72, ty = ship.y + Math.sin(a)*72;
    const dx = tx - e.x, dy = ty - e.y, d = Math.hypot(dx, dy)||1;
    const spd = clamp(d*1.3, 0, Math.max(110, ship.speed*1.35 + 40));   // brisk rejoin even when you idle
    e.vx = lerp(e.vx, dx/d*spd, dt*2); e.vy = lerp(e.vy, dy/d*spd, dt*2);
    e.x += e.vx*dt; e.y += e.vy*dt; keepOffLand(e);
    if (Math.hypot(e.vx, e.vy) > 12) e.heading = Math.atan2(e.vy, e.vx);
    // gunnery — fight what YOU fight (your quarry), plus anything hostile near you;
    // help storm a fort you've provoked. Led shots, like your own guns.
    e.fireT -= dt;
    if (e.fireT <= 0){
      let tx=0, ty=0, tvx=0, tvy=0, bd=560, kind=null;         // kind: 'ship' | 'npc' | 'fort'
      if (fleetFoe && !fleetFoe.dead && fleetFoeT > 0){         // your designated quarry — priority + longer reach
        const q = fleetFoe, d2 = Math.hypot(q.x-e.x, q.y-e.y);
        if (d2 < 660){ tx=q.x; ty=q.y; tvx=q.vx||0; tvy=q.vy||0; bd=d2; kind = npcs.includes(q) ? 'npc' : 'ship'; }
      }
      if (!kind){                                              // otherwise the nearest hostile hull
        for (const en of enemies){ if (en.dead) continue; const d2 = Math.hypot(en.x-e.x, en.y-e.y); if (d2 < bd){ bd=d2; tx=en.x; ty=en.y; tvx=en.vx; tvy=en.vy; kind='ship'; } }
        for (const n of npcs){ if (n.dead || !n.hostile) continue; const d2 = Math.hypot(n.x-e.x, n.y-e.y); if (d2 < bd){ bd=d2; tx=n.x; ty=n.y; tvx=n.vx; tvy=n.vy; kind='npc'; } }
      }
      if (!kind){                                              // and lend fire to a siege you've started
        for (const nf of nearForts){ if (nf.st.hp<=0 || nf.st.owner==='player' || nf.st.aggroT<=0) continue;
          const d2 = Math.hypot(nf.f.px-e.x, nf.f.py-e.y); if (d2 < bd){ bd=d2; tx=nf.f.px; ty=nf.f.py; tvx=0; tvy=0; kind='fort'; } }
      }
      if (kind){
        e.fireT = 2.2;
        const lead = bd/340, la = Math.atan2(ty + tvy*lead - e.y, tx + tvx*lead - e.x);
        shots.push({ x:e.x, y:e.y, z:8, vx:Math.cos(la)*340, vy:Math.sin(la)*340, vz:70, t:1.7, dmg:16, friendly:true, escort:true, kind:'round', pvp:kind==='npc', siege:kind==='fort' });
        sfxWorld(e.x, e.y, v => SFX.fire(v), 0.5);
      }
    }
  }
}
function damageEscort(e, dmg){
  e.f.hp -= dmg; e.hitT = 0.18; addFx(e.x, e.y, 'hit');
  if (e.f.hp <= 0){
    addFx(e.x, e.y, 'burst'); addShake(4);
    setToast('The '+e.f.name+' goes down!  — your fleet is diminished');
    const idx = player.fleet.indexOf(e.f); if (idx >= 0) player.fleet.splice(idx, 1);
    syncEscorts();
  }
}
function drawEscort(e){
  const pseudo = { x:e.x, y:e.y, heading:e.heading, type:e.f.cls, big:SHIPS[e.f.cls].scale,
    hull: e.hitT>0 ? [200,110,100] : cosHull(), sail: e.hitT>0 ? [220,110,100] : cosSail(),
    hp: e.f.hp, maxhp: SHIPS[e.f.cls].hp, flag: FACTIONS.you ? FACTIONS.you.col : '#ffd98a' };
  drawEnemyShip(pseudo);
}
function buyUpgrade(key){
  const u = UPGRADES[key], lvl = player.up[key];
  if (lvl >= u.max){ setToast('Already maxed'); return; }
  const cost = u.cost(lvl);
  if (player.coin < cost){ setToast('Not enough coin'); return; }
  player.coin -= cost; player.up[key]++; applyUpgrades();
  if (key==='hull') ship.hp = ship.maxhp;
  setToast(u.name + ' upgraded!'); SFX.upgrade();
}

/* contracts: generated per port, refreshed on a slow time bucket */
const MAX_CONTRACTS = 3;
function pickTargetPort(isl, h){
  const cx = Math.floor(isl.x/CHUNK), cy = Math.floor(isl.y/CHUNK), cands = [];
  for (let dy=-3;dy<=3;dy++) for (let dx=-3;dx<=3;dx++)
    for (const o of genChunk(cx+dx, cy+dy).islands) if (o.port && o !== isl) cands.push(o);
  if (!cands.length) return null;
  const p = cands[Math.floor(h*cands.length) % cands.length];
  return { x:p.port.dockX, y:p.port.dockY, name:p.port.name };
}
function portContracts(isl){
  const seed = isl.port.seed, bucket = Math.floor(world.elapsed/180), out = [];
  for (let i=0;i<3;i++){
    const h = s => hash2(seed + i*13, bucket, s);
    const id = seed + '-' + bucket + '-' + i;
    if (h(1) < 0.5){
      const good = TRADE_IDS[Math.floor(h(2)*TRADE_IDS.length)];
      const qty = 3 + Math.floor(h(3)*6), tgt = pickTargetPort(isl, h(4));
      if (!tgt) continue;

function addBounty(type){

  }
  if (done) player.contracts = player.contracts.filter(c => !(c.kind==='bounty' && c.prog >= c.n));

function spawnMiniBoss(rk){

  setToast('The water stirs — ' + def.name + ' rises!', true);

function stepBoss(e, dt){
  if (e.hitT>0) e.hitT -= dt;
  e.trail.unshift({ x:e.x, y:e.y }); if (e.trail.length > 40) e.trail.pop();
  // leash — the deep does not give chase: once the player clears the Cursed Deep
  // the leviathan breaks off, turns for home, and sounds (then rests — bossCd)
  if (regionAt(ship.x, ship.y) !== 'cursed'){
    e.leashT = (e.leashT||0) + dt;
    const away = Math.atan2(e.y-ship.y, e.x-ship.x);
    e.vx = lerp(e.vx, Math.cos(away)*55, dt*1.1); e.vy = lerp(e.vy, Math.sin(away)*55, dt*1.1);
    e.x += e.vx*dt; e.y += e.vy*dt; e.heading = Math.atan2(e.vy, e.vx);
    e.tentacles.length = 0;                                    // arms slip back beneath the swell
    if (e.leashT > 5){
      e.dead = true;                                           // no killEnemy — it escapes, no spoils
      player.bossCd = world.elapsed + (player.quest.step===3 ? 90 : 420);
      setToast('The Leviathan sounds — the deep does not give chase');
    }
    return;
  }
  e.leashT = 0;
  // pressure dive — at 2/3 and 1/3 hull the leviathan sounds for a breath,
  // shrugging off broadside bursts and re-angling (v0.19.0)
  e.diveMk = e.diveMk || {};
  for (const th of [0.66, 0.33]) if (!e.diveMk[th] && e.hp < e.maxhp*th){
    e.diveMk[th] = true; e.diveT = 3; e.tentacles.length = 0;
    setToast('The Leviathan sounds!'); SFX.splash(0.9); break;
  }
  if (e.diveT > 0){
    e.diveT -= dt;
    const fa = Math.atan2(ship.y-e.y, ship.x-e.x) + 1.1;
    e.vx = lerp(e.vx, Math.cos(fa)*80, dt*2); e.vy = lerp(e.vy, Math.sin(fa)*80, dt*2);
    e.x += e.vx*dt; e.y += e.vy*dt; e.heading = Math.atan2(e.vy, e.vx);
    return;
  }
  const dx = ship.x-e.x, dy = ship.y-e.y, dist = Math.hypot(dx,dy)||1, ang = Math.atan2(dy,dx);
  const hpF = e.hp/e.maxhp; e.phase = hpF>0.66?1:hpF>0.33?2:3;
  const tang = ang + e.orbit*Math.PI/2; let mvx = Math.cos(tang), mvy = Math.sin(tang);
  if (dist>300){ mvx += Math.cos(ang)*0.8; mvy += Math.sin(ang)*0.8; } else if (dist<220){ mvx -= Math.cos(ang)*0.8; mvy -= Math.sin(ang)*0.8; }
  const sp = 40 + e.phase*10; e.vx = lerp(e.vx, mvx*sp, dt*1.1); e.vy = lerp(e.vy, mvy*sp, dt*1.1);
  e.x += e.vx*dt; e.y += e.vy*dt; e.heading = Math.atan2(e.vy, e.vx);
  e.timer -= dt;
  if (e.timer <= 0){
    e.timer = Math.max(1.5, 3.4 - e.phase*0.55);
    for (let i=0;i<2+e.phase;i++){ const ta = Math.random()*TAU, tr = Math.random()*110; e.tentacles.push({ x:ship.x+Math.cos(ta)*tr, y:ship.y+Math.sin(ta)*tr, t:1.0, struck:false }); }
  }
  for (const t of e.tentacles){ t.t -= dt; if (!t.struck && t.t <= 0.42){ t.struck = true; if (Math.hypot(t.x-ship.x, t.y-ship.y) < 42 && !ship.sinking){ damagePlayer(22); } addFx(t.x, t.y, 'splash');
    if (world.elapsed - (e.tenT||0) > 0.7){ e.tenT = world.elapsed; SFX.tentacle(0.8); } } }
  e.tentacles = e.tentacles.filter(t => t.t > -0.3);
  if (e.phase >= 2){ e.fireT -= dt; if (e.fireT <= 0){ e.fireT = e.phase>=3?1.3:2.3; for (let i=-1;i<=1;i++){ const aa = ang + i*0.25; shots.push({ x:e.x, y:e.y, z:10, vx:Math.cos(aa)*300, vy:Math.sin(aa)*300, vz:70, t:2, dmg:14, friendly:false }); } } }
  // shockwave (phase 2+): a telegraphed ring around the body — sail OUT of it or be thrown
  if (e.phase >= 2){
    e.waveT = (e.waveT===undefined ? 6 : e.waveT) - dt;
    if (e.waveT <= 0 && !e.wave){ e.waveT = 8 - e.phase; e.wave = { t: 1.25, hit: false }; }
  }
  if (e.wave){
    e.wave.t -= dt;
    if (!e.wave.hit && e.wave.t <= 0){
      e.wave.hit = true; e.wave.t = 0.6;                       // burst — t becomes the expanding-ring fade
      const wd = Math.hypot(ship.x-e.x, ship.y-e.y);
      if (wd < 270 && !ship.sinking){
        damagePlayer(24); addShake(8); SFX.tentacle(0.95);
        const wa = Math.atan2(ship.y-e.y, ship.x-e.x);
        ship.vx += Math.cos(wa)*240; ship.vy += Math.sin(wa)*240;
      } else SFX.splash(0.6);
    } else if (e.wave.hit && e.wave.t <= 0) e.wave = null;
  }
}

  pad.active = true;

  if (ui.rebind && ui.rebind.type==='pad'){ for (let i=0;i<gp.buttons.length;i++) if (edge(i)){ bindP[ui.rebind.action]=i; saveBinds(); ui.rebind=null; break; } return; }
  const lx = gp.axes[0]||0, ly = gp.axes[1]||0, rx = gp.axes[2]||0, ry = gp.axes[3]||0;
  keys[bindK.left] = lx < -0.35; keys[bindK.right] = lx > 0.35; keys[bindK.up] = ly < -0.45; keys[bindK.down] = ly > 0.45;
  keys[bindK.anchor] = btn(bindP.anchor);
